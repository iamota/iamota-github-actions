name: Release Semver Tags

on:
    push:
        branches:
            - "v*.*"
            - "release/v*.*"
    workflow_dispatch: {}

permissions:
    contents: write
    issues: write

concurrency:
    group: release-semver-tags
    cancel-in-progress: false

jobs:
    tag:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Guard internal release refs
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  set -euo pipefail
                  node .github/scripts/github/github-release-ref-guard.mjs

            - name: Validate release branch format
              id: meta
              run: |
                  set -euo pipefail
                  BRANCH="${GITHUB_REF_NAME}"
                  CANONICAL_BRANCH="${BRANCH#release/}"
                  if [[ ! "${CANONICAL_BRANCH}" =~ ^v([0-9]+)\.([0-9]+)$ ]]; then
                      echo "valid=false" >> "$GITHUB_OUTPUT"
                      echo "Branch ${BRANCH} does not match v<major>.<minor> or release/v<major>.<minor>; skipping."
                      exit 0
                  fi

                  echo "valid=true" >> "$GITHUB_OUTPUT"
                  echo "major=${BASH_REMATCH[1]}" >> "$GITHUB_OUTPUT"
                  echo "minor=${BASH_REMATCH[2]}" >> "$GITHUB_OUTPUT"
                  echo "branch=${CANONICAL_BRANCH}" >> "$GITHUB_OUTPUT"

            - name: Compute and update tags
              if: steps.meta.outputs.valid == 'true'
              env:
                  MAJOR: ${{ steps.meta.outputs.major }}
                  MINOR: ${{ steps.meta.outputs.minor }}
                  BRANCH: ${{ steps.meta.outputs.branch }}
              run: |
                  set -euo pipefail

                  git fetch --tags --force origin

                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"

                  LINE_REGEX="^v${MAJOR}\\.${MINOR}\\.[0-9]+$"
                  MAJOR_REGEX="^v${MAJOR}\\.[0-9]+\\.[0-9]+$"

                  LINE_TAGS="$(git tag -l | grep -E "${LINE_REGEX}" || true)"
                  if [ -n "${LINE_TAGS}" ]; then
                      LAST_PATCH="$(printf '%s\n' "${LINE_TAGS}" | awk -F. '{print $3}' | sort -n | tail -1)"
                      NEXT_PATCH="$((LAST_PATCH + 1))"
                  else
                      NEXT_PATCH="0"
                  fi

                  NEW_TAG="v${MAJOR}.${MINOR}.${NEXT_PATCH}"
                  LINE_FLOATER="v${MAJOR}.${MINOR}"
                  MAJOR_FLOATER="v${MAJOR}"

                  if git rev-parse -q --verify "refs/tags/${NEW_TAG}" >/dev/null; then
                      echo "Immutable tag ${NEW_TAG} already exists; skipping creation."
                  else
                      git tag -a "${NEW_TAG}" -m "Release ${NEW_TAG} from ${BRANCH}" "${GITHUB_SHA}"
                      git push origin "refs/tags/${NEW_TAG}"
                  fi

                  git tag -fa "${LINE_FLOATER}" -m "Floating tag ${LINE_FLOATER} -> ${NEW_TAG}" "${NEW_TAG}"
                  git push origin "refs/tags/${LINE_FLOATER}" --force

                  MAJOR_TAGS="$(git tag -l | grep -E "${MAJOR_REGEX}" || true)"
                  if [ -z "${MAJOR_TAGS}" ]; then
                      MAJOR_TARGET="${NEW_TAG}"
                  else
                      MAJOR_TARGET="$(printf '%s\n' "${MAJOR_TAGS}" | sort -V | tail -1)"
                  fi

                  git tag -fa "${MAJOR_FLOATER}" -m "Floating tag ${MAJOR_FLOATER} -> ${MAJOR_TARGET}" "${MAJOR_TARGET}"
                  git push origin "refs/tags/${MAJOR_FLOATER}" --force

                  echo "Created/updated tags:"
                  echo "- Immutable: ${NEW_TAG}"
                  echo "- Line floater: ${LINE_FLOATER} -> ${NEW_TAG}"
                  echo "- Major floater: ${MAJOR_FLOATER} -> ${MAJOR_TARGET}"
