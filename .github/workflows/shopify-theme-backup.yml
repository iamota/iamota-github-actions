name: Shopify Theme Backup (Canonical)

on:
    workflow_call:
        inputs:
            branch:
                type: string
                required: true
            SHOPIFY_STORE:
                type: string
                required: false
                default: ""
            SHOPIFY_THEME_ID:
                type: string
                required: true
            aws_region:
                type: string
                required: false
                default: "us-west-2"
            aws_s3_bucket:
                type: string
                required: false
                default: ""
        secrets:
            SHOPIFY_THEME_ACCESS_TOKEN:
                required: true
            AWS_ACCESS_KEY_ID:
                required: false
            AWS_SECRET_ACCESS_KEY:
                required: false

permissions:
    contents: read

jobs:
    backup:
        runs-on: ubuntu-latest
        env:
            GITHUB_REPOSITORY         : ${{ github.repository }}
            GITHUB_BRANCH             : ${{ inputs.branch }}
            GITHUB_SHA                : ${{ github.sha }}
            SHOPIFY_STORE             : ${{ inputs.SHOPIFY_STORE }}
            SHOPIFY_THEME_ID          : ${{ inputs.SHOPIFY_THEME_ID }}
            SHOPIFY_THEME_ACCESS_TOKEN: ${{ secrets.SHOPIFY_THEME_ACCESS_TOKEN }}
            AWS_REGION                : ${{ inputs.aws_region }}
            AWS_S3_BUCKET             : ${{ inputs.aws_s3_bucket }}
            AWS_ACCESS_KEY_ID         : ${{ secrets.AWS_ACCESS_KEY_ID }}
            AWS_SECRET_ACCESS_KEY     : ${{ secrets.AWS_SECRET_ACCESS_KEY }}

        steps:
            - uses: actions/checkout@v4

            - name: Setup Node + Install Shopify CLI
              uses: iamota/iamota-github-actions/.github/actions/shopify-cli-install@main

            - name: Validate required Shopify values
              run: |
                  set -euo pipefail
                  MISSING=()
                  [ -n "${SHOPIFY_STORE:-}" ] || MISSING+=("SHOPIFY_STORE input/var")
                  [ -n "${SHOPIFY_THEME_ID:-}" ] || MISSING+=("SHOPIFY_THEME_ID")
                  [ -n "${SHOPIFY_THEME_ACCESS_TOKEN:-}" ] || MISSING+=("SHOPIFY_THEME_ACCESS_TOKEN")
                  if [ "${#MISSING[@]}" -gt 0 ]; then
                      echo "Missing required Shopify values: ${MISSING[*]}"
                      exit 1
                  fi

            - name: Set backup file metadata
              run: |
                  set -euo pipefail
                  REPO_NAME="$(basename "${GITHUB_REPOSITORY}")"
                  YEAR="$(date +%Y)"
                  DATETIME="$(date +%Y-%m-%d_%H%M%S)"
                  SANITIZED_BRANCH="$(echo "${GITHUB_BRANCH}" | tr '/' '_')"

                  FILE_NAME="${REPO_NAME}__${DATETIME}__${SANITIZED_BRANCH}__${SHOPIFY_THEME_ID}__${GITHUB_SHA}"
                  ZIP_NAME="${FILE_NAME}.zip"
                  DEST_PATH="${YEAR}/${REPO_NAME}/${ZIP_NAME}"

                  echo "FILE_NAME=${FILE_NAME}" >> "$GITHUB_ENV"
                  echo "ZIP_NAME=${ZIP_NAME}"   >> "$GITHUB_ENV"
                  echo "DEST_PATH=${DEST_PATH}" >> "$GITHUB_ENV"

            - name: Backup and zip theme files
              uses: iamota/iamota-github-actions/.github/actions/shopify-theme-backup@main
              with:
                  store     : ${{ env.SHOPIFY_STORE }}
                  theme_id  : ${{ env.SHOPIFY_THEME_ID }}
                  token     : ${{ env.SHOPIFY_THEME_ACCESS_TOKEN }}
                  output_dir: ./backup
                  zip_output: ${{ env.ZIP_NAME }}

            - name: Configure AWS credentials (optional)
              if: ${{ env.AWS_S3_BUCKET != '' && env.AWS_ACCESS_KEY_ID != '' && env.AWS_SECRET_ACCESS_KEY != '' }}
              uses: aws-actions/configure-aws-credentials@v4
              with:
                  aws-access-key-id    : ${{ env.AWS_ACCESS_KEY_ID }}
                  aws-secret-access-key: ${{ env.AWS_SECRET_ACCESS_KEY }}
                  aws-region           : ${{ env.AWS_REGION }}

            - name: Upload backup zip to S3 (optional)
              if: ${{ env.AWS_S3_BUCKET != '' && env.AWS_ACCESS_KEY_ID != '' && env.AWS_SECRET_ACCESS_KEY != '' }}
              uses: iamota/iamota-github-actions/.github/actions/aws-s3-upload@main
              with:
                  file     : ${{ env.ZIP_NAME }}
                  bucket   : ${{ env.AWS_S3_BUCKET }}
                  dest_path: ${{ env.DEST_PATH }}

            - name: Upload backup to GitHub Actions Artifacts
              uses: iamota/iamota-github-actions/.github/actions/github-artifact-upload@main
              with:
                  name: ${{ env.FILE_NAME }}
                  path: ./backup
