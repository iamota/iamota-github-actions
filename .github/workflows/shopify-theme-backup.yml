name: Shopify Theme Backup (Canonical)

on:
    workflow_call:
        inputs:
            branch:
                type: string
                required: true
            SHOPIFY_STORE:
                type: string
                required: false
                default: ""
            SHOPIFY_THEME_ID:
                type: string
                required: true
            aws_region:
                type: string
                required: false
                default: "us-west-2"
            aws_s3_bucket:
                type: string
                required: false
                default: ""
        secrets:
            SHOPIFY_THEME_ACCESS_TOKEN:
                required: true
            AWS_ACCESS_KEY_ID:
                required: false
            AWS_SECRET_ACCESS_KEY:
                required: false

permissions:
    contents: read

jobs:
    resolve_targets:
        runs-on: ubuntu-latest
        outputs:
            matrix_json: ${{ steps.stores.outputs.matrix_json }}
        steps:
            - id: stores
              uses: iamota/iamota-github-actions/.github/actions/shopify-multistore-matrix@matix
              with:
                  stores: ${{ inputs.SHOPIFY_STORE }}

    backup:
        needs: [resolve_targets]
        strategy:
            fail-fast: false
            matrix: ${{ fromJson(needs.resolve_targets.outputs.matrix_json) }}
        runs-on: ubuntu-latest
        env:
            GITHUB_REPOSITORY         : ${{ github.repository }}
            GITHUB_BRANCH             : ${{ inputs.branch }}
            GITHUB_SHA                : ${{ github.sha }}
            TARGET_STORE              : ${{ matrix.store }}
            TARGET_STORE_SLUG         : ${{ matrix.store_slug }}
            RAW_SHOPIFY_THEME_ID      : ${{ inputs.SHOPIFY_THEME_ID }}
            RAW_SHOPIFY_THEME_ACCESS_TOKEN: ${{ secrets.SHOPIFY_THEME_ACCESS_TOKEN }}
            RAW_AWS_REGION            : ${{ inputs.aws_region }}
            RAW_AWS_S3_BUCKET         : ${{ inputs.aws_s3_bucket }}
            RAW_AWS_ACCESS_KEY_ID     : ${{ secrets.AWS_ACCESS_KEY_ID }}
            RAW_AWS_SECRET_ACCESS_KEY : ${{ secrets.AWS_SECRET_ACCESS_KEY }}

        steps:
            - uses: actions/checkout@v4

            - name: Resolve theme id
              id: resolve_theme_id
              uses: iamota/iamota-github-actions/.github/actions/shopify-multistore-resolve-value@matix
              with:
                  store: ${{ env.TARGET_STORE }}
                  raw  : ${{ env.RAW_SHOPIFY_THEME_ID }}

            - name: Resolve Shopify token
              id: resolve_theme_token
              uses: iamota/iamota-github-actions/.github/actions/shopify-multistore-resolve-value@matix
              with:
                  store: ${{ env.TARGET_STORE }}
                  raw  : ${{ env.RAW_SHOPIFY_THEME_ACCESS_TOKEN }}

            - name: Resolve AWS region
              id: resolve_aws_region
              uses: iamota/iamota-github-actions/.github/actions/shopify-multistore-resolve-value@matix
              with:
                  store: ${{ env.TARGET_STORE }}
                  raw  : ${{ env.RAW_AWS_REGION }}

            - name: Resolve AWS bucket
              id: resolve_aws_bucket
              uses: iamota/iamota-github-actions/.github/actions/shopify-multistore-resolve-value@matix
              with:
                  store: ${{ env.TARGET_STORE }}
                  raw  : ${{ env.RAW_AWS_S3_BUCKET }}

            - name: Resolve AWS access key id
              id: resolve_aws_key
              uses: iamota/iamota-github-actions/.github/actions/shopify-multistore-resolve-value@matix
              with:
                  store: ${{ env.TARGET_STORE }}
                  raw  : ${{ env.RAW_AWS_ACCESS_KEY_ID }}

            - name: Resolve AWS secret access key
              id: resolve_aws_secret
              uses: iamota/iamota-github-actions/.github/actions/shopify-multistore-resolve-value@matix
              with:
                  store: ${{ env.TARGET_STORE }}
                  raw  : ${{ env.RAW_AWS_SECRET_ACCESS_KEY }}

            - name: Export resolved env values
              run: |
                  set -euo pipefail
                  {
                      echo "SHOPIFY_STORE=${TARGET_STORE}"
                      echo "SHOPIFY_THEME_ID=${{ steps.resolve_theme_id.outputs.value }}"
                      echo "SHOPIFY_THEME_ACCESS_TOKEN=${{ steps.resolve_theme_token.outputs.value }}"
                      echo "AWS_REGION=${{ steps.resolve_aws_region.outputs.value }}"
                      echo "AWS_S3_BUCKET=${{ steps.resolve_aws_bucket.outputs.value }}"
                      echo "AWS_ACCESS_KEY_ID=${{ steps.resolve_aws_key.outputs.value }}"
                      echo "AWS_SECRET_ACCESS_KEY=${{ steps.resolve_aws_secret.outputs.value }}"
                  } >> "$GITHUB_ENV"

            - name: Setup Node + Install Shopify CLI
              uses: iamota/iamota-github-actions/.github/actions/shopify-cli-install@matix

            - name: Validate required Shopify values
              run: |
                  set -euo pipefail
                  MISSING=()
                  [ -n "${SHOPIFY_STORE:-}" ] || MISSING+=("SHOPIFY_STORE input/var")
                  [ -n "${SHOPIFY_THEME_ID:-}" ] || MISSING+=("SHOPIFY_THEME_ID")
                  [ -n "${SHOPIFY_THEME_ACCESS_TOKEN:-}" ] || MISSING+=("SHOPIFY_THEME_ACCESS_TOKEN")
                  if [ "${#MISSING[@]}" -gt 0 ]; then
                      echo "Missing required Shopify values: ${MISSING[*]}"
                      exit 1
                  fi

            - name: Set backup file metadata
              run: |
                  set -euo pipefail
                  REPO_NAME="$(basename "${GITHUB_REPOSITORY}")"
                  YEAR="$(date +%Y)"
                  DATETIME="$(date +%Y-%m-%d_%H%M%S)"
                  SANITIZED_BRANCH="$(echo "${GITHUB_BRANCH}" | tr '/' '_')"

                  FILE_NAME="${REPO_NAME}__${DATETIME}__${SANITIZED_BRANCH}__${TARGET_STORE_SLUG}__${SHOPIFY_THEME_ID}__${GITHUB_SHA}"
                  ZIP_NAME="${FILE_NAME}.zip"
                  DEST_PATH="${YEAR}/${REPO_NAME}/${ZIP_NAME}"

                  echo "FILE_NAME=${FILE_NAME}" >> "$GITHUB_ENV"
                  echo "ZIP_NAME=${ZIP_NAME}"   >> "$GITHUB_ENV"
                  echo "DEST_PATH=${DEST_PATH}" >> "$GITHUB_ENV"

            - name: Backup and zip theme files
              uses: iamota/iamota-github-actions/.github/actions/shopify-theme-backup@matix
              with:
                  store     : ${{ env.SHOPIFY_STORE }}
                  theme_id  : ${{ env.SHOPIFY_THEME_ID }}
                  token     : ${{ env.SHOPIFY_THEME_ACCESS_TOKEN }}
                  output_dir: ./backup
                  zip_output: ${{ env.ZIP_NAME }}

            - name: Configure AWS credentials (optional)
              if: ${{ env.AWS_S3_BUCKET != '' && env.AWS_ACCESS_KEY_ID != '' && env.AWS_SECRET_ACCESS_KEY != '' }}
              uses: aws-actions/configure-aws-credentials@v4
              with:
                  aws-access-key-id    : ${{ env.AWS_ACCESS_KEY_ID }}
                  aws-secret-access-key: ${{ env.AWS_SECRET_ACCESS_KEY }}
                  aws-region           : ${{ env.AWS_REGION }}

            - name: Upload backup zip to S3 (optional)
              if: ${{ env.AWS_S3_BUCKET != '' && env.AWS_ACCESS_KEY_ID != '' && env.AWS_SECRET_ACCESS_KEY != '' }}
              uses: iamota/iamota-github-actions/.github/actions/aws-s3-upload@matix
              with:
                  file     : ${{ env.ZIP_NAME }}
                  bucket   : ${{ env.AWS_S3_BUCKET }}
                  dest_path: ${{ env.DEST_PATH }}

            - name: Upload backup to GitHub Actions Artifacts
              uses: iamota/iamota-github-actions/.github/actions/github-artifact-upload@matix
              with:
                  name: ${{ env.FILE_NAME }}
                  path: ./backup
