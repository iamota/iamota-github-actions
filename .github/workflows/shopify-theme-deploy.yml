name: Shopify Theme Deploy (Canonical)

on:
    workflow_call:
        inputs:
            branch:
                type: string
                required: true
            SHOPIFY_STORE:
                type: string
                required: false
                default: ""
            SHOPIFY_THEME_ID:
                type: string
                required: true
            theme_src:
                type: string
                required: false
                default: "."
            theme_dist:
                type: string
                required: false
                default: ""
            theme_path:
                type: string
                required: false
                default: ""
            build_install_command:
                type: string
                required: false
                default: "npm ci"
            build_command:
                type: string
                required: false
                default: "npx webpack --env target=${GITHUB_BRANCH}"
            allow_live:
                type: string
                required: false
                default: ""
            nodelete:
                type: string
                required: false
                default: ""
            ignore:
                type: string
                required: false
                default: ""
            json:
                type: string
                required: false
                default: ""
        secrets:
            SHOPIFY_THEME_ACCESS_TOKEN:
                required: false

permissions:
    contents: read

jobs:
    resolve_targets:
        runs-on: ubuntu-latest
        outputs:
            matrix_json: ${{ steps.stores.outputs.matrix_json }}
        steps:
            - id: stores
              uses: iamota/iamota-github-actions/.github/actions/shopify-multistore-matrix@v1
              with:
                  stores: ${{ inputs.SHOPIFY_STORE }}

    deploy:
        needs: [resolve_targets]
        strategy:
            fail-fast: false
            matrix: ${{ fromJson(needs.resolve_targets.outputs.matrix_json) }}
        runs-on: ubuntu-latest
        environment: ${{ inputs.branch }}
        env:
            GITHUB_BRANCH: ${{ inputs.branch }}
            GITHUB_SHA: ${{ github.sha }}
            TARGET_STORE: ${{ matrix.store }}
            RAW_THEME_SRC: ${{ inputs.theme_src }}
            RAW_THEME_DIST: ${{ inputs.theme_dist }}
            RAW_THEME_PATH: ${{ inputs.theme_path }}
            RAW_BUILD_INSTALL_COMMAND: ${{ inputs.build_install_command }}
            RAW_BUILD_COMMAND: ${{ inputs.build_command }}
            RAW_ALLOW_LIVE: ${{ inputs.allow_live }}
            RAW_NODELETE: ${{ inputs.nodelete }}
            RAW_IGNORE: ${{ inputs.ignore }}
            RAW_JSON: ${{ inputs.json }}
            RAW_SHOPIFY_THEME_ID: ${{ inputs.SHOPIFY_THEME_ID }}
            RAW_SHOPIFY_THEME_ACCESS_TOKEN: ${{ secrets.SHOPIFY_THEME_ACCESS_TOKEN }}

        steps:
            - uses: actions/checkout@v5

            - name: Resolve theme id
              id: resolve_theme_id
              uses: iamota/iamota-github-actions/.github/actions/shopify-multistore-resolve-value@v1
              with:
                  store: ${{ env.TARGET_STORE }}
                  raw: ${{ env.RAW_SHOPIFY_THEME_ID }}

            - name: Resolve theme source path
              id: resolve_theme_src
              uses: iamota/iamota-github-actions/.github/actions/shopify-multistore-resolve-value@v1
              with:
                  store: ${{ env.TARGET_STORE }}
                  raw: ${{ env.RAW_THEME_SRC }}

            - name: Resolve theme dist path
              id: resolve_theme_dist
              uses: iamota/iamota-github-actions/.github/actions/shopify-multistore-resolve-value@v1
              with:
                  store: ${{ env.TARGET_STORE }}
                  raw: ${{ env.RAW_THEME_DIST }}

            - name: Resolve explicit theme path
              id: resolve_theme_path
              uses: iamota/iamota-github-actions/.github/actions/shopify-multistore-resolve-value@v1
              with:
                  store: ${{ env.TARGET_STORE }}
                  raw: ${{ env.RAW_THEME_PATH }}

            - name: Resolve build install command
              id: resolve_build_install
              uses: iamota/iamota-github-actions/.github/actions/shopify-multistore-resolve-value@v1
              with:
                  store: ${{ env.TARGET_STORE }}
                  raw: ${{ env.RAW_BUILD_INSTALL_COMMAND }}

            - name: Resolve build command
              id: resolve_build_command
              uses: iamota/iamota-github-actions/.github/actions/shopify-multistore-resolve-value@v1
              with:
                  store: ${{ env.TARGET_STORE }}
                  raw: ${{ env.RAW_BUILD_COMMAND }}

            - name: Resolve allow-live override
              id: resolve_allow_live
              uses: iamota/iamota-github-actions/.github/actions/shopify-multistore-resolve-value@v1
              with:
                  store: ${{ env.TARGET_STORE }}
                  raw: ${{ env.RAW_ALLOW_LIVE }}

            - name: Resolve nodelete override
              id: resolve_nodelete
              uses: iamota/iamota-github-actions/.github/actions/shopify-multistore-resolve-value@v1
              with:
                  store: ${{ env.TARGET_STORE }}
                  raw: ${{ env.RAW_NODELETE }}

            - name: Resolve ignore pattern
              id: resolve_ignore
              uses: iamota/iamota-github-actions/.github/actions/shopify-multistore-resolve-value@v1
              with:
                  store: ${{ env.TARGET_STORE }}
                  raw: ${{ env.RAW_IGNORE }}

            - name: Resolve JSON output mode
              id: resolve_json
              uses: iamota/iamota-github-actions/.github/actions/shopify-multistore-resolve-value@v1
              with:
                  store: ${{ env.TARGET_STORE }}
                  raw: ${{ env.RAW_JSON }}

            - name: Resolve Shopify token
              id: resolve_token
              uses: iamota/iamota-github-actions/.github/actions/shopify-multistore-resolve-value@v1
              with:
                  store: ${{ env.TARGET_STORE }}
                  raw: ${{ env.RAW_SHOPIFY_THEME_ACCESS_TOKEN }}

            - name: Validate resolved Shopify values
              run: |
                  set -euo pipefail
                  MISSING=()
                  [ -n "${TARGET_STORE:-}" ] || MISSING+=("SHOPIFY_STORE (resolved target store)")
                  [ -n "${{ steps.resolve_theme_id.outputs.value }}" ] || MISSING+=("SHOPIFY_THEME_ID (resolved)")
                  [ -n "${{ steps.resolve_token.outputs.value }}" ] || MISSING+=("SHOPIFY_THEME_ACCESS_TOKEN (resolved)")
                  if [ "${#MISSING[@]}" -gt 0 ]; then
                      echo "Missing required resolved values: ${MISSING[*]}"
                      exit 1
                  fi

            - name: Setup Node + Install Shopify CLI
              uses: iamota/iamota-github-actions/.github/actions/shopify-cli-install@v1

            - name: Prepare theme (install + build + resolve dist)
              id: prepare
              uses: iamota/iamota-github-actions/.github/actions/shopify-theme-prepare@v1
              env:
                  GITHUB_BRANCH: ${{ inputs.branch }}
              with:
                  theme_src: ${{ steps.resolve_theme_src.outputs.value }}
                  theme_dist: ${{ steps.resolve_theme_dist.outputs.value }}
                  theme_path: ${{ steps.resolve_theme_path.outputs.value }}
                  build_install_command: ${{ steps.resolve_build_install.outputs.value }}
                  build_command: ${{ steps.resolve_build_command.outputs.value }}

            - name: Determine allow-live and nodelete flags safely
              run: |
                  set -euo pipefail

                  normalize_flag() {
                      local raw="$(printf '%s' "$1" | tr '[:upper:]' '[:lower:]' | xargs)"
                      case "$raw" in
                          "") echo "" ;;
                          1|true|yes|y|on) echo "1" ;;
                          0|false|no|n|off) echo "0" ;;
                          *) echo "invalid" ;;
                      esac
                  }

                  ALLOW_LIVE="false"
                  if [[ "${GITHUB_BRANCH}" =~ ^[Pp]roduction$ || "${GITHUB_BRANCH}" =~ ^[Pp]rod$ ]]; then
                      ALLOW_LIVE="true"
                  fi

                  ALLOW_DELETE="false"
                  if git log -1 --pretty=%B | grep -q '\[Allow Delete\]'; then
                      ALLOW_DELETE="true"
                  fi

                  if [ "${ALLOW_LIVE}" = "true" ]; then
                      ALLOW_LIVE_INPUT="1"
                  else
                      ALLOW_LIVE_INPUT="0"
                  fi

                  if [ "${ALLOW_DELETE}" = "true" ]; then
                      NODELETE_INPUT="0"
                  else
                      NODELETE_INPUT="1"
                  fi

                  ALLOW_LIVE_OVERRIDE_RAW='${{ steps.resolve_allow_live.outputs.value }}'
                  NODELETE_OVERRIDE_RAW='${{ steps.resolve_nodelete.outputs.value }}'

                  ALLOW_LIVE_OVERRIDE="$(normalize_flag "${ALLOW_LIVE_OVERRIDE_RAW}")"
                  NODELETE_OVERRIDE="$(normalize_flag "${NODELETE_OVERRIDE_RAW}")"

                  if [ "${ALLOW_LIVE_OVERRIDE}" = "invalid" ]; then
                      echo "Invalid allow_live override: '${ALLOW_LIVE_OVERRIDE_RAW}'. Use 1/0, true/false, yes/no, on/off."
                      exit 1
                  fi
                  if [ "${NODELETE_OVERRIDE}" = "invalid" ]; then
                      echo "Invalid nodelete override: '${NODELETE_OVERRIDE_RAW}'. Use 1/0, true/false, yes/no, on/off."
                      exit 1
                  fi

                  if [ -n "${ALLOW_LIVE_OVERRIDE}" ]; then
                      ALLOW_LIVE_INPUT="${ALLOW_LIVE_OVERRIDE}"
                  fi
                  if [ -n "${NODELETE_OVERRIDE}" ]; then
                      NODELETE_INPUT="${NODELETE_OVERRIDE}"
                  fi

                  echo "allow_live: branch_default=${ALLOW_LIVE} override='${ALLOW_LIVE_OVERRIDE_RAW}' effective=${ALLOW_LIVE_INPUT}"
                  echo "nodelete  : commit_default_allow_delete=${ALLOW_DELETE} override='${NODELETE_OVERRIDE_RAW}' effective=${NODELETE_INPUT}"

                  echo "ALLOW_LIVE_INPUT=${ALLOW_LIVE_INPUT}" >> "$GITHUB_ENV"
                  echo "NODELETE_INPUT=${NODELETE_INPUT}" >> "$GITHUB_ENV"

            - name: Deploy
              uses: iamota/iamota-github-actions/.github/actions/shopify-theme-push@v1
              with:
                  store: ${{ env.TARGET_STORE }}
                  theme_id: ${{ steps.resolve_theme_id.outputs.value }}
                  token: ${{ steps.resolve_token.outputs.value }}
                  path: ${{ steps.prepare.outputs.theme_dist_effective }}
                  allow_live: ${{ env.ALLOW_LIVE_INPUT }}
                  nodelete: ${{ env.NODELETE_INPUT }}
                  ignore: ${{ steps.resolve_ignore.outputs.value }}
                  json: ${{ steps.resolve_json.outputs.value }}
