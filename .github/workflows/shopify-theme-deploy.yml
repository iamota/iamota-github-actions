name: Shopify Theme Deploy (Canonical)

on:
    workflow_call:
        inputs:
            branch:
                type    : string
                required: true
            SHOPIFY_STORE:
                type    : string
                required: false
                default : ""
            SHOPIFY_THEME_ID:
                type    : string
                required: true
            theme_src:
                type    : string
                required: false
                default : "."
            theme_dist:
                type    : string
                required: false
                default : ""
            theme_path:
                type    : string
                required: false
                default : ""
            build_install_command:
                type    : string
                required: false
                default : "npm ci"
            build_command:
                type    : string
                required: false
                default : "npx webpack --env target=${GITHUB_BRANCH}"
        secrets:
            SHOPIFY_THEME_ACCESS_TOKEN:
                required: true

permissions:
    contents: read

jobs:
    deploy:
        runs-on: ubuntu-latest
        env:
            GITHUB_BRANCH             : ${{ inputs.branch }}
            GITHUB_SHA                : ${{ github.sha }}
            THEME_SRC                 : ${{ inputs.theme_src }}
            THEME_DIST                : ${{ inputs.theme_dist }}
            THEME_PATH                : ${{ inputs.theme_path }}
            BUILD_INSTALL_COMMAND     : ${{ inputs.build_install_command }}
            BUILD_COMMAND             : ${{ inputs.build_command }}
            SHOPIFY_STORE             : ${{ inputs.SHOPIFY_STORE }}
            SHOPIFY_THEME_ID          : ${{ inputs.SHOPIFY_THEME_ID }}
            SHOPIFY_THEME_ACCESS_TOKEN: ${{ secrets.SHOPIFY_THEME_ACCESS_TOKEN }}

        steps:
            - uses: actions/checkout@v4

            - name: Setup Node + Install Shopify CLI
              uses: iamota/iamota-github-actions/.github/actions/shopify-cli-install@main

            - name: Resolve theme source and dist inputs
              run: |
                  set -euo pipefail

                  SRC="${THEME_SRC:-.}"
                  DIST_IN="${THEME_DIST:-}"
                  PATH_IN="${THEME_PATH:-}"

                  if [ -n "${PATH_IN}" ] && [ -z "${DIST_IN}" ]; then
                      DIST_IN="${PATH_IN}"
                  fi

                  if [ ! -d "${SRC}" ]; then
                      echo "THEME_SRC directory not found: ${SRC}"
                      exit 1
                  fi

                  echo "DIST_INPUT=${DIST_IN}" >> "$GITHUB_ENV"

            - name: NPM install (self-aware)
              uses: iamota/iamota-github-actions/.github/actions/npm-install@main
              with:
                  working_directory: "."
                  install_command: ${{ env.BUILD_INSTALL_COMMAND }}
                  if_package_json: "1"

            - name: Webpack build (self-aware)
              id: webpack
              uses: iamota/iamota-github-actions/.github/actions/webpack-build@main
              env:
                  GITHUB_BRANCH: ${{ inputs.branch }}
              with:
                  working_directory: "."
                  build_command: ${{ env.BUILD_COMMAND }}
                  if_webpack_config: "1"

            - name: Finalize deploy path
              run: |
                  set -euo pipefail

                  DIST="${DIST_INPUT:-}"
                  if [ -z "${DIST}" ]; then
                      if [ "${{ steps.webpack.outputs.ran }}" = "true" ]; then
                          DIST="./dist"
                      else
                          DIST="${THEME_SRC:-.}"
                      fi
                  fi

                  if [ ! -d "${DIST}" ]; then
                      echo "Resolved deploy path not found: ${DIST}"
                      exit 1
                  fi

                  echo "THEME_DIST_EFFECTIVE=${DIST}" >> "$GITHUB_ENV"

            - name: Determine allow-live and nodelete flags safely
              run: |
                  set -euo pipefail

                  ALLOW_LIVE="false"
                  if [[ "${GITHUB_BRANCH}" =~ ^[Pp]roduction$ || "${GITHUB_BRANCH}" =~ ^[Pp]rod$ ]]; then
                      ALLOW_LIVE="true"
                  fi

                  ALLOW_DELETE="false"
                  if git log -1 --pretty=%B | grep -q '\[Allow Delete\]'; then
                      ALLOW_DELETE="true"
                  fi

                  if [ "${ALLOW_LIVE}" = "true" ]; then
                      echo "ALLOW_LIVE_INPUT=1" >> "$GITHUB_ENV"
                  else
                      echo "ALLOW_LIVE_INPUT=0" >> "$GITHUB_ENV"
                  fi

                  if [ "${ALLOW_DELETE}" = "true" ]; then
                      echo "NODELETE_INPUT=0" >> "$GITHUB_ENV"
                  else
                      echo "NODELETE_INPUT=1" >> "$GITHUB_ENV"
                  fi

            - name: Deploy
              uses: iamota/iamota-github-actions/.github/actions/shopify-theme-push@main
              with:
                  store     : ${{ env.SHOPIFY_STORE }}
                  theme_id  : ${{ env.SHOPIFY_THEME_ID }}
                  token     : ${{ env.SHOPIFY_THEME_ACCESS_TOKEN }}
                  path      : ${{ env.THEME_DIST_EFFECTIVE }}
                  allow_live: ${{ env.ALLOW_LIVE_INPUT }}
                  nodelete  : ${{ env.NODELETE_INPUT }}
