name: Shopify JSON Sync - Manual

on:
    workflow_call:
        inputs:
            target_branch:
                type: string
                required: true
            source_theme_id:
                type: string
                required: true
            theme_src:
                type: string
                required: false
                default: "."
            theme_pull_dir:
                type: string
                required: false
                default: "_remote_theme"
            SHOPIFY_STORE:
                type: string
                required: false
                default: ""
        secrets:
            SHOPIFY_THEME_ACCESS_TOKEN:
                required: true
            IAMOTA_ACTIONS_READ_TOKEN:
                required: false

permissions:
    contents: write

concurrency:
    group: iamota-shopify-json-sync-manual-${{ inputs.target_branch }}
    cancel-in-progress: false

jobs:
    resolve_master_store:
        runs-on: ubuntu-latest
        outputs:
            first_store: ${{ steps.stores.outputs.first_store }}
        steps:
            - id: stores
              uses: iamota/iamota-github-actions/.github/actions/shopify-multistore-matrix@main
              with:
                  stores: ${{ inputs.SHOPIFY_STORE }}

    sync_manual:
        needs: [resolve_master_store]
        runs-on: ubuntu-latest
        env:
            TARGET_BRANCH: ${{ inputs.target_branch }}
            MASTER_STORE: ${{ needs.resolve_master_store.outputs.first_store }}
            SOURCE_THEME_ID_RAW: ${{ inputs.source_theme_id }}
            RAW_THEME_SRC: ${{ inputs.theme_src }}
            RAW_THEME_PULL_DIR: ${{ inputs.theme_pull_dir }}
            RAW_SHOPIFY_THEME_ACCESS_TOKEN: ${{ secrets.SHOPIFY_THEME_ACCESS_TOKEN }}
            RAW_IAMOTA_ACTIONS_READ_TOKEN: ${{ secrets.IAMOTA_ACTIONS_READ_TOKEN }}
            SHOPIFY_CLI_TTY: "0"

        steps:
            - name: Resolve master theme source path
              id: resolve_theme_src
              uses: iamota/iamota-github-actions/.github/actions/shopify-multistore-resolve-value@main
              with:
                  store: ${{ env.MASTER_STORE }}
                  raw: ${{ env.RAW_THEME_SRC }}

            - name: Resolve master theme pull path
              id: resolve_theme_pull_dir
              uses: iamota/iamota-github-actions/.github/actions/shopify-multistore-resolve-value@main
              with:
                  store: ${{ env.MASTER_STORE }}
                  raw: ${{ env.RAW_THEME_PULL_DIR }}

            - name: Resolve master source theme id
              id: resolve_source_theme
              uses: iamota/iamota-github-actions/.github/actions/shopify-multistore-resolve-value@main
              with:
                  store: ${{ env.MASTER_STORE }}
                  raw: ${{ env.SOURCE_THEME_ID_RAW }}

            - name: Resolve master Shopify token
              id: resolve_shopify_token
              uses: iamota/iamota-github-actions/.github/actions/shopify-multistore-resolve-value@main
              with:
                  store: ${{ env.MASTER_STORE }}
                  raw: ${{ env.RAW_SHOPIFY_THEME_ACCESS_TOKEN }}

            - name: Resolve helper checkout token (optional)
              id: resolve_helper_token
              uses: iamota/iamota-github-actions/.github/actions/shopify-multistore-resolve-value@main
              with:
                  store: ${{ env.MASTER_STORE }}
                  raw: ${{ env.RAW_IAMOTA_ACTIONS_READ_TOKEN }}

            - name: Export resolved master source settings
              run: |
                  set -euo pipefail
                  {
                      echo "THEME_SRC=${{ steps.resolve_theme_src.outputs.value != '' && steps.resolve_theme_src.outputs.value || '.' }}"
                      echo "THEME_PULL_DIR=${{ steps.resolve_theme_pull_dir.outputs.value != '' && steps.resolve_theme_pull_dir.outputs.value || '_remote_theme' }}"
                      echo "SHOPIFY_STORE=${MASTER_STORE}"
                      echo "SOURCE_THEME_ID=${{ steps.resolve_source_theme.outputs.value }}"
                      echo "SHOPIFY_THEME_ACCESS_TOKEN=${{ steps.resolve_shopify_token.outputs.value }}"
                  } >> "$GITHUB_ENV"

            - name: Checkout target branch
              uses: actions/checkout@v4
              with:
                  ref: ${{ env.TARGET_BRANCH }}
                  fetch-depth: 0

            - name: Validate required values
              run: |
                  set -euo pipefail
                  MISSING=()
                  [ -n "${SHOPIFY_STORE:-}" ] || MISSING+=("SHOPIFY_STORE input/var")
                  [ -n "${SOURCE_THEME_ID:-}" ] || MISSING+=("source_theme_id")
                  [ -n "${SHOPIFY_THEME_ACCESS_TOKEN:-}" ] || MISSING+=("SHOPIFY_THEME_ACCESS_TOKEN secret")
                  if [ "${#MISSING[@]}" -gt 0 ]; then
                      echo "Missing required values: ${MISSING[*]}"
                      exit 1
                  fi

            - name: Checkout helper scripts
              uses: iamota/iamota-github-actions/.github/actions/iamota-helper-checkout@main
              with:
                  ref: main
                  token: ${{ steps.resolve_helper_token.outputs.value }}
                  path: .iamota-actions

            - name: Setup Node + Install Shopify CLI
              uses: iamota/iamota-github-actions/.github/actions/shopify-cli-install@main

            - name: Reset pulled theme directory
              run: |
                  set -euo pipefail
                  rm -rf "${THEME_PULL_DIR}"

            - name: Pull source theme into temp directory
              uses: iamota/iamota-github-actions/.github/actions/shopify-theme-pull@main
              with:
                  store: ${{ env.SHOPIFY_STORE }}
                  theme_id: ${{ env.SOURCE_THEME_ID }}
                  token: ${{ env.SHOPIFY_THEME_ACCESS_TOKEN }}
                  path: ${{ env.THEME_PULL_DIR }}
                  nodelete: "1"
                  ignore_csv: "*.liquid,*.css,*.scss,*.sass,*.js,*.png,*.jpg,*.jpeg,*.gif,*.svg,*.txt,*.md,*.map"

            - name: Sync remote JSON into repo layout (writes report)
              env:
                  WRITE_REPORT: "true"
                  REPORT_PATH: "/tmp/shopify-json-sync-manual.report.json"
              run: |
                  set -euo pipefail
                  node .iamota-actions/.github/scripts/shopify/sync-shopify-json.mjs
                  test -f /tmp/shopify-json-sync-manual.report.json && cat /tmp/shopify-json-sync-manual.report.json || true

            - name: Remove temp helper folders before git status/commit
              run: |
                  set -euo pipefail
                  rm -rf .iamota-actions "${THEME_PULL_DIR}"

            - name: Commit and push to target branch (if changed)
              run: |
                  set -euo pipefail
                  if [ -z "$(git status --porcelain)" ]; then
                      echo "No JSON sync changes to commit."
                      exit 0
                  fi

                  git config user.name  "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"

                  git add -A

                  TS="$(TZ=America/Los_Angeles date '+%Y-%m-%d %H:%M %Z')"
                  SRC_STORE_RAW="${SHOPIFY_STORE:-unknown-store}"
                  SRC_STORE="${SRC_STORE_RAW#https://}"
                  SRC_STORE="${SRC_STORE#http://}"
                  SRC_STORE="${SRC_STORE%%/*}"
                  SRC_STORE="${SRC_STORE%.myshopify.com}"
                  [ -n "${SRC_STORE}" ] || SRC_STORE="unknown-store"
                  git commit -m "Shopify JSON Sync from ${SRC_STORE}#${SOURCE_THEME_ID} @ ${TS}"
                  git push origin "${TARGET_BRANCH}"
