name: Shopify Backup Workflow

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
    secrets:
      SHOPIFY_CLI_THEME_TOKEN:
        required: true
      AWS_ACCESS_KEY_ID:
        required: false
      AWS_SECRET_ACCESS_KEY:
        required: false
    vars:
      SHOPIFY_FLAG_STORE: {}
      SHOPIFY_FLAG_THEME_ID: {}
      AWS_S3_BUCKET_SHOPIFY_BACKUPS: {}
      DEPLOY_TARGETS: {}

jobs:
  backup:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    strategy:
      matrix:
        target: ${{ fromJSON(vars.DEPLOY_TARGETS || '["DEFAULT"]') }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.1
          bundler: latest
      - run: npm install -g "@shopify/cli@latest"

      - name: Resolve store and theme ID
        run: |
          if [ "${{ matrix.target }}" != "DEFAULT" ]; then
            echo "SHOPIFY_FLAG_STORE=${{ vars[format('SHOPIFY_FLAG_STORE_{0}', matrix.target)] }}" >> $GITHUB_ENV
            echo "SHOPIFY_FLAG_THEME_ID=${{ vars[format('SHOPIFY_FLAG_THEME_ID_{0}', matrix.target)] }}" >> $GITHUB_ENV
          else
            echo "SHOPIFY_FLAG_STORE=${{ vars.SHOPIFY_FLAG_STORE }}" >> $GITHUB_ENV
            echo "SHOPIFY_FLAG_THEME_ID=${{ vars.SHOPIFY_FLAG_THEME_ID }}" >> $GITHUB_ENV
          fi

      - name: Pull theme
        uses: ./.github/actions/shopify-pull
        with:
          store: ${{ env.SHOPIFY_FLAG_STORE }}
          theme_id: ${{ env.SHOPIFY_FLAG_THEME_ID }}
          token: ${{ matrix.target != 'DEFAULT' && secrets[format('SHOPIFY_CLI_THEME_TOKEN_{0}', matrix.target)] || secrets.SHOPIFY_CLI_THEME_TOKEN }}
          path: ./backup

      - uses: ./.github/actions/zip-folder
        with:
          folder: ./backup
          output: theme-backup.zip

      - name: Set backup file path
        run: |
          REPO_NAME=$(basename "$GITHUB_REPOSITORY")
          YEAR=$(date +%Y)
          DATETIME=$(date +%Y-%m-%d_%H%M%S)
          SANITIZED_BRANCH=$(echo "$GITHUB_BRANCH" | tr '/' '_')
          FILE_NAME="${REPO_NAME}__${DATETIME}__${SANITIZED_BRANCH}__${SHOPIFY_FLAG_THEME_ID}__${GITHUB_SHA}"
          ZIP_NAME="${FILE_NAME}.zip"
          DEST_PATH="${YEAR}/${REPO_NAME}/${ZIP_NAME}"
          mv theme-backup.zip "$ZIP_NAME"
          echo "FILE_NAME=$FILE_NAME" >> $GITHUB_ENV
          echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV
          echo "DEST_PATH=$DEST_PATH" >> $GITHUB_ENV

      - uses: ./.github/actions/aws-s3-upload
        if: ${{ env.AWS_S3_BUCKET != '' }}
        with:
          file: ${{ env.ZIP_NAME }}
          bucket: ${{ env.AWS_S3_BUCKET }}
          dest_path: ${{ env.DEST_PATH }}

      - uses: ./.github/actions/github-artifact-upload
        with:
          name: ${{ env.FILE_NAME }}
          path: ./backup
