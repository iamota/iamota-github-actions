name: Shopify PR Preview

on:
    workflow_call:
        inputs:
            theme_src:
                type: string
                required: false
                default: "."

            theme_dist:
                type: string
                required: false
                default: ""

            theme_pull_dir:
                type: string
                required: false
                default: "_remote_theme"

            build_install_command:
                type: string
                required: false
                default: "npm ci"

            build_command:
                type: string
                required: false
                default: "npx webpack --env target=${GITHUB_BRANCH}"

            enable_preview_backup:
                type: string
                required: false
                default: "true"

            aws_region:
                type: string
                required: false
                default: "us-west-2"

            aws_s3_bucket:
                type: string
                required: false
                default: ""

            shopify_ignore:
                type: string
                required: false
                default: ""
            SHOPIFY_STORE:
                type: string
                required: false
                default: ""
            SHOPIFY_THEME_ID:
                type: string
                required: false
                default: ""
            SHOPIFY_PREVIEW_BASE_THEME_ID:
                type: string
                required: false
                default: ""

        secrets:
            SHOPIFY_STORE:
                required: false
            SHOPIFY_THEME_ID:
                required: false
            SHOPIFY_CLI_PARTNERS_TOKEN:
                required: true
            SHOPIFY_PREVIEW_BASE_THEME_ID:
                required: false

            AWS_ACCESS_KEY_ID:
                required: false
            AWS_SECRET_ACCESS_KEY:
                required: false
            IAMOTA_ACTIONS_READ_TOKEN:
                required: false

permissions:
    contents: write
    pull-requests: write

concurrency:
    group: iamota-shopify-pr-preview-${{ github.event.pull_request.number || github.run_id }}
    cancel-in-progress: false

jobs:
    pr_preview:
        if: github.event_name == 'pull_request' && github.event.action != 'closed'
        runs-on: ubuntu-latest

        env:
            THEME_SRC               : ${{ inputs.theme_src }}
            THEME_DIST              : ${{ inputs.theme_dist }}
            THEME_PULL_DIR          : ${{ inputs.theme_pull_dir }}

            BUILD_INSTALL_COMMAND   : ${{ inputs.build_install_command }}
            BUILD_COMMAND           : ${{ inputs.build_command }}

            ENABLE_PREVIEW_BACKUP   : ${{ inputs.enable_preview_backup }}

            AWS_REGION              : ${{ inputs.aws_region }}
            AWS_S3_BUCKET           : ${{ inputs.aws_s3_bucket }}
            AWS_ACCESS_KEY_ID       : ${{ secrets.AWS_ACCESS_KEY_ID }}
            AWS_SECRET_ACCESS_KEY   : ${{ secrets.AWS_SECRET_ACCESS_KEY }}

            SHOPIFY_IGNORE          : ${{ inputs.shopify_ignore }}

            SHOPIFY_STORE             : ${{ inputs.SHOPIFY_STORE != '' && inputs.SHOPIFY_STORE || secrets.SHOPIFY_STORE }}
            SHOPIFY_THEME_ID          : ${{ inputs.SHOPIFY_THEME_ID != '' && inputs.SHOPIFY_THEME_ID || secrets.SHOPIFY_THEME_ID }}
            SHOPIFY_PREVIEW_BASE_ID   : ${{ inputs.SHOPIFY_PREVIEW_BASE_THEME_ID != '' && inputs.SHOPIFY_PREVIEW_BASE_THEME_ID || secrets.SHOPIFY_PREVIEW_BASE_THEME_ID }}
            SHOPIFY_CLI_PARTNERS_TOKEN: ${{ secrets.SHOPIFY_CLI_PARTNERS_TOKEN }}
            SHOPIFY_CLI_TTY           : "0"

        steps:
            - name: Checkout PR head
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Validate required Shopify values
              run: |
                  set -euo pipefail
                  MISSING=()
                  [ -n "${SHOPIFY_STORE:-}" ] || MISSING+=("SHOPIFY_STORE (input or secret) / SHOPIFY_STORE var")
                  [ -n "${SHOPIFY_THEME_ID:-}" ] || MISSING+=("SHOPIFY_THEME_ID (input or secret) / SHOPIFY_THEME_ID var")
                  [ -n "${SHOPIFY_PREVIEW_BASE_ID:-}" ] || MISSING+=("SHOPIFY_PREVIEW_BASE_THEME_ID (input or secret) / SHOPIFY_PREVIEW_BASE_THEME_ID var")
                  [ -n "${SHOPIFY_CLI_PARTNERS_TOKEN:-}" ] || MISSING+=("SHOPIFY_CLI_PARTNERS_TOKEN secret / SHOPIFY_CLI_PARTNERS_TOKEN var")

                  if [ "${#MISSING[@]}" -gt 0 ]; then
                      echo "Missing required Shopify values: ${MISSING[*]}"
                      exit 1
                  fi

            - name: Checkout helper scripts
              uses: iamota/iamota-github-actions/.github/actions/iamota-helper-checkout@main
              with:
                  ref: main
                  token: ${{ secrets.IAMOTA_ACTIONS_READ_TOKEN }}
                  path: .iamota-actions

            - name: Setup Node + Install Shopify CLI
              uses: iamota/iamota-github-actions/.github/actions/shopify-cli-install@main

            - name: Fetch base branch
              run: |
                  set -euo pipefail
                  BASE_REF="${{ github.base_ref }}"
                  git fetch origin "${BASE_REF}:${BASE_REF}" --force

            - name: Attempt local merge (base -> PR head) to test conflicts
              id: mergecheck
              run: |
                  set -euo pipefail

                  BASE_REF="${{ github.base_ref }}"

                  set +e
                  git merge --no-ff --no-commit "${BASE_REF}"
                  MERGE_EXIT=$?
                  set -e

                  if [ "${MERGE_EXIT}" -ne 0 ]; then
                      echo "has_conflicts=true" >> "$GITHUB_OUTPUT"
                      git merge --abort || true
                      exit 0
                  fi

                  echo "has_conflicts=false" >> "$GITHUB_OUTPUT"

            - name: Reset pulled theme directory
              if: steps.mergecheck.outputs.has_conflicts == 'false'
              run: |
                  set -euo pipefail
                  rm -rf "${THEME_PULL_DIR}"

            - name: Pull full remote theme into temp directory
              if: steps.mergecheck.outputs.has_conflicts == 'false'
              uses: iamota/iamota-github-actions/.github/actions/shopify-cli-pull@main
              with:
                  store: ${{ env.SHOPIFY_STORE }}
                  theme_id: ${{ env.SHOPIFY_THEME_ID }}
                  token: ${{ env.SHOPIFY_CLI_PARTNERS_TOKEN }}
                  path: ${{ env.THEME_PULL_DIR }}
                  nodelete: "1"

            - name: Resolve theme source and dist inputs
              if: steps.mergecheck.outputs.has_conflicts == 'false'
              run: |
                  set -euo pipefail

                  SRC="${THEME_SRC:-.}"
                  DIST_IN="${THEME_DIST:-}"

                  if [ ! -d "${SRC}" ]; then
                      echo "THEME_SRC directory not found: ${SRC}"
                      exit 1
                  fi

                  echo "DIST_INPUT=${DIST_IN}" >> "$GITHUB_ENV"

                  ALLOW_DELETE="false"
                  if git log -1 --pretty=%B | grep -q '\[Allow Delete\]'; then
                      ALLOW_DELETE="true"
                  fi

                  echo "THEME_SRC_EFFECTIVE=${SRC}" >> "$GITHUB_ENV"
                  echo "ALLOW_DELETE=${ALLOW_DELETE}" >> "$GITHUB_ENV"

            - name: NPM install (self-aware)
              if: steps.mergecheck.outputs.has_conflicts == 'false'
              uses: iamota/iamota-github-actions/.github/actions/npm-install@main
              with:
                  working_directory: "."
                  install_command: ${{ env.BUILD_INSTALL_COMMAND }}
                  if_package_json: "1"

            - name: Webpack build (self-aware)
              if: steps.mergecheck.outputs.has_conflicts == 'false'
              id: webpack
              uses: iamota/iamota-github-actions/.github/actions/webpack-build@main
              env:
                  GITHUB_BRANCH: ${{ github.event.pull_request.head.ref }}
              with:
                  working_directory: "."
                  build_command: ${{ env.BUILD_COMMAND }}
                  if_webpack_config: "1"

            - name: Finalize theme dist
              if: steps.mergecheck.outputs.has_conflicts == 'false'
              run: |
                  set -euo pipefail
                  DIST="${DIST_INPUT:-}"
                  if [ -z "${DIST}" ]; then
                      if [ "${{ steps.webpack.outputs.ran }}" = "true" ]; then
                          DIST="./dist"
                      else
                          DIST="${THEME_SRC_EFFECTIVE}"
                      fi
                  fi

                  if [ ! -d "${DIST}" ]; then
                      echo "Resolved THEME_DIST directory not found: ${DIST}"
                      exit 1
                  fi

                  echo "THEME_DIST_EFFECTIVE=${DIST}" >> "$GITHUB_ENV"

            - name: Drift check (DRY_RUN) against merge result (report only)
              if: steps.mergecheck.outputs.has_conflicts == 'false'
              id: drift
              env:
                  DRY_RUN: "true"
                  WRITE_REPORT: "true"
                  REPORT_PATH: "/tmp/pr-json-drift.report.json"
              run: |
                  set -euo pipefail

                  node .iamota-actions/.github/scripts/shopify/sync-shopify-json.mjs

                  CHANGED_COUNT="$(node -e "const fs=require('fs');const j=JSON.parse(fs.readFileSync('/tmp/pr-json-drift.report.json','utf8'));const c=(j.totals.added+j.totals.replaced+j.totals.deleted);process.stdout.write(String(c));")"
                  echo "changed_count=${CHANGED_COUNT}" >> "$GITHUB_OUTPUT"

                  node - <<'NODE'
                  const fs = require('fs');
                  const j = JSON.parse(fs.readFileSync('/tmp/pr-json-drift.report.json', 'utf8'));
                  const out = [];
                  for (const b of (j.bases || [])) {
                      for (const p of (b.files?.added || [])) out.push(p);
                      for (const p of (b.files?.replaced || [])) out.push(p);
                      for (const p of (b.files?.deleted || [])) out.push(p);
                  }
                  fs.writeFileSync('/tmp/pr-json-drift.files.txt', out.sort().join('\n'), 'utf8');
                  NODE

            - name: Apply sync (for preview correctness)
              if: steps.mergecheck.outputs.has_conflicts == 'false'
              env:
                  DRY_RUN: "false"
              run: |
                  set -euo pipefail
                  node .iamota-actions/.github/scripts/shopify/sync-shopify-json.mjs

            - name: Overlay THEME_DIST into remote theme using deploy-style ignores
              if: steps.mergecheck.outputs.has_conflicts == 'false'
              run: |
                  set -euo pipefail

                  IGNORE_ARGS=()
                  if [ -f ".shopifyignore" ]; then
                      IGNORE_ARGS+=(--exclude-from=".shopifyignore")
                  fi

                  IFS=',' read -r -a IG <<< "${SHOPIFY_IGNORE}"
                  for g in "${IG[@]}"; do
                      g_trim="$(echo "${g}" | xargs)"
                      if [ -n "${g_trim}" ]; then
                          IGNORE_ARGS+=(--exclude "${g_trim}")
                      fi
                  done

                  DELETE_ARGS=()
                  if [ "${ALLOW_DELETE}" = "true" ]; then
                      DELETE_ARGS+=(--delete)
                  fi

                  rsync -a "${DELETE_ARGS[@]}" "${IGNORE_ARGS[@]}" \
                      "${THEME_DIST_EFFECTIVE%/}/" \
                      "${THEME_PULL_DIR%/}/"

            - name: Resolve preview theme id from PR marker (if any)
              if: steps.mergecheck.outputs.has_conflicts == 'false'
              id: themeid
              env:
                  GH_TOKEN: ${{ github.token }}
              run: |
                  set -euo pipefail
                  OUT="$(
                    node .iamota-actions/.github/scripts/github/github-pr-comment-marker-get.mjs \
                      --repo "${{ github.repository }}" \
                      --pr "${{ github.event.pull_request.number }}" \
                      --marker "iamota-shopify-preview" \
                      --extract-regex "theme_id=(\\d+)" \
                      --refresh-after-comments "75"
                  )"
                  echo "${OUT}"
                  THEME_ID="$(echo "${OUT}" | node .iamota-actions/.github/scripts/common/json-read-field.mjs --path extracted_value)"
                  SHOULD_REFRESH="$(echo "${OUT}" | node .iamota-actions/.github/scripts/common/json-read-field.mjs --path should_refresh)"
                  NEWER_COUNT="$(echo "${OUT}" | node .iamota-actions/.github/scripts/common/json-read-field.mjs --path newer_comment_count)"
                  echo "theme_id=${THEME_ID}" >> "$GITHUB_OUTPUT"
                  echo "should_refresh=${SHOULD_REFRESH}" >> "$GITHUB_OUTPUT"
                  echo "newer_comment_count=${NEWER_COUNT}" >> "$GITHUB_OUTPUT"

            - name: Prepare preview backup filename
              if: steps.mergecheck.outputs.has_conflicts == 'false' && steps.themeid.outputs.theme_id != '' && env.ENABLE_PREVIEW_BACKUP == 'true'
              run: |
                  set -euo pipefail

                  PR_NUMBER="${{ github.event.pull_request.number }}"
                  BRANCH="${{ github.event.pull_request.head.ref }}"
                  THEME_ID="${{ steps.themeid.outputs.theme_id }}"

                  TS="$(TZ=America/Los_Angeles date '+%Y-%m-%d_%H%M%S_%Z')"
                  REPO_NAME="$(basename "${{ github.repository }}")"
                  SAFE_BRANCH="$(echo "${BRANCH}" | tr '/' '_')"

                  ZIP_NAME="${REPO_NAME}__PR${PR_NUMBER}__${SAFE_BRANCH}__preview_theme_${THEME_ID}__${TS}.zip"

                  echo "PREVIEW_BACKUP_DIR=preview_backup" >> "$GITHUB_ENV"
                  echo "PREVIEW_BACKUP_ZIP=${ZIP_NAME}" >> "$GITHUB_ENV"
                  echo "PREVIEW_S3_DEST=shopify-preview-backups/${ZIP_NAME}" >> "$GITHUB_ENV"

            - name: Pull existing preview theme for backup
              if: steps.mergecheck.outputs.has_conflicts == 'false' && steps.themeid.outputs.theme_id != '' && env.ENABLE_PREVIEW_BACKUP == 'true'
              uses: iamota/iamota-github-actions/.github/actions/shopify-cli-pull@main
              with:
                  store: ${{ env.SHOPIFY_STORE }}
                  theme_id: ${{ steps.themeid.outputs.theme_id }}
                  token: ${{ env.SHOPIFY_CLI_PARTNERS_TOKEN }}
                  path: ${{ env.PREVIEW_BACKUP_DIR }}

            - name: Zip preview backup
              if: steps.mergecheck.outputs.has_conflicts == 'false' && steps.themeid.outputs.theme_id != '' && env.ENABLE_PREVIEW_BACKUP == 'true'
              uses: iamota/iamota-github-actions/.github/actions/zip-folder@main
              with:
                  folder: ${{ env.PREVIEW_BACKUP_DIR }}
                  output: ${{ env.PREVIEW_BACKUP_ZIP }}

            - name: Configure AWS credentials (optional)
              if: steps.mergecheck.outputs.has_conflicts == 'false' && env.AWS_S3_BUCKET != '' && env.AWS_ACCESS_KEY_ID != '' && env.AWS_SECRET_ACCESS_KEY != ''
              uses: aws-actions/configure-aws-credentials@v4
              with:
                  aws-access-key-id: ${{ env.AWS_ACCESS_KEY_ID }}
                  aws-secret-access-key: ${{ env.AWS_SECRET_ACCESS_KEY }}
                  aws-region: ${{ env.AWS_REGION }}

            - name: Upload preview backup zip to S3 (optional)
              if: steps.mergecheck.outputs.has_conflicts == 'false' && steps.themeid.outputs.theme_id != '' && env.ENABLE_PREVIEW_BACKUP == 'true' && env.AWS_S3_BUCKET != '' && env.AWS_ACCESS_KEY_ID != '' && env.AWS_SECRET_ACCESS_KEY != ''
              uses: iamota/iamota-github-actions/.github/actions/aws-s3-upload@main
              with:
                  file: ${{ env.PREVIEW_BACKUP_ZIP }}
                  bucket: ${{ env.AWS_S3_BUCKET }}
                  dest_path: ${{ env.PREVIEW_S3_DEST }}

            - name: Upload preview backup artifact (optional)
              if: steps.mergecheck.outputs.has_conflicts == 'false' && steps.themeid.outputs.theme_id != '' && env.ENABLE_PREVIEW_BACKUP == 'true'
              uses: iamota/iamota-github-actions/.github/actions/github-artifact-upload@main
              with:
                  name: shopify-preview-backup-pr-${{ github.event.pull_request.number }}
                  path: ${{ env.PREVIEW_BACKUP_ZIP }}

            - name: Create preview theme (duplicate base) if missing
              if: steps.mergecheck.outputs.has_conflicts == 'false' && steps.themeid.outputs.theme_id == ''
              id: createtheme
              run: |
                  set -euo pipefail

                  PR_NUMBER="${{ github.event.pull_request.number }}"
                  BRANCH="${{ github.event.pull_request.head.ref }}"
                  NAME="iamota (${BRANCH}) PR#${PR_NUMBER}"

                  OUT="$(
                      shopify theme duplicate \
                          --store "${SHOPIFY_STORE}" \
                          --theme "${SHOPIFY_PREVIEW_BASE_ID}" \
                          --name "${NAME}" \
                          --password "${SHOPIFY_CLI_PARTNERS_TOKEN}" \
                          --force \
                          --json \
                          --no-color
                  )"

                  THEME_ID="$(echo "${OUT}" | node .iamota-actions/.github/scripts/common/json-read-field.mjs --path theme.id)"
                  if [ -z "${THEME_ID}" ]; then
                      echo "${OUT}"
                      echo "Failed to parse theme id from theme duplicate JSON."
                      exit 1
                  fi

                  echo "theme_id=${THEME_ID}" >> "$GITHUB_OUTPUT"

            - name: Determine preview theme id
              if: steps.mergecheck.outputs.has_conflicts == 'false'
              id: finaltheme
              run: |
                  set -euo pipefail
                  if [ -n "${{ steps.themeid.outputs.theme_id }}" ]; then
                      echo "theme_id=${{ steps.themeid.outputs.theme_id }}" >> "$GITHUB_OUTPUT"
                  else
                      echo "theme_id=${{ steps.createtheme.outputs.theme_id }}" >> "$GITHUB_OUTPUT"
                  fi

            - name: Push preview theme and capture preview URL (JSON output)
              if: steps.mergecheck.outputs.has_conflicts == 'false'
              id: push
              run: |
                  set -euo pipefail

                  THEME_ID="${{ steps.finaltheme.outputs.theme_id }}"
                  OUT="$(
                      shopify theme push \
                          --store "${SHOPIFY_STORE}" \
                          --theme "${THEME_ID}" \
                          --password "${SHOPIFY_CLI_PARTNERS_TOKEN}" \
                          --path "${THEME_PULL_DIR}" \
                          --json \
                          --no-color
                  )"

                  PREVIEW_URL="$(echo "${OUT}" | node .iamota-actions/.github/scripts/common/json-read-field.mjs --path theme.preview_url)"
                  if [ -z "${PREVIEW_URL}" ]; then
                      echo "${OUT}"
                      echo "Failed to parse preview_url from theme push JSON."
                      exit 1
                  fi

                  echo "preview_url=${PREVIEW_URL}" >> "$GITHUB_OUTPUT"

            - name: Rename preview theme to canonical name
              if: steps.mergecheck.outputs.has_conflicts == 'false'
              run: |
                  set -euo pipefail
                  PR_NUMBER="${{ github.event.pull_request.number }}"
                  BRANCH="${{ github.event.pull_request.head.ref }}"
                  NAME="iamota (${BRANCH}) PR#${PR_NUMBER}"
                  THEME_ID="${{ steps.finaltheme.outputs.theme_id }}"

                  shopify theme rename \
                      --store "${SHOPIFY_STORE}" \
                      --theme "${THEME_ID}" \
                      --name "${NAME}" \
                      --password "${SHOPIFY_CLI_PARTNERS_TOKEN}" \
                      --no-color

            - name: Build PR comment body (preview + drift status)
              if: always()
              id: preview_comment
              run: |
                  set -euo pipefail

                  AUTHOR="${{ github.event.pull_request.user.login }}"
                  BRANCH="${{ github.event.pull_request.head.ref }}"
                  BASE_REF="${{ github.base_ref }}"
                  HEAD_SHA="${{ github.event.pull_request.head.sha }}"

                  if [ "${{ steps.mergecheck.outputs.has_conflicts }}" = "true" ]; then
                      BODY="$(
                        printf '%s\n' \
                          "<!-- iamota-shopify-preview -->" \
                          "[FAIL] **Preview not generated** - merge conflicts with \`${BASE_REF}\`." \
                          "" \
                          "@${AUTHOR} please rebase/merge \`${BASE_REF}\` into your branch and resolve conflicts."
                      )"
                  else
                      THEME_ID="${{ steps.finaltheme.outputs.theme_id }}"
                      PREVIEW_URL="${{ steps.push.outputs.preview_url }}"
                      DRIFT_COUNT="${{ steps.drift.outputs.changed_count }}"

                      DRIFT_LINES=""
                      if [ -f /tmp/pr-json-drift.files.txt ]; then
                          DRIFT_LINES="$(sed 's/^/- `/' /tmp/pr-json-drift.files.txt | sed 's/$/`/' | head -n 200)"
                      fi

                      if [ "${DRIFT_COUNT}" = "0" ]; then
                          DRIFT_BLOCK="[OK] JSON matches remote."
                      else
                          DRIFT_BLOCK="[FAIL] JSON drift vs remote detected (**${DRIFT_COUNT}** file(s)). This check will fail until the PR matches remote JSON.\n\nChanged files:\n${DRIFT_LINES}"
                      fi

                      BODY="$(
                        printf '%s\n' \
                          "<!-- iamota-shopify-preview:theme_id=${THEME_ID} -->" \
                          "[OK] **Shopify preview generated** from the **local merge result** of \`${BASE_REF}\` -> \`${BRANCH}\`." \
                          "" \
                          "- Preview: ${PREVIEW_URL}" \
                          "- Theme ID: \`${THEME_ID}\`" \
                          "- Base: \`${BASE_REF}\`" \
                          "- PR head: \`${HEAD_SHA}\`" \
                          "" \
                          "${DRIFT_BLOCK}"
                      )"
                  fi

                  {
                    echo "body<<EOF"
                    printf '%s\n' "${BODY}"
                    echo "EOF"
                  } >> "$GITHUB_OUTPUT"

            - name: Upsert PR comment (preview + drift status)
              if: always()
              env:
                  GH_TOKEN: ${{ github.token }}
              run: |
                  set -euo pipefail
                  node .iamota-actions/.github/scripts/github/github-pr-comment-upsert.mjs \
                    --repo "${{ github.repository }}" \
                    --pr "${{ github.event.pull_request.number }}" \
                    --marker "iamota-shopify-preview" \
                    --body "${{ steps.preview_comment.outputs.body }}" \
                    --refresh-after-comments "75"

            - name: Remove Sync label
              if: always()
              run: |
                  set -euo pipefail
                  PR_NUMBER="${{ github.event.pull_request.number }}"
                  gh pr edit "${PR_NUMBER}" --remove-label "Sync JSON" >/dev/null 2>&1 || true

            - name: Fail job if drift detected (after preview/comment)
              if: steps.mergecheck.outputs.has_conflicts == 'false' && steps.drift.outputs.changed_count != '0'
              run: |
                  exit 1

            - name: Fail job if merge conflicts detected
              if: steps.mergecheck.outputs.has_conflicts == 'true'
              run: |
                  exit 1

    pr_cleanup:
        if: github.event_name == 'pull_request' && github.event.action == 'closed'
        runs-on: ubuntu-latest

        env:
            SHOPIFY_STORE      : ${{ secrets.SHOPIFY_STORE }}
            SHOPIFY_CLI_PARTNERS_TOKEN : ${{ secrets.SHOPIFY_CLI_PARTNERS_TOKEN }}
            SHOPIFY_CLI_TTY         : "0"

        steps:
            - name: Checkout helper scripts
              uses: iamota/iamota-github-actions/.github/actions/iamota-helper-checkout@main
              with:
                  ref: main
                  token: ${{ secrets.IAMOTA_ACTIONS_READ_TOKEN }}
                  path: .iamota-actions

            - name: Validate required Shopify secrets
              run: |
                  set -euo pipefail
                  MISSING=()
                  [ -n "${SHOPIFY_STORE:-}" ] || MISSING+=("SHOPIFY_STORE/SHOPIFY_STORE")
                  [ -n "${SHOPIFY_CLI_PARTNERS_TOKEN:-}" ] || MISSING+=("SHOPIFY_CLI_PARTNERS_TOKEN/SHOPIFY_CLI_PARTNERS_TOKEN")

                  if [ "${#MISSING[@]}" -gt 0 ]; then
                      echo "Missing required Shopify secret values: ${MISSING[*]}"
                      exit 1
                  fi

            - name: Setup Node + Install Shopify CLI
              uses: iamota/iamota-github-actions/.github/actions/shopify-cli-install@main

            - name: Find preview theme id from marker
              id: themeid
              env:
                  GH_TOKEN: ${{ github.token }}
              run: |
                  set -euo pipefail
                  OUT="$(
                    node .iamota-actions/.github/scripts/github/github-pr-comment-marker-get.mjs \
                      --repo "${{ github.repository }}" \
                      --pr "${{ github.event.pull_request.number }}" \
                      --marker "iamota-shopify-preview" \
                      --extract-regex "theme_id=(\\d+)"
                  )"
                  echo "${OUT}"
                  THEME_ID="$(echo "${OUT}" | node .iamota-actions/.github/scripts/common/json-read-field.mjs --path extracted_value)"
                  echo "theme_id=${THEME_ID}" >> "$GITHUB_OUTPUT"

            - name: Delete preview theme (if exists)
              if: steps.themeid.outputs.theme_id != ''
              run: |
                  set -euo pipefail

                  THEME_ID="${{ steps.themeid.outputs.theme_id }}"

                  shopify theme delete \
                      --store "${SHOPIFY_STORE}" \
                      --theme "${THEME_ID}" \
                      --password "${SHOPIFY_CLI_PARTNERS_TOKEN}" \
                      --force \
                      --no-color

            - name: Build cleanup comment body
              id: cleanup_comment
              run: |
                  set -euo pipefail

                  THEME_ID="${{ steps.themeid.outputs.theme_id }}"

                  if [ -n "${THEME_ID}" ]; then
                      BODY="<!-- iamota-shopify-preview -->[CLEANUP] Preview theme deleted: \`${THEME_ID}\`"
                  else
                      BODY="<!-- iamota-shopify-preview -->[CLEANUP] No preview theme found to delete."
                  fi

                  {
                    echo "body<<EOF"
                    printf '%s\n' "${BODY}"
                    echo "EOF"
                  } >> "$GITHUB_OUTPUT"

            - name: Upsert cleanup comment
              env:
                  GH_TOKEN: ${{ github.token }}
              run: |
                  set -euo pipefail
                  node .iamota-actions/.github/scripts/github/github-pr-comment-upsert.mjs \
                    --repo "${{ github.repository }}" \
                    --pr "${{ github.event.pull_request.number }}" \
                    --marker "iamota-shopify-preview" \
                    --body "${{ steps.cleanup_comment.outputs.body }}"

            - name: Remove Sync label
              run: |
                  set -euo pipefail
                  PR_NUMBER="${{ github.event.pull_request.number }}"
                  gh pr edit "${PR_NUMBER}" --remove-label "Sync JSON" >/dev/null 2>&1 || true
