name: Shopify JSON Sync - Dev

on:
    workflow_call:
        inputs:
            production_branch:
                type: string
                required: false
                default: "production"

            default_branch:
                type: string
                required: false
                default: ""

            shopify_store:
                type: string
                required: false
                default: ""

            shopify_theme_id:
                type: string
                required: false
                default: ""

            shopify_theme_name:
                type: string
                required: false
                default: ""

permissions:
    contents: write
    pull-requests: write

concurrency:
    group: iamota-shopify-json-sync-dev
    cancel-in-progress: false

jobs:
    resolve_master_store:
        runs-on: ubuntu-latest
        outputs:
            first_store: ${{ steps.stores.outputs.first_store }}
        steps:
            - id: stores
              uses: iamota/iamota-github-actions/.github/actions/shopify-multistore-matrix@v1
              with:
                  stores: ${{ inputs.shopify_store }}
                  allow_empty: "true"

    sync_dev:
        needs: [resolve_master_store]
        runs-on: ubuntu-latest

        env:
            PRODUCTION_BRANCH : ${{ inputs.production_branch }}
            DEFAULT_BRANCH    : ${{ inputs.default_branch != '' && inputs.default_branch || github.event.repository.default_branch }}
            MASTER_STORE      : ${{ needs.resolve_master_store.outputs.first_store }}
            RAW_SHOPIFY_THEME_ID: ${{ inputs.shopify_theme_id }}
            RAW_SHOPIFY_THEME_NAME: ${{ inputs.shopify_theme_name }}

        steps:
            - name: Resolve master theme id (metadata)
              id: resolve_theme_id
              uses: iamota/iamota-github-actions/.github/actions/shopify-multistore-resolve-value@v1
              with:
                  store: ${{ env.MASTER_STORE }}
                  raw: ${{ env.RAW_SHOPIFY_THEME_ID }}

            - name: Resolve master theme name (metadata)
              id: resolve_theme_name
              uses: iamota/iamota-github-actions/.github/actions/shopify-multistore-resolve-value@v1
              with:
                  store: ${{ env.MASTER_STORE }}
                  raw: ${{ env.RAW_SHOPIFY_THEME_NAME }}

            - name: Export resolved sync metadata values
              run: |
                  set -euo pipefail
                  {
                      echo "SHOPIFY_STORE=${MASTER_STORE}"
                      echo "SHOPIFY_THEME_ID=${{ steps.resolve_theme_id.outputs.value }}"
                      echo "SHOPIFY_THEME_NAME=${{ steps.resolve_theme_name.outputs.value }}"
                  } >> "$GITHUB_ENV"

            - name: Checkout repository
              uses: actions/checkout@v5
              with:
                  fetch-depth: 0

            - name: Show GitHub CLI version
              run: gh --version

            - name: Resolve existing Shopify JSON sync PRs (production -> default)
              id: existing_pr
              env:
                  GH_TOKEN: ${{ github.token }}
              run: |
                  set -euo pipefail

                  mapfile -t PR_ROWS < <(
                      gh pr list \
                          --base "${DEFAULT_BRANCH}" \
                          --head "${PRODUCTION_BRANCH}" \
                          --state open \
                          --json number,title,url \
                          --jq '.[] | select(.title | startswith("Shopify JSON Sync")) | [.number, .url] | @tsv' \
                      || true
                  )

                  if [ "${#PR_ROWS[@]}" -eq 0 ]; then
                      echo "No existing Shopify JSON sync PR found."
                      echo "number=" >> "$GITHUB_OUTPUT"
                      echo "url=" >> "$GITHUB_OUTPUT"
                      exit 0
                  fi

                  IFS=$'\t' read -r PRIMARY_PR PRIMARY_URL <<< "${PR_ROWS[0]}"
                  echo "Using existing Shopify JSON sync PR #${PRIMARY_PR}"
                  echo "number=${PRIMARY_PR}" >> "$GITHUB_OUTPUT"
                  echo "url=${PRIMARY_URL}" >> "$GITHUB_OUTPUT"

                  if [ "${#PR_ROWS[@]}" -gt 1 ]; then
                      for row in "${PR_ROWS[@]:1}"; do
                          IFS=$'\t' read -r EXTRA_PR EXTRA_URL <<< "${row}"
                          echo "Closing duplicate sync PR #${EXTRA_PR} (superseded by #${PRIMARY_PR})"
                          gh pr comment "${EXTRA_PR}" --body "Superseded by newer Shopify JSON sync PR: ${PRIMARY_URL}" >/dev/null 2>&1 || true
                          gh pr close "${EXTRA_PR}" >/dev/null || true
                      done
                  fi

            - name: Determine branch compare status
              id: compare
              env:
                  GH_TOKEN: ${{ github.token }}
              run: |
                  set -euo pipefail

                  STATUS="$({
                      gh api \
                        "repos/${{ github.repository }}/compare/${DEFAULT_BRANCH}...${PRODUCTION_BRANCH}" \
                        --jq '.status'
                  } || echo unknown)"

                  echo "status=${STATUS}" >> "$GITHUB_OUTPUT"

            - name: Create Shopify JSON sync PR (production -> default) and enable auto-merge
              if: steps.compare.outputs.status == 'ahead' || steps.compare.outputs.status == 'diverged'
              env:
                  GH_TOKEN: ${{ github.token }}
              run: |
                  set -euo pipefail

                  TS="$(TZ=America/Los_Angeles date '+%Y-%m-%d %H:%M %Z')"
                  SRC_STORE_RAW="${SHOPIFY_STORE:-unknown-store}"
                  SRC_STORE="${SRC_STORE_RAW#https://}"
                  SRC_STORE="${SRC_STORE#http://}"
                  SRC_STORE="${SRC_STORE%%/*}"
                  SRC_STORE="${SRC_STORE%.myshopify.com}"
                  [ -n "${SRC_STORE}" ] || SRC_STORE="unknown-store"
                  SRC_THEME="${SHOPIFY_THEME_ID:-unknown-theme}"
                  TITLE="Shopify JSON Sync from ${SRC_STORE}#${SRC_THEME} @ ${TS}"
                  BODY="Automated Shopify JSON sync from theme pull."

                  if [ -n "${SHOPIFY_STORE}" ] || [ -n "${SHOPIFY_THEME_ID}" ] || [ -n "${SHOPIFY_THEME_NAME}" ]; then
                      BODY="$(printf '%s\n\nShopify source:' "${BODY}")"
                      if [ -n "${SHOPIFY_STORE}" ]; then
                          BODY="$(printf '%s\n- Store: `%s`' "${BODY}" "${SHOPIFY_STORE}")"
                      fi
                      if [ -n "${SHOPIFY_THEME_ID}" ]; then
                          BODY="$(printf '%s\n- Theme ID: `%s`' "${BODY}" "${SHOPIFY_THEME_ID}")"
                      fi
                      if [ -n "${SHOPIFY_THEME_NAME}" ]; then
                          BODY="$(printf '%s\n- Theme Name: %s' "${BODY}" "${SHOPIFY_THEME_NAME}")"
                      fi
                  fi

                  PR_NUMBER="${{ steps.existing_pr.outputs.number }}"
                  PR_URL="${{ steps.existing_pr.outputs.url }}"

                  if [ -n "${PR_NUMBER}" ]; then
                      gh pr edit "${PR_NUMBER}" --title "${TITLE}" --body "${BODY}"
                      gh pr comment "${PR_NUMBER}" --body "Sync refreshed at ${TS} from ${SRC_STORE}#${SRC_THEME}."
                  else
                      gh pr create \
                          --base "${DEFAULT_BRANCH}" \
                          --head "${PRODUCTION_BRANCH}" \
                          --title "${TITLE}" \
                          --body "${BODY}"

                      PR_URL="$(
                          gh pr list \
                              --base "${DEFAULT_BRANCH}" \
                              --head "${PRODUCTION_BRANCH}" \
                              --json url \
                              --jq '.[0].url'
                      )"
                      if [ -z "${PR_URL}" ]; then
                          echo "Failed to resolve PR URL after creation."
                          exit 1
                      fi
                  fi

                  if gh pr merge --help 2>/dev/null | grep -q -- "--auto"; then
                      set +e
                      MERGE_OUT="$(gh pr merge "${PR_URL}" --rebase --auto 2>&1)"
                      MERGE_EXIT=$?
                      set -e

                      if [ "${MERGE_EXIT}" -ne 0 ]; then
                          if printf '%s' "${MERGE_OUT}" | grep -q "Resource not accessible by integration"; then
                              echo "Auto-merge could not be enabled with the current GITHUB_TOKEN permissions."
                              echo "Verify repository settings:"
                              echo "1) Actions > General > Workflow permissions = Read and write permissions"
                              echo "2) Actions > General > Allow GitHub Actions to create and approve pull requests = enabled"
                          else
                              echo "Auto-merge enable failed:"
                              echo "${MERGE_OUT}"
                          fi
                      fi
                  else
                      echo "Current gh CLI does not support --auto; skipping auto-merge enable."
                  fi

            - name: No Shopify JSON sync PR needed
              if: steps.compare.outputs.status != 'ahead' && steps.compare.outputs.status != 'diverged'
              run: |
                  set -euo pipefail
                  echo "No Shopify JSON sync PR needed (compare status: ${{ steps.compare.outputs.status }})."
