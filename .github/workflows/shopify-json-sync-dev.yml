name: Shopify JSON Sync - Dev

on:
    workflow_call:
        inputs:
            production_branch:
                type: string
                required: false
                default: "production"

            default_branch:
                type: string
                required: false
                default: ""

            shopify_store:
                type: string
                required: false
                default: ""

            shopify_theme_id:
                type: string
                required: false
                default: ""

            shopify_theme_name:
                type: string
                required: false
                default: ""

permissions:
    contents: read
    pull-requests: write

concurrency:
    group: iamota-shopify-json-sync-dev
    cancel-in-progress: false

jobs:
    sync_dev:
        runs-on: ubuntu-latest

        env:
            PRODUCTION_BRANCH: ${{ inputs.production_branch }}
            DEFAULT_BRANCH   : ${{ inputs.default_branch != '' && inputs.default_branch || github.event.repository.default_branch }}
            SHOPIFY_STORE    : ${{ inputs.shopify_store }}
            SHOPIFY_THEME_ID : ${{ inputs.shopify_theme_id }}
            SHOPIFY_THEME_NAME: ${{ inputs.shopify_theme_name }}

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Close existing generated sync PRs (production -> default)
              env:
                  GH_TOKEN: ${{ github.token }}
              run: |
                  set -euo pipefail

                  mapfile -t PR_NUMBERS < <(
                      gh pr list \
                          --base "${DEFAULT_BRANCH}" \
                          --head "${PRODUCTION_BRANCH}" \
                          --search "in:title Shopify JSON Sync" \
                          --json number \
                          --jq '.[].number' \
                      || true
                  )

                  if [ "${#PR_NUMBERS[@]}" -eq 0 ]; then
                      echo "No prior generated sync PR found."
                      exit 0
                  fi

                  for PR in "${PR_NUMBERS[@]}"; do
                      echo "Closing prior sync PR #${PR}"
                      gh pr close "${PR}" --delete-branch=false >/dev/null || true
                  done

            - name: Determine branch compare status
              id: compare
              env:
                  GH_TOKEN: ${{ github.token }}
              run: |
                  set -euo pipefail

                  STATUS="$({
                      gh api \
                        "repos/${{ github.repository }}/compare/${DEFAULT_BRANCH}...${PRODUCTION_BRANCH}" \
                        --jq '.status'
                  } || echo unknown)"

                  echo "status=${STATUS}" >> "$GITHUB_OUTPUT"

            - name: Create Shopify JSON sync PR (production -> default) and enable auto-merge
              if: steps.compare.outputs.status == 'ahead' || steps.compare.outputs.status == 'diverged'
              env:
                  GH_TOKEN: ${{ github.token }}
              run: |
                  set -euo pipefail

                  TS="$(TZ=America/Los_Angeles date '+%Y-%m-%d %H:%M %Z')"
                  SRC_STORE_RAW="${SHOPIFY_STORE:-unknown-store}"
                  SRC_STORE="${SRC_STORE_RAW#https://}"
                  SRC_STORE="${SRC_STORE#http://}"
                  SRC_STORE="${SRC_STORE%%/*}"
                  SRC_STORE="${SRC_STORE%.myshopify.com}"
                  [ -n "${SRC_STORE}" ] || SRC_STORE="unknown-store"
                  SRC_THEME="${SHOPIFY_THEME_ID:-unknown-theme}"
                  TITLE="Shopify JSON Sync from ${SRC_STORE}#${SRC_THEME} @ ${TS}"
                  BODY="Automated Shopify JSON sync from theme pull."

                  if [ -n "${SHOPIFY_STORE}" ] || [ -n "${SHOPIFY_THEME_ID}" ] || [ -n "${SHOPIFY_THEME_NAME}" ]; then
                      BODY="$(printf '%s\n\nShopify source:' "${BODY}")"
                      if [ -n "${SHOPIFY_STORE}" ]; then
                          BODY="$(printf '%s\n- Store: `%s`' "${BODY}" "${SHOPIFY_STORE}")"
                      fi
                      if [ -n "${SHOPIFY_THEME_ID}" ]; then
                          BODY="$(printf '%s\n- Theme ID: `%s`' "${BODY}" "${SHOPIFY_THEME_ID}")"
                      fi
                      if [ -n "${SHOPIFY_THEME_NAME}" ]; then
                          BODY="$(printf '%s\n- Theme Name: %s' "${BODY}" "${SHOPIFY_THEME_NAME}")"
                      fi
                  fi

                  gh pr create \
                      --base "${DEFAULT_BRANCH}" \
                      --head "${PRODUCTION_BRANCH}" \
                      --title "${TITLE}" \
                      --body "${BODY}"

                  PR_URL="$(gh pr view --base "${DEFAULT_BRANCH}" --head "${PRODUCTION_BRANCH}" --json url --jq '.url')"

                  gh pr merge "${PR_URL}" --rebase --auto || true

            - name: No Shopify JSON sync PR needed
              if: steps.compare.outputs.status != 'ahead' && steps.compare.outputs.status != 'diverged'
              run: |
                  set -euo pipefail
                  echo "No Shopify JSON sync PR needed (compare status: ${{ steps.compare.outputs.status }})."
