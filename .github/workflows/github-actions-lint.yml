name: Workflow Sanity

on:
    pull_request:
    push:
        branches:
            - main

permissions:
    contents: read

jobs:
    actionlint:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v5
            - uses: rhysd/actionlint@v1

    node-check:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v5
            - uses: actions/setup-node@v4
              with:
                  node-version: "20"
            - name: Validate node scripts
              run: |
                  set -euo pipefail
                  while IFS= read -r f; do
                      node --check "$f"
                  done < <(find .github/scripts -type f -name "*.mjs" | sort)
