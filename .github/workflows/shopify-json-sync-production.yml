name: Shopify JSON Sync - Production

on:
    workflow_call:
        inputs:
            production_branch:
                type: string
                required: false
                default: "production"
            theme_root:
                type: string
                required: false
                default: ""

            theme_src:
                type: string
                required: false
                default: ""

            theme_pull_dir:
                type: string
                required: false
                default: "_remote_theme"
            SHOPIFY_STORE:
                type: string
                required: false
                default: ""
            SHOPIFY_THEME_ID:
                type: string
                required: false
                default: ""
            SHOPIFY_PRODUCTION_THEME_ID:
                type: string
                required: false
                default: ""

        secrets:
            SHOPIFY_THEME_ACCESS_TOKEN:
                required: false
            IAMOTA_ACTIONS_READ_TOKEN:
                required: false

permissions:
    contents: write

concurrency:
    group: iamota-shopify-json-sync-production
    cancel-in-progress: false

jobs:
    resolve_master_store:
        runs-on: ubuntu-latest
        outputs:
            first_store: ${{ steps.stores.outputs.first_store }}
            first_store_index: ${{ steps.stores.outputs.first_store_index }}
            first_store_secret_key: ${{ steps.stores.outputs.first_store_secret_key }}
        steps:
            - id: stores
              uses: iamota/iamota-github-actions/.github/actions/shopify-multistore-matrix@v1
              with:
                  stores: ${{ inputs.SHOPIFY_STORE }}

    sync_production:
        needs: [resolve_master_store]
        runs-on: ubuntu-latest

        env:
            PRODUCTION_BRANCH         : ${{ inputs.production_branch }}
            MASTER_STORE              : ${{ needs.resolve_master_store.outputs.first_store }}
            MASTER_STORE_INDEX        : ${{ needs.resolve_master_store.outputs.first_store_index }}
            MASTER_STORE_SECRET_KEY   : ${{ needs.resolve_master_store.outputs.first_store_secret_key }}
            RAW_THEME_ROOT            : ${{ inputs.theme_root }}
            RAW_THEME_SRC             : ${{ inputs.theme_src }}
            RAW_THEME_PULL_DIR        : ${{ inputs.theme_pull_dir }}
            RAW_SHOPIFY_THEME_ID      : ${{ inputs.SHOPIFY_PRODUCTION_THEME_ID != '' && inputs.SHOPIFY_PRODUCTION_THEME_ID || inputs.SHOPIFY_THEME_ID }}
            RAW_SHOPIFY_THEME_ACCESS_TOKEN: ${{ secrets.SHOPIFY_THEME_ACCESS_TOKEN }}
            RAW_SHOPIFY_THEME_ACCESS_TOKEN_NAMED: ${{ secrets[format('SHOPIFY_THEME_ACCESS_TOKEN__{0}', needs.resolve_master_store.outputs.first_store_secret_key)] }}
            RAW_SHOPIFY_THEME_ACCESS_TOKEN_INDEXED: ${{ secrets[format('SHOPIFY_THEME_ACCESS_TOKEN_{0}', needs.resolve_master_store.outputs.first_store_index)] }}
            RAW_IAMOTA_ACTIONS_READ_TOKEN: ${{ secrets.IAMOTA_ACTIONS_READ_TOKEN }}
            RAW_IAMOTA_ACTIONS_READ_TOKEN_NAMED: ${{ secrets[format('IAMOTA_ACTIONS_READ_TOKEN__{0}', needs.resolve_master_store.outputs.first_store_secret_key)] }}
            RAW_IAMOTA_ACTIONS_READ_TOKEN_INDEXED: ${{ secrets[format('IAMOTA_ACTIONS_READ_TOKEN_{0}', needs.resolve_master_store.outputs.first_store_index)] }}
            SHOPIFY_CLI_TTY           : "0"

        steps:
            - name: Resolve master theme root path
              id: resolve_theme_root
              uses: iamota/iamota-github-actions/.github/actions/shopify-multistore-resolve-value@v1
              with:
                  store: ${{ env.MASTER_STORE }}
                  raw: ${{ env.RAW_THEME_ROOT }}

            - name: Resolve master theme source path
              id: resolve_theme_src
              uses: iamota/iamota-github-actions/.github/actions/shopify-multistore-resolve-value@v1
              with:
                  store: ${{ env.MASTER_STORE }}
                  raw: ${{ env.RAW_THEME_SRC }}

            - name: Resolve master theme pull path
              id: resolve_theme_pull_dir
              uses: iamota/iamota-github-actions/.github/actions/shopify-multistore-resolve-value@v1
              with:
                  store: ${{ env.MASTER_STORE }}
                  raw: ${{ env.RAW_THEME_PULL_DIR }}

            - name: Resolve master source theme id
              id: resolve_theme_id
              uses: iamota/iamota-github-actions/.github/actions/shopify-multistore-resolve-value@v1
              with:
                  store: ${{ env.MASTER_STORE }}
                  raw: ${{ env.RAW_SHOPIFY_THEME_ID }}

            - name: Resolve effective master Shopify token
              id: resolve_shopify_token
              uses: iamota/iamota-github-actions/.github/actions/multistore-resolve-secret@v1
              with:
                  store: ${{ env.MASTER_STORE }}
                  raw: ${{ env.RAW_SHOPIFY_THEME_ACCESS_TOKEN }}
                  raw_named: ${{ secrets[format('SHOPIFY_THEME_ACCESS_TOKEN__{0}', needs.resolve_master_store.outputs.first_store_secret_key)] }}
                  raw_indexed: ${{ secrets[format('SHOPIFY_THEME_ACCESS_TOKEN_{0}', needs.resolve_master_store.outputs.first_store_index)] }}

            - name: Resolve effective helper checkout token (optional)
              id: resolve_helper_token
              uses: iamota/iamota-github-actions/.github/actions/multistore-resolve-secret@v1
              with:
                  store: ${{ env.MASTER_STORE }}
                  raw: ${{ env.RAW_IAMOTA_ACTIONS_READ_TOKEN }}
                  raw_named: ${{ secrets[format('IAMOTA_ACTIONS_READ_TOKEN__{0}', needs.resolve_master_store.outputs.first_store_secret_key)] }}
                  raw_indexed: ${{ secrets[format('IAMOTA_ACTIONS_READ_TOKEN_{0}', needs.resolve_master_store.outputs.first_store_index)] }}

            - name: Export resolved source settings
              run: |
                  set -euo pipefail
                  THEME_ROOT_VALUE="${{ steps.resolve_theme_root.outputs.value }}"
                  if [ -z "${THEME_ROOT_VALUE}" ]; then
                      THEME_ROOT_VALUE="."
                  fi
                  THEME_SRC_VALUE="${{ steps.resolve_theme_src.outputs.value }}"
                  if [ -z "${THEME_SRC_VALUE}" ]; then
                      if [ "${THEME_ROOT_VALUE}" != "." ]; then
                          THEME_SRC_VALUE="${THEME_ROOT_VALUE}"
                      else
                          THEME_SRC_VALUE="src"
                      fi
                  fi
                  {
                      echo "THEME_ROOT=${THEME_ROOT_VALUE}"
                      echo "THEME_SRC=${THEME_SRC_VALUE}"
                      echo "THEME_PULL_DIR=${{ steps.resolve_theme_pull_dir.outputs.value != '' && steps.resolve_theme_pull_dir.outputs.value || '_remote_theme' }}"
                      echo "SHOPIFY_STORE=${MASTER_STORE}"
                      echo "SHOPIFY_THEME_ID=${{ steps.resolve_theme_id.outputs.value }}"
                      echo "SHOPIFY_THEME_ACCESS_TOKEN=${{ steps.resolve_shopify_token.outputs.value }}"
                  } >> "$GITHUB_ENV"

            - name: Checkout production branch
              uses: actions/checkout@v5
              with:
                  ref: ${{ env.PRODUCTION_BRANCH }}
                  fetch-depth: 0

            - name: Validate required Shopify values
              run: |
                  set -euo pipefail
                  MISSING=()
                  [ -n "${SHOPIFY_STORE:-}" ] || MISSING+=("SHOPIFY_STORE input/var")
                  [ -n "${SHOPIFY_THEME_ID:-}" ] || MISSING+=("SHOPIFY_THEME_ID input/var")
                  [ -n "${SHOPIFY_THEME_ACCESS_TOKEN:-}" ] || MISSING+=("SHOPIFY_THEME_ACCESS_TOKEN secret")

                  if [ "${#MISSING[@]}" -gt 0 ]; then
                      echo "Missing required Shopify values: ${MISSING[*]}"
                      exit 1
                  fi

            - name: Checkout helper scripts
              uses: iamota/iamota-github-actions/.github/actions/iamota-helper-checkout@v1
              with:
                  workflow_ref: ${{ github.workflow_ref }}
                  token: ${{ steps.resolve_helper_token.outputs.value }}
                  path: .iamota-actions

            - name: Setup Node + Install Shopify CLI
              uses: iamota/iamota-github-actions/.github/actions/shopify-cli-install@v1

            - name: Reset pulled theme directory
              run: |
                  set -euo pipefail
                  rm -rf "${THEME_PULL_DIR}"

            - name: Pull theme into temp directory (json-oriented pull)
              uses: iamota/iamota-github-actions/.github/actions/shopify-theme-pull@v1
              with:
                  store     : ${{ env.SHOPIFY_STORE }}
                  theme_id  : ${{ env.SHOPIFY_THEME_ID }}
                  token     : ${{ env.SHOPIFY_THEME_ACCESS_TOKEN }}
                  path      : ${{ env.THEME_PULL_DIR }}
                  nodelete  : "1"
                  ignore_csv: "*.liquid,*.css,*.scss,*.sass,*.js,*.png,*.jpg,*.jpeg,*.gif,*.svg,*.txt,*.md,*.map"

            - name: Sync remote JSON into repo layout (writes report)
              env:
                  WRITE_REPORT: "true"
                  REPORT_PATH: "/tmp/shopify-json-sync.report.json"
              run: |
                  set -euo pipefail
                  node .iamota-actions/.github/scripts/shopify/sync-shopify-json.mjs
                  test -f /tmp/shopify-json-sync.report.json && cat /tmp/shopify-json-sync.report.json || true

            - name: Remove temp helper folders before git status/commit
              run: |
                  set -euo pipefail
                  rm -rf .iamota-actions "${THEME_PULL_DIR}"

            - name: Commit and push to production branch (if changed)
              run: |
                  set -euo pipefail

                  if [ -z "$(git status --porcelain)" ]; then
                      echo "No JSON sync changes to commit."
                      exit 0
                  fi

                  git config user.name  "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"

                  git add -A

                  TS="$(TZ=America/Los_Angeles date '+%Y-%m-%d %H:%M %Z')"
                  SRC_STORE_RAW="${SHOPIFY_STORE:-unknown-store}"
                  SRC_STORE="${SRC_STORE_RAW#https://}"
                  SRC_STORE="${SRC_STORE#http://}"
                  SRC_STORE="${SRC_STORE%%/*}"
                  SRC_STORE="${SRC_STORE%.myshopify.com}"
                  [ -n "${SRC_STORE}" ] || SRC_STORE="unknown-store"
                  SRC_THEME="${SHOPIFY_THEME_ID:-unknown-theme}"
                  git commit -m "Shopify JSON Sync from ${SRC_STORE}#${SRC_THEME} @ ${TS}"
                  git push origin "${PRODUCTION_BRANCH}"
