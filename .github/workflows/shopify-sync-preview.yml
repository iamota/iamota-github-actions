name: Shopify JSON Sync + PR Preview (Legacy Orchestration)

on:
    workflow_call:
        inputs:
            production_branch:
                type: string
                required: false
                default: "production"

            default_branch:
                type: string
                required: false
                default: ""

            theme_src:
                type: string
                required: false
                default: "."

            theme_dist:
                type: string
                required: false
                default: ""

            theme_pull_dir:
                type: string
                required: false
                default: "_remote_theme"

            build_install_command:
                type: string
                required: false
                default: "npm ci"

            build_command:
                type: string
                required: false
                default: "npx webpack --env target=${GITHUB_BRANCH}"

            enable_preview_backup:
                type: string
                required: false
                default: "true"

            aws_region:
                type: string
                required: false
                default: "us-west-2"

            aws_s3_bucket:
                type: string
                required: false
                default: ""

            shopify_ignore:
                type: string
                required: false
                default: ""
            SHOPIFY_STORE:
                type: string
                required: false
                default: ""
            SHOPIFY_THEME_ID:
                type: string
                required: false
                default: ""
            SHOPIFY_PRODUCTION_THEME_ID:
                type: string
                required: false
                default: ""
            SHOPIFY_PREVIEW_BASE_THEME_ID:
                type: string
                required: false
                default: ""

        secrets:
            SHOPIFY_THEME_ACCESS_TOKEN:
                required: true

            AWS_ACCESS_KEY_ID:
                required: false
            AWS_SECRET_ACCESS_KEY:
                required: false
            IAMOTA_ACTIONS_READ_TOKEN:
                required: false

permissions:
    contents: write
    pull-requests: write

jobs:
    json_sync_production:
        if: github.event_name != 'pull_request'
        uses: iamota/iamota-github-actions/.github/workflows/shopify-json-sync-production.yml@main
        with:
            production_branch: ${{ inputs.production_branch }}
            theme_src: ${{ inputs.theme_src }}
            theme_pull_dir: ${{ inputs.theme_pull_dir }}
            SHOPIFY_STORE: ${{ inputs.SHOPIFY_STORE }}
            SHOPIFY_THEME_ID: ${{ inputs.SHOPIFY_THEME_ID }}
        secrets:
            SHOPIFY_THEME_ACCESS_TOKEN: ${{ secrets.SHOPIFY_THEME_ACCESS_TOKEN }}
            IAMOTA_ACTIONS_READ_TOKEN: ${{ secrets.IAMOTA_ACTIONS_READ_TOKEN }}

    json_sync_dev:
        if: github.event_name != 'pull_request'
        needs: [json_sync_production]
        permissions:
            contents: write
            pull-requests: write
        uses: iamota/iamota-github-actions/.github/workflows/shopify-json-sync-dev.yml@main
        with:
            production_branch: ${{ inputs.production_branch }}
            default_branch: ${{ inputs.default_branch }}

    pr_preview:
        if: github.event_name == 'pull_request' && github.event.pull_request.head.ref != inputs.production_branch && github.event.pull_request.base.ref != inputs.production_branch && github.event.pull_request.head.ref != 'main' && github.event.pull_request.base.ref != 'main'
        uses: iamota/iamota-github-actions/.github/workflows/shopify-theme-preview-pr.yml@main
        with:
            production_branch            : ${{ inputs.production_branch }}
            theme_src                    : ${{ inputs.theme_src }}
            theme_dist                   : ${{ inputs.theme_dist }}
            theme_pull_dir               : ${{ inputs.theme_pull_dir }}
            build_install_command        : ${{ inputs.build_install_command }}
            build_command                : ${{ inputs.build_command }}
            enable_preview_backup        : ${{ inputs.enable_preview_backup }}
            aws_region                   : ${{ inputs.aws_region }}
            aws_s3_bucket                : ${{ inputs.aws_s3_bucket }}
            shopify_ignore               : ${{ inputs.shopify_ignore }}
            SHOPIFY_STORE                : ${{ inputs.SHOPIFY_STORE }}
            SHOPIFY_THEME_ID             : ${{ inputs.SHOPIFY_THEME_ID }}
            SHOPIFY_PRODUCTION_THEME_ID  : ${{ inputs.SHOPIFY_PRODUCTION_THEME_ID }}
            SHOPIFY_PREVIEW_BASE_THEME_ID: ${{ inputs.SHOPIFY_PREVIEW_BASE_THEME_ID }}
        secrets:
            SHOPIFY_THEME_ACCESS_TOKEN   : ${{ secrets.SHOPIFY_THEME_ACCESS_TOKEN }}
            AWS_ACCESS_KEY_ID            : ${{ secrets.AWS_ACCESS_KEY_ID }}
            AWS_SECRET_ACCESS_KEY        : ${{ secrets.AWS_SECRET_ACCESS_KEY }}
            IAMOTA_ACTIONS_READ_TOKEN    : ${{ secrets.IAMOTA_ACTIONS_READ_TOKEN }}
