name: Shopify Theme CI

on:
  workflow_call:
    inputs:
      theme_src:
        type: string
        required: false
        default: "."
      theme_dist:
        type: string
        required: false
        default: ""
      build_install_command:
        type: string
        required: false
        default: "npm ci"
      build_command:
        type: string
        required: false
        default: "npx webpack --env target=ci"
      shopify_store:
        type: string
        required: false
        default: ""
      shopify_theme_id:
        type: string
        required: false
        default: ""
      lighthouse_align_with_production_json:
        type: string
        required: false
        default: "false"
      run_theme_check:
        type: string
        required: false
        default: "true"
      theme_check_fail_level:
        type: string
        required: false
        default: "error"
      theme_check_config_path:
        type: string
        required: false
        default: ""
      theme_check_verbose:
        type: string
        required: false
        default: "false"
      theme_check_auto_correct:
        type: string
        required: false
        default: "false"
      run_lint:
        type: string
        required: false
        default: "true"
      run_test:
        type: string
        required: false
        default: "true"
      run_lighthouse:
        type: string
        required: false
        default: "true"
      run_prepare:
        type: string
        required: false
        default: "true"
    secrets:
      SHOPIFY_THEME_ACCESS_TOKEN:
        required: false
      LHCI_GITHUB_APP_TOKEN:
        required: false

permissions:
  contents: read
  pull-requests: write

jobs:
  resolve_inputs:
    runs-on: ubuntu-latest
    outputs:
      matrix_json                          : ${{ steps.stores.outputs.matrix_json }}
      first_store                          : ${{ steps.stores.outputs.first_store }}
      theme_src                            : ${{ steps.out.outputs.theme_src }}
      theme_dist                           : ${{ steps.out.outputs.theme_dist }}
      build_install_command                : ${{ steps.out.outputs.build_install_command }}
      build_command                        : ${{ steps.out.outputs.build_command }}
      shopify_theme_id                     : ${{ steps.out.outputs.shopify_theme_id }}
      lighthouse_align_with_production_json: ${{ steps.out.outputs.lighthouse_align_with_production_json }}
      run_theme_check                      : ${{ steps.out.outputs.run_theme_check }}
      theme_check_fail_level               : ${{ steps.out.outputs.theme_check_fail_level }}
      theme_check_config_path              : ${{ steps.out.outputs.theme_check_config_path }}
      theme_check_verbose                  : ${{ steps.out.outputs.theme_check_verbose }}
      theme_check_auto_correct             : ${{ steps.out.outputs.theme_check_auto_correct }}
      run_lint                             : ${{ steps.out.outputs.run_lint }}
      run_test                             : ${{ steps.out.outputs.run_test }}
      run_lighthouse                       : ${{ steps.out.outputs.run_lighthouse }}
      run_prepare                          : ${{ steps.out.outputs.run_prepare }}
    steps:
      - id: stores
        uses: iamota/iamota-github-actions/.github/actions/shopify-multistore-matrix@v1
        with:
          stores: ${{ inputs.shopify_store }}
          allow_empty: "true"

      - id: resolve_theme_src
        uses: iamota/iamota-github-actions/.github/actions/shopify-multistore-resolve-value@v1
        with:
          store: ${{ steps.stores.outputs.first_store }}
          raw: ${{ inputs.theme_src }}

      - id: resolve_theme_dist
        uses: iamota/iamota-github-actions/.github/actions/shopify-multistore-resolve-value@v1
        with:
          store: ${{ steps.stores.outputs.first_store }}
          raw: ${{ inputs.theme_dist }}

      - id: resolve_build_install
        uses: iamota/iamota-github-actions/.github/actions/shopify-multistore-resolve-value@v1
        with:
          store: ${{ steps.stores.outputs.first_store }}
          raw: ${{ inputs.build_install_command }}

      - id: resolve_build_command
        uses: iamota/iamota-github-actions/.github/actions/shopify-multistore-resolve-value@v1
        with:
          store: ${{ steps.stores.outputs.first_store }}
          raw: ${{ inputs.build_command }}

      - id: resolve_shopify_theme_id
        uses: iamota/iamota-github-actions/.github/actions/shopify-multistore-resolve-value@v1
        with:
          store: ${{ steps.stores.outputs.first_store }}
          raw: ${{ inputs.shopify_theme_id }}

      - id: resolve_lighthouse_align
        uses: iamota/iamota-github-actions/.github/actions/shopify-multistore-resolve-value@v1
        with:
          store: ${{ steps.stores.outputs.first_store }}
          raw: ${{ inputs.lighthouse_align_with_production_json }}

      - id: resolve_run_theme_check
        uses: iamota/iamota-github-actions/.github/actions/shopify-multistore-resolve-value@v1
        with:
          store: ${{ steps.stores.outputs.first_store }}
          raw: ${{ inputs.run_theme_check }}

      - id: resolve_theme_check_fail_level
        uses: iamota/iamota-github-actions/.github/actions/shopify-multistore-resolve-value@v1
        with:
          store: ${{ steps.stores.outputs.first_store }}
          raw: ${{ inputs.theme_check_fail_level }}

      - id: resolve_theme_check_config_path
        uses: iamota/iamota-github-actions/.github/actions/shopify-multistore-resolve-value@v1
        with:
          store: ${{ steps.stores.outputs.first_store }}
          raw: ${{ inputs.theme_check_config_path }}

      - id: resolve_theme_check_verbose
        uses: iamota/iamota-github-actions/.github/actions/shopify-multistore-resolve-value@v1
        with:
          store: ${{ steps.stores.outputs.first_store }}
          raw: ${{ inputs.theme_check_verbose }}

      - id: resolve_theme_check_auto_correct
        uses: iamota/iamota-github-actions/.github/actions/shopify-multistore-resolve-value@v1
        with:
          store: ${{ steps.stores.outputs.first_store }}
          raw: ${{ inputs.theme_check_auto_correct }}

      - id: resolve_run_lint
        uses: iamota/iamota-github-actions/.github/actions/shopify-multistore-resolve-value@v1
        with:
          store: ${{ steps.stores.outputs.first_store }}
          raw: ${{ inputs.run_lint }}

      - id: resolve_run_test
        uses: iamota/iamota-github-actions/.github/actions/shopify-multistore-resolve-value@v1
        with:
          store: ${{ steps.stores.outputs.first_store }}
          raw: ${{ inputs.run_test }}

      - id: resolve_run_lighthouse
        uses: iamota/iamota-github-actions/.github/actions/shopify-multistore-resolve-value@v1
        with:
          store: ${{ steps.stores.outputs.first_store }}
          raw: ${{ inputs.run_lighthouse }}

      - id: resolve_run_prepare
        uses: iamota/iamota-github-actions/.github/actions/shopify-multistore-resolve-value@v1
        with:
          store: ${{ steps.stores.outputs.first_store }}
          raw: ${{ inputs.run_prepare }}

      - id: out
        run: |
          {
            echo "theme_src=${{ steps.resolve_theme_src.outputs.value != '' && steps.resolve_theme_src.outputs.value || '.' }}"
            echo "theme_dist=${{ steps.resolve_theme_dist.outputs.value }}"
            echo "build_install_command=${{ steps.resolve_build_install.outputs.value != '' && steps.resolve_build_install.outputs.value || 'npm ci' }}"
            echo "build_command=${{ steps.resolve_build_command.outputs.value != '' && steps.resolve_build_command.outputs.value || 'npx webpack --env target=ci' }}"
            echo "shopify_theme_id=${{ steps.resolve_shopify_theme_id.outputs.value }}"
            echo "lighthouse_align_with_production_json=${{ steps.resolve_lighthouse_align.outputs.value != '' && steps.resolve_lighthouse_align.outputs.value || 'false' }}"
            echo "run_theme_check=${{ steps.resolve_run_theme_check.outputs.value != '' && steps.resolve_run_theme_check.outputs.value || 'true' }}"
            echo "theme_check_fail_level=${{ steps.resolve_theme_check_fail_level.outputs.value != '' && steps.resolve_theme_check_fail_level.outputs.value || 'error' }}"
            echo "theme_check_config_path=${{ steps.resolve_theme_check_config_path.outputs.value }}"
            echo "theme_check_verbose=${{ steps.resolve_theme_check_verbose.outputs.value != '' && steps.resolve_theme_check_verbose.outputs.value || 'false' }}"
            echo "theme_check_auto_correct=${{ steps.resolve_theme_check_auto_correct.outputs.value != '' && steps.resolve_theme_check_auto_correct.outputs.value || 'false' }}"
            echo "run_lint=${{ steps.resolve_run_lint.outputs.value != '' && steps.resolve_run_lint.outputs.value || 'true' }}"
            echo "run_test=${{ steps.resolve_run_test.outputs.value != '' && steps.resolve_run_test.outputs.value || 'true' }}"
            echo "run_lighthouse=${{ steps.resolve_run_lighthouse.outputs.value != '' && steps.resolve_run_lighthouse.outputs.value || 'true' }}"
            echo "run_prepare=${{ steps.resolve_run_prepare.outputs.value != '' && steps.resolve_run_prepare.outputs.value || 'true' }}"
          } >> "$GITHUB_OUTPUT"

  prepare:
    if: needs.resolve_inputs.outputs.run_prepare == 'true'
    needs: [resolve_inputs]
    runs-on: ubuntu-latest
    outputs:
      theme_root   : ${{ steps.root.outputs.theme_dist_effective }}
      artifact_name: ${{ steps.meta.outputs.artifact_name }}
    steps:
      - uses: actions/checkout@v5

      - name: Prepare theme (install + build + resolve dist)
        id: root
        uses: iamota/iamota-github-actions/.github/actions/shopify-theme-prepare@v1
        with:
          theme_src            : ${{ needs.resolve_inputs.outputs.theme_src }}
          theme_dist           : ${{ needs.resolve_inputs.outputs.theme_dist }}
          build_install_command: ${{ needs.resolve_inputs.outputs.build_install_command }}
          build_command        : ${{ needs.resolve_inputs.outputs.build_command }}

      - name: Set artifact name
        id: meta
        run: |
          echo "artifact_name=shopify-theme-ci-root" >> "$GITHUB_OUTPUT"

      - name: Upload prepared theme root
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.meta.outputs.artifact_name }}
          path: ${{ steps.root.outputs.theme_dist_effective }}
          if-no-files-found: error

  theme_check:
    if: needs.resolve_inputs.outputs.run_theme_check != 'false'
    needs: [resolve_inputs, prepare]
    runs-on: ubuntu-latest
    steps:
      - name: Download prepared theme root
        uses: actions/download-artifact@v8
        with:
          name: ${{ needs.prepare.outputs.artifact_name }}
          path: _ci_theme_root

      - name: Setup Node + Install Shopify CLI
        uses: iamota/iamota-github-actions/.github/actions/shopify-cli-install@v1

      - name: Run Theme Check JSON
        id: theme_check_run
        env:
          THEME_CHECK_MODE: ${{ needs.resolve_inputs.outputs.run_theme_check }}
          THEME_CHECK_FAIL_LEVEL: ${{ needs.resolve_inputs.outputs.theme_check_fail_level }}
          THEME_CHECK_CONFIG_PATH: ${{ needs.resolve_inputs.outputs.theme_check_config_path }}
          THEME_CHECK_VERBOSE: ${{ needs.resolve_inputs.outputs.theme_check_verbose }}
          THEME_CHECK_AUTO_CORRECT: ${{ needs.resolve_inputs.outputs.theme_check_auto_correct }}
        run: |
          set -euo pipefail

          MODE="$(printf '%s' "${THEME_CHECK_MODE}" | tr '[:upper:]' '[:lower:]')"
          case "${MODE}" in
            true|log) ;;
            *)
              echo "Unsupported run_theme_check value: ${THEME_CHECK_MODE}. Expected one of: false, log, true."
              exit 1
              ;;
          esac

          mkdir -p _ci_reports
          JSON_OUT="_ci_reports/theme-check.json"
          STDERR_OUT="_ci_reports/theme-check.stderr.log"

          ARGS=(
            theme check
            --path "_ci_theme_root"
            --output json
          )

          if [ "${MODE}" != "log" ]; then
            ARGS+=(--fail-level "${THEME_CHECK_FAIL_LEVEL}")
          fi

          if [ -n "${THEME_CHECK_CONFIG_PATH}" ]; then
            ARGS+=(--config "${THEME_CHECK_CONFIG_PATH}")
          fi
          if [ "${THEME_CHECK_VERBOSE}" = "true" ]; then
            ARGS+=(--verbose)
          fi
          if [ "${THEME_CHECK_AUTO_CORRECT}" = "true" ]; then
            ARGS+=(--auto-correct)
          fi

          set +e
          shopify "${ARGS[@]}" >"${JSON_OUT}" 2>"${STDERR_OUT}"
          EXIT_CODE=$?
          set -e

          {
            echo "mode=${MODE}"
            echo "exit_code=${EXIT_CODE}"
            echo "json_path=${JSON_OUT}"
            echo "stderr_path=${STDERR_OUT}"
          } >> "$GITHUB_OUTPUT"

          echo "Theme Check exit code: ${EXIT_CODE}"
          echo "Theme Check JSON output:"
          cat "${JSON_OUT}" || true

          if [ -s "${STDERR_OUT}" ]; then
            echo "Theme Check stderr:"
            cat "${STDERR_OUT}"
          fi

      - name: Build Theme Check report
        id: theme_check_report
        env:
          JSON_PATH: ${{ steps.theme_check_run.outputs.json_path }}
          STDERR_PATH: ${{ steps.theme_check_run.outputs.stderr_path }}
          THEME_ROOT: _ci_theme_root
          THEME_CHECK_MODE: ${{ steps.theme_check_run.outputs.mode }}
          THEME_CHECK_FAIL_LEVEL: ${{ needs.resolve_inputs.outputs.theme_check_fail_level }}
          THEME_CHECK_EXIT_CODE: ${{ steps.theme_check_run.outputs.exit_code }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail
          node - <<'NODE'
          const fs = require("node:fs");
          const path = require("node:path");

          const jsonPath = process.env.JSON_PATH;
          const stderrPath = process.env.STDERR_PATH;
          const themeRoot = process.env.THEME_ROOT || "";
          const mode = String(process.env.THEME_CHECK_MODE || "").toLowerCase();
          const failLevel = String(process.env.THEME_CHECK_FAIL_LEVEL || "error").toLowerCase();
          const exitCode = Number(process.env.THEME_CHECK_EXIT_CODE || "0");
          const summaryPath = process.env.GITHUB_STEP_SUMMARY || "";
          const outputPath = process.env.GITHUB_OUTPUT;
          const runUrl = `${process.env.GITHUB_SERVER_URL || "https://github.com"}/${process.env.GITHUB_REPOSITORY || ""}/actions/runs/${process.env.GITHUB_RUN_ID || ""}`;

          const thresholdMap = { error: 2, suggestion: 1, style: 0 };
          const severityMap = { error: 2, warning: 1, info: 0 };
          const threshold = Object.prototype.hasOwnProperty.call(thresholdMap, failLevel) ? thresholdMap[failLevel] : 2;

          function appendOutput(name, value) {
            fs.appendFileSync(outputPath, `${name}<<EOF\n${value}\nEOF\n`);
          }

          function normalizeSlashes(value) {
            return String(value || "").replace(/\\/g, "/");
          }

          function relativeThemePath(filePath) {
            const raw = normalizeSlashes(filePath);
            const root = normalizeSlashes(path.resolve(themeRoot));
            if (!raw) return "(unknown file)";
            if (root && raw.toLowerCase().startsWith(root.toLowerCase() + "/")) {
              return raw.slice(root.length + 1);
            }
            if (root && raw.toLowerCase() === root.toLowerCase()) {
              return ".";
            }
            return raw;
          }

          function readJsonReport() {
            const raw = fs.existsSync(jsonPath) ? fs.readFileSync(jsonPath, "utf8").trim() : "";
            if (!raw) {
              throw new Error(`Theme Check JSON output was empty (exit code ${exitCode}).`);
            }
            const parsed = JSON.parse(raw);
            if (!Array.isArray(parsed)) {
              throw new Error("Theme Check JSON output was not an array.");
            }
            return parsed;
          }

          const report = readJsonReport();
          const allOffenses = [];
          const severityCounts = { error: 0, warning: 0, info: 0 };

          for (const fileEntry of report) {
            const filePath = relativeThemePath(fileEntry?.path || "");
            for (const offense of fileEntry?.offenses || []) {
              const severity = String(offense?.severity || "info").toLowerCase();
              if (Object.prototype.hasOwnProperty.call(severityCounts, severity)) {
                severityCounts[severity] += 1;
              }
              allOffenses.push({
                filePath,
                check: String(offense?.check || "ThemeCheck"),
                severity,
                message: String(offense?.message || ""),
                startRow: Number(offense?.start_row || 0),
                startColumn: Number(offense?.start_column || 0),
              });
            }
          }

          const matched = allOffenses
            .filter((offense) => (severityMap[offense.severity] ?? 0) >= threshold)
            .sort((a, b) =>
              (severityMap[b.severity] ?? 0) - (severityMap[a.severity] ?? 0) ||
              a.filePath.localeCompare(b.filePath) ||
              a.startRow - b.startRow ||
              a.startColumn - b.startColumn
            );

          const belowThreshold = allOffenses
            .filter((offense) => (severityMap[offense.severity] ?? 0) < threshold)
            .sort((a, b) =>
              (severityMap[b.severity] ?? 0) - (severityMap[a.severity] ?? 0) ||
              a.filePath.localeCompare(b.filePath) ||
              a.startRow - b.startRow ||
              a.startColumn - b.startColumn
            );

          const shouldFail = mode === "true" && (matched.length > 0 || exitCode !== 0);
          const headline = matched.length > 0
            ? `Found ${matched.length} Theme Check offense(s) at or above \`${failLevel}\`.`
            : `No Theme Check offenses found at or above \`${failLevel}\`.`;
          const countSummary = `Theme Check found \`${severityCounts.error}\` errors, \`${severityCounts.warning}\` warnings, \`${severityCounts.info}\` info.`;

          const commentLines = [
            "<!-- iamota-theme-check -->",
            "## Theme Check",
            "",
            countSummary,
          ];

          if (matched.length > 0) {
            commentLines.push("", "<details>", `<summary>Failures (${Math.min(matched.length, 50)} shown of ${matched.length})</summary>`, "");
            for (const offense of matched.slice(0, 50)) {
              const location = offense.startRow > 0
                ? `:${offense.startRow}${offense.startColumn > 0 ? `:${offense.startColumn}` : ""}`
                : "";
              commentLines.push(`- \`${offense.filePath}${location}\` [${offense.severity}] \`${offense.check}\` - ${offense.message}`);
            }
            if (matched.length > 50) {
              commentLines.push("", `_Additional offenses omitted: ${matched.length - 50}_`);
            }
            commentLines.push("", "</details>");
          } else {
            commentLines.push("", "No blocking Theme Check findings to report for this run.");
          }

          if (belowThreshold.length > 0) {
            commentLines.push("", "<details>", `<summary>Warnings and lower-severity findings (${Math.min(belowThreshold.length, 50)} shown of ${belowThreshold.length})</summary>`, "");
            for (const offense of belowThreshold.slice(0, 50)) {
              const location = offense.startRow > 0
                ? `:${offense.startRow}${offense.startColumn > 0 ? `:${offense.startColumn}` : ""}`
                : "";
              commentLines.push(`- \`${offense.filePath}${location}\` [${offense.severity}] \`${offense.check}\` - ${offense.message}`);
            }
            if (belowThreshold.length > 50) {
              commentLines.push("", `_Additional lower-severity offenses omitted: ${belowThreshold.length - 50}_`);
            }
            commentLines.push("", "</details>");
          }

          commentLines.push("", `Full Theme Check logs: ${runUrl}`);

          const stderrRaw = fs.existsSync(stderrPath) ? fs.readFileSync(stderrPath, "utf8").trim() : "";
          if (stderrRaw) {
            commentLines.push("", "<details>", "<summary>Theme Check stderr</summary>", "", "```text");
            commentLines.push(...stderrRaw.split("\n").slice(0, 40));
            if (stderrRaw.split("\n").length > 40) {
              commentLines.push("... (truncated)");
            }
            commentLines.push("```", "</details>");
          }

          const summaryLines = [
            "## Theme Check",
            "",
            countSummary,
          ];
          if (matched.length > 0) {
            summaryLines.push("", `Top failures (${Math.min(matched.length, 20)} shown):`, "");
            for (const offense of matched.slice(0, 20)) {
              const location = offense.startRow > 0
                ? `:${offense.startRow}${offense.startColumn > 0 ? `:${offense.startColumn}` : ""}`
                : "";
              summaryLines.push(`- \`${offense.filePath}${location}\` [${offense.severity}] \`${offense.check}\` - ${offense.message}`);
            }
          }
          if (belowThreshold.length > 0) {
            summaryLines.push("", `Lower-severity findings not counted toward fail level: ${belowThreshold.length}`);
          }

          if (summaryPath) {
            fs.appendFileSync(summaryPath, `${summaryLines.join("\n")}\n`);
          }

          const commentPath = "_ci_reports/theme-check-comment.md";
          fs.writeFileSync(commentPath, `${commentLines.join("\n")}\n`);

          appendOutput("comment_path", commentPath);
          appendOutput("matched_count", String(matched.length));
          appendOutput("all_count", String(allOffenses.length));
          appendOutput("should_fail", shouldFail ? "true" : "false");
          NODE

      - name: Sync Theme Check PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v8
        env:
          THEME_CHECK_COMMENT_PATH: ${{ steps.theme_check_report.outputs.comment_path }}
        with:
          github-token: ${{ github.token }}
          script: |
            const fs = require('node:fs');

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = context.payload.pull_request.number;
            const marker = '<!-- iamota-theme-check -->';
            const body = fs.readFileSync(process.env.THEME_CHECK_COMMENT_PATH, 'utf8');

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments
              .filter((comment) => comment.user?.type === 'Bot' && String(comment.body || '').includes(marker))
              .sort((a, b) => new Date(b.updated_at || b.created_at) - new Date(a.updated_at || a.created_at))[0];

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
              core.info(`Updated Theme Check PR comment ${existing.id}.`);
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
              core.info('Created Theme Check PR comment.');
            }

      - name: Fail Theme Check job when configured
        if: steps.theme_check_report.outputs.should_fail == 'true'
        run: |
          echo "Theme Check reported offenses at or above the configured fail level."
          exit 1

  lint:
    if: needs.resolve_inputs.outputs.run_lint == 'true'
    needs: [resolve_inputs]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: NPM install (self-aware)
        uses: iamota/iamota-github-actions/.github/actions/npm-install@v1
        with:
          working_directory: "."
          install_command: ${{ needs.resolve_inputs.outputs.build_install_command }}
          if_package_json: "1"

      - name: Run lint script when available
        run: |
          set -euo pipefail
          if [ ! -f package.json ]; then
            echo "No package.json; skipping lint."
            exit 0
          fi
          HAS_LINT="$(node -e "const p=require('./package.json');process.stdout.write((p.scripts&&p.scripts.lint)?'1':'0')")"
          if [ "${HAS_LINT}" != "1" ]; then
            echo "No lint script; skipping."
            exit 0
          fi
          LINT_CMD="$(node -e "const p=require('./package.json');process.stdout.write(String((p.scripts&&p.scripts.lint)||''))")"
          if echo "${LINT_CMD}" | grep -qi "eslint"; then
            echo "Running ESLint lint script with warnings allowed (errors still fail)."
            npm run lint -- --max-warnings=-1
          else
            npm run lint
          fi

  test:
    if: needs.resolve_inputs.outputs.run_test == 'true'
    needs: [resolve_inputs, prepare]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: NPM install (self-aware)
        uses: iamota/iamota-github-actions/.github/actions/npm-install@v1
        with:
          working_directory: "."
          install_command: ${{ needs.resolve_inputs.outputs.build_install_command }}
          if_package_json: "1"

      - name: Download prepared theme root
        uses: actions/download-artifact@v8
        with:
          name: ${{ needs.prepare.outputs.artifact_name }}
          path: _ci_theme_root

      - name: Run test script when available
        env:
          THEME_ROOT: _ci_theme_root
          THEME_DIST: _ci_theme_root
        run: |
          set -euo pipefail
          if [ ! -f package.json ]; then
            echo "No package.json; skipping tests."
            exit 0
          fi
          HAS_TEST="$(node -e "const p=require('./package.json');process.stdout.write((p.scripts&&p.scripts.test)?'1':'0')")"
          if [ "${HAS_TEST}" != "1" ]; then
            echo "No test script; skipping."
            exit 0
          fi
          npm test --if-present

  lighthouse:
    if: inputs.run_lighthouse != 'false'
    needs: [resolve_inputs, prepare]
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.resolve_inputs.outputs.matrix_json) }}
    runs-on: ubuntu-latest
    env:
      TARGET_STORE                  : ${{ matrix.store }}
      TARGET_STORE_INDEX            : ${{ matrix.store_index }}
      TARGET_STORE_SECRET_KEY       : ${{ matrix.store_secret_key }}
      RAW_SHOPIFY_THEME_ID          : ${{ inputs.shopify_theme_id }}
      RAW_LIGHTHOUSE_ALIGN          : ${{ inputs.lighthouse_align_with_production_json }}
      RAW_RUN_LIGHTHOUSE            : ${{ inputs.run_lighthouse }}
      RAW_SHOPIFY_THEME_ACCESS_TOKEN: ${{ secrets.SHOPIFY_THEME_ACCESS_TOKEN }}
      RAW_LHCI_GITHUB_APP_TOKEN     : ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
    steps:
      - name: Resolve store-scoped run_lighthouse flag
        id: resolve_store_run_lighthouse
        uses: iamota/iamota-github-actions/.github/actions/shopify-multistore-resolve-value@v1
        with:
          store: ${{ env.TARGET_STORE }}
          raw: ${{ env.RAW_RUN_LIGHTHOUSE }}

      - name: Resolve store-scoped lighthouse theme id
        id: resolve_store_theme_id
        uses: iamota/iamota-github-actions/.github/actions/shopify-multistore-resolve-value@v1
        with:
          store: ${{ env.TARGET_STORE }}
          raw: ${{ env.RAW_SHOPIFY_THEME_ID }}

      - name: Resolve store-scoped lighthouse JSON alignment flag
        id: resolve_store_lh_align
        uses: iamota/iamota-github-actions/.github/actions/shopify-multistore-resolve-value@v1
        with:
          store: ${{ env.TARGET_STORE }}
          raw: ${{ env.RAW_LIGHTHOUSE_ALIGN }}

      - name: Resolve effective Shopify token
        id: resolve_store_shopify_token
        uses: iamota/iamota-github-actions/.github/actions/multistore-resolve-secret@v1
        with:
          store: ${{ env.TARGET_STORE }}
          raw: ${{ env.RAW_SHOPIFY_THEME_ACCESS_TOKEN }}
          raw_named: ${{ secrets[format('SHOPIFY_THEME_ACCESS_TOKEN__{0}', matrix.store_secret_key)] }}
          raw_indexed: ${{ secrets[format('SHOPIFY_THEME_ACCESS_TOKEN_{0}', matrix.store_index)] }}

      - name: Resolve effective LHCI token
        id: resolve_store_lhci_token
        uses: iamota/iamota-github-actions/.github/actions/multistore-resolve-secret@v1
        with:
          store: ${{ env.TARGET_STORE }}
          raw: ${{ env.RAW_LHCI_GITHUB_APP_TOKEN }}
          raw_named: ${{ secrets[format('LHCI_GITHUB_APP_TOKEN__{0}', matrix.store_secret_key)] }}
          raw_indexed: ${{ secrets[format('LHCI_GITHUB_APP_TOKEN_{0}', matrix.store_index)] }}

      - uses: actions/checkout@v5

      - name: Check lighthouse prerequisites
        id: prereq
        run: |
          set -euo pipefail
          if [ "${{ steps.resolve_store_run_lighthouse.outputs.value }}" = "false" ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Skipping lighthouse for ${TARGET_STORE}: run_lighthouse=false."
            exit 0
          fi

          MISSING=()
          [ -n "${{ steps.resolve_store_shopify_token.outputs.value }}" ] || MISSING+=("SHOPIFY_THEME_ACCESS_TOKEN")
          [ -n "${TARGET_STORE}" ] || MISSING+=("shopify_store input")
          [ -n "${{ steps.resolve_store_lhci_token.outputs.value }}" ] || MISSING+=("LHCI_GITHUB_APP_TOKEN")

          if [ "${#MISSING[@]}" -gt 0 ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Skipping lighthouse: missing ${MISSING[*]}"
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Download prepared theme root
        if: steps.prereq.outputs.ready == 'true'
        uses: actions/download-artifact@v8
        with:
          name: ${{ needs.prepare.outputs.artifact_name }}
          path: _ci_theme_root

      - name: Warn when JSON alignment requested but theme id missing
        if: steps.prereq.outputs.ready == 'true' && steps.resolve_store_lh_align.outputs.value == 'true' && steps.resolve_store_theme_id.outputs.value == ''
        run: |
          echo "lighthouse_align_with_production_json=true but shopify_theme_id is empty; continuing without pull_theme alignment."

      - name: Lighthouse
        if: steps.prereq.outputs.ready == 'true'
        uses: iamota/iamota-github-actions/.github/actions/shopify-theme-lighthouse@v1
        with:
          access_token: ${{ steps.resolve_store_shopify_token.outputs.value }}
          store: ${{ env.TARGET_STORE }}
          lhci_github_app_token: ${{ steps.resolve_store_lhci_token.outputs.value }}
          theme_root: _ci_theme_root
          pull_theme: ${{ steps.resolve_store_lh_align.outputs.value == 'true' && steps.resolve_store_theme_id.outputs.value || '' }}

  ci:
    name: CI Aggregate
    runs-on: ubuntu-latest
    needs:
      - resolve_inputs
      - theme_check
      - lint
      - test
      - lighthouse
    if: always()
    steps:
      - name: Fail if any required job failed
        run: |
          set -euo pipefail
          if [ "${{ contains(needs.*.result, 'failure') }}" = "true" ] || [ "${{ contains(needs.*.result, 'cancelled') }}" = "true" ]; then
            echo "One or more CI jobs failed or were cancelled."
            exit 1
          fi
          echo "CI aggregate passed."

