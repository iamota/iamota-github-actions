name: Shopify Theme CI

on:
  workflow_call:
    inputs:
      theme_src:
        type: string
        required: false
        default: "."
      theme_dist:
        type: string
        required: false
        default: ""
      build_install_command:
        type: string
        required: false
        default: "npm ci"
      build_command:
        type: string
        required: false
        default: "npx webpack --env target=lighthouse"
      shopify_store:
        type: string
        required: false
        default: ""
      shopify_theme_id:
        type: string
        required: false
        default: ""
      lighthouse_align_with_production_json:
        type: string
        required: false
        default: "false"
      run_theme_check:
        type: string
        required: false
        default: "true"
      theme_check_fail_level:
        type: string
        required: false
        default: "error"
      theme_check_config_path:
        type: string
        required: false
        default: ""
      theme_check_verbose:
        type: string
        required: false
        default: "false"
      theme_check_auto_correct:
        type: string
        required: false
        default: "false"
      run_lint:
        type: string
        required: false
        default: "true"
      run_test:
        type: string
        required: false
        default: "true"
      run_a11y:
        type: string
        required: false
        default: "true"
      run_lighthouse:
        type: string
        required: false
        default: "true"
    secrets:
      SHOPIFY_THEME_ACCESS_TOKEN:
        required: false
      LHCI_GITHUB_APP_TOKEN:
        required: false

permissions:
  contents: read

jobs:
  prepare:
    if: inputs.run_theme_check == 'true' || inputs.run_a11y == 'true' || inputs.run_lighthouse == 'true'
    runs-on: ubuntu-latest
    outputs:
      theme_root   : ${{ steps.root.outputs.theme_dist_effective }}
      artifact_name: ${{ steps.meta.outputs.artifact_name }}
    steps:
      - uses: actions/checkout@v4

      - name: Prepare theme (install + build + resolve dist)
        id: root
        uses: iamota/iamota-github-actions/.github/actions/shopify-theme-prepare@main
        with:
          theme_src            : ${{ inputs.theme_src }}
          theme_dist           : ${{ inputs.theme_dist }}
          build_install_command: ${{ inputs.build_install_command }}
          build_command        : ${{ inputs.build_command }}

      - name: Set artifact name
        id: meta
        run: |
          echo "artifact_name=shopify-theme-ci-root" >> "$GITHUB_OUTPUT"

      - name: Upload prepared theme root
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.artifact_name }}
          path: ${{ steps.root.outputs.theme_dist_effective }}
          if-no-files-found: error

  theme_check:
    if: inputs.run_theme_check == 'true'
    needs: [prepare]
    runs-on: ubuntu-latest
    steps:
      - name: Download prepared theme root
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.prepare.outputs.artifact_name }}
          path: _ci_theme_root

      - name: Setup Node + Install Shopify CLI
        uses: iamota/iamota-github-actions/.github/actions/shopify-cli-install@main

      - name: Theme Check
        uses: iamota/iamota-github-actions/.github/actions/shopify-theme-check@main
        with:
          path: _ci_theme_root
          fail_level: ${{ inputs.theme_check_fail_level }}
          config_path: ${{ inputs.theme_check_config_path }}
          verbose: ${{ inputs.theme_check_verbose }}
          auto_correct: ${{ inputs.theme_check_auto_correct }}

  lint:
    if: inputs.run_lint == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: NPM install (self-aware)
        uses: iamota/iamota-github-actions/.github/actions/npm-install@main
        with:
          working_directory: "."
          install_command: ${{ inputs.build_install_command }}
          if_package_json: "1"

      - name: Run lint script when available
        run: |
          set -euo pipefail
          if [ ! -f package.json ]; then
            echo "No package.json; skipping lint."
            exit 0
          fi
          HAS_LINT="$(node -e "const p=require('./package.json');process.stdout.write((p.scripts&&p.scripts.lint)?'1':'0')")"
          if [ "${HAS_LINT}" != "1" ]; then
            echo "No lint script; skipping."
            exit 0
          fi
          LINT_CMD="$(node -e "const p=require('./package.json');process.stdout.write(String((p.scripts&&p.scripts.lint)||''))")"
          if echo "${LINT_CMD}" | grep -qi "eslint"; then
            echo "Running ESLint lint script with warnings allowed (errors still fail)."
            npm run lint -- --max-warnings=-1
          else
            npm run lint
          fi

  test:
    if: inputs.run_test == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: NPM install (self-aware)
        uses: iamota/iamota-github-actions/.github/actions/npm-install@main
        with:
          working_directory: "."
          install_command: ${{ inputs.build_install_command }}
          if_package_json: "1"

      - name: Run test script when available
        run: |
          set -euo pipefail
          if [ ! -f package.json ]; then
            echo "No package.json; skipping tests."
            exit 0
          fi
          HAS_TEST="$(node -e "const p=require('./package.json');process.stdout.write((p.scripts&&p.scripts.test)?'1':'0')")"
          if [ "${HAS_TEST}" != "1" ]; then
            echo "No test script; skipping."
            exit 0
          fi
          npm test --if-present

  a11y:
    if: inputs.run_a11y == 'true'
    needs: [prepare]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: NPM install (self-aware)
        uses: iamota/iamota-github-actions/.github/actions/npm-install@main
        with:
          working_directory: "."
          install_command: ${{ inputs.build_install_command }}
          if_package_json: "1"

      - name: Download prepared theme root
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.prepare.outputs.artifact_name }}
          path: _ci_theme_root

      - name: Run a11y script when available
        env:
          THEME_ROOT: _ci_theme_root
          THEME_DIST: _ci_theme_root
        run: |
          set -euo pipefail
          if [ ! -f package.json ]; then
            echo "No package.json; skipping a11y."
            exit 0
          fi
          HAS_A11Y="$(node -e "const p=require('./package.json');process.stdout.write((p.scripts&&p.scripts.a11y)?'1':'0')")"
          if [ "${HAS_A11Y}" != "1" ]; then
            echo "No a11y script; skipping."
            exit 0
          fi
          npm run a11y

  lighthouse:
    if: inputs.run_lighthouse == 'true'
    needs: [prepare]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check lighthouse prerequisites
        id: prereq
        run: |
          set -euo pipefail
          MISSING=()
          [ -n "${{ secrets.SHOPIFY_THEME_ACCESS_TOKEN }}" ] || MISSING+=("SHOPIFY_THEME_ACCESS_TOKEN")
          [ -n "${{ inputs.shopify_store }}" ] || MISSING+=("shopify_store input")
          [ -n "${{ secrets.LHCI_GITHUB_APP_TOKEN }}" ] || MISSING+=("LHCI_GITHUB_APP_TOKEN")

          if [ "${#MISSING[@]}" -gt 0 ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Skipping lighthouse: missing ${MISSING[*]}"
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Download prepared theme root
        if: steps.prereq.outputs.ready == 'true'
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.prepare.outputs.artifact_name }}
          path: _ci_theme_root

      - name: Setup Node + Install Shopify CLI (for JSON alignment)
        if: steps.prereq.outputs.ready == 'true' && inputs.lighthouse_align_with_production_json == 'true'
        uses: iamota/iamota-github-actions/.github/actions/shopify-cli-install@main

      - name: Pull production theme for lighthouse JSON alignment
        if: steps.prereq.outputs.ready == 'true' && inputs.lighthouse_align_with_production_json == 'true' && inputs.shopify_theme_id != ''
        uses: iamota/iamota-github-actions/.github/actions/shopify-theme-pull@main
        with:
          store: ${{ inputs.shopify_store }}
          theme_id: ${{ inputs.shopify_theme_id }}
          token: ${{ secrets.SHOPIFY_THEME_ACCESS_TOKEN }}
          path: _lighthouse_remote_theme
          nodelete: "1"

      - name: Sync production JSON into lighthouse theme root
        if: steps.prereq.outputs.ready == 'true' && inputs.lighthouse_align_with_production_json == 'true' && inputs.shopify_theme_id != ''
        env:
          THEME_PULL_DIR: _lighthouse_remote_theme
          THEME_ROOT: _ci_theme_root
          DRY_RUN: "false"
        run: |
          set -euo pipefail
          node .github/scripts/shopify/sync-shopify-json.mjs

      - name: Warn when JSON alignment requested but theme id missing
        if: steps.prereq.outputs.ready == 'true' && inputs.lighthouse_align_with_production_json == 'true' && inputs.shopify_theme_id == ''
        run: |
          echo "lighthouse_align_with_production_json=true but shopify_theme_id is empty; continuing without production JSON alignment."

      - name: Lighthouse
        if: steps.prereq.outputs.ready == 'true'
        uses: iamota/iamota-github-actions/.github/actions/shopify-theme-lighthouse@main
        with:
          access_token: ${{ secrets.SHOPIFY_THEME_ACCESS_TOKEN }}
          store: ${{ inputs.shopify_store }}
          lhci_github_app_token: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
          theme_root: _ci_theme_root

  ci:
    name: CI Aggregate
    runs-on: ubuntu-latest
    needs:
      - theme_check
      - lint
      - test
      - a11y
      - lighthouse
    if: always()
    steps:
      - name: Fail if any required job failed
        run: |
          set -euo pipefail
          if [ "${{ contains(needs.*.result, 'failure') }}" = "true" ] || [ "${{ contains(needs.*.result, 'cancelled') }}" = "true" ]; then
            echo "One or more CI jobs failed or were cancelled."
            exit 1
          fi
          echo "CI aggregate passed."
