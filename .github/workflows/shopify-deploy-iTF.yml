name: Shopify Deploy Workflow (iTF)

on:
    workflow_call:
        inputs:
            environment:
                required: true
                type: string
        secrets:
            SHOPIFY_CLI_THEME_TOKEN:
                required: true
        vars:
            SHOPIFY_FLAG_STORE: {}
            SHOPIFY_FLAG_THEME_ID: {}
            DEPLOY_TARGETS: {}

jobs:
    deploy:
        name: Shopify Theme Deploy (iTF)
        runs-on: ubuntu-latest
        strategy:
            matrix:
                target: ${{ fromJSON(vars.DEPLOY_TARGETS || '["DEFAULT"]') }}
        environment: ${{ inputs.environment }}
        env:
            GITHUB_BRANCH: ${{ github.ref_name }}
            GITHUB_SHA   : ${{ github.sha }}
            SHOPIFY_FLAG_PATH: ./dist

        steps:
            - uses: actions/checkout@v4

            - name: Resolve store and theme ID
              run: |
                  echo "Resolving STORE + THEME_ID for target: ${{ matrix.target }}"
                  if [ "${{ matrix.target }}" != "DEFAULT" ]; then
                      echo "SHOPIFY_FLAG_STORE=${{ vars[format('SHOPIFY_FLAG_STORE_{0}', matrix.target)] }}" >> $GITHUB_ENV
                      echo "SHOPIFY_FLAG_THEME_ID=${{ vars[format('SHOPIFY_FLAG_THEME_ID_{0}', matrix.target)] }}" >> $GITHUB_ENV
                  else
                      echo "SHOPIFY_FLAG_STORE=${{ vars.SHOPIFY_FLAG_STORE }}" >> $GITHUB_ENV
                      echo "SHOPIFY_FLAG_THEME_ID=${{ vars.SHOPIFY_FLAG_THEME_ID }}" >> $GITHUB_ENV
                  fi
                  echo "STORE   = ${{ matrix.target != 'DEFAULT' && vars[format('SHOPIFY_FLAG_STORE_{0}', matrix.target)] || vars.SHOPIFY_FLAG_STORE }}"
                  echo "THEMEID = ${{ matrix.target != 'DEFAULT' && vars[format('SHOPIFY_FLAG_THEME_ID_{0}', matrix.target)] || vars.SHOPIFY_FLAG_THEME_ID }}"

            - uses: actions/setup-node@v4
              with:
                  node-version: 18
            - uses: ruby/setup-ruby@v1
              with:
                  ruby-version: 3.1
                  bundler: latest

            - name: Install Shopify CLI
              run: npm install -g "@shopify/cli@${SHOPIFY_CLI_VERSION:-latest}"

            - name: Install and Build
              run: |
                  npm install
                  npm run build --env target=$GITHUB_BRANCH

            - name: Set SHOPIFY_FLAG_ALLOW_LIVE based on branch
              run: |
                  if [[ "$GITHUB_BRANCH" =~ ^[Pp]roduction$ || "$GITHUB_BRANCH" =~ ^[Pp]rod$ ]]; then
                      echo "SHOPIFY_FLAG_ALLOW_LIVE=1" >> $GITHUB_ENV
                  else
                      echo "SHOPIFY_FLAG_ALLOW_LIVE=0" >> $GITHUB_ENV
                  fi

            - name: Set SHOPIFY_FLAG_NODELETE flag based on commit message
              run: |
                  if git log -1 --pretty=%B | grep -q '\[Allow Delete\]'; then
                      echo "SHOPIFY_FLAG_NODELETE=0" >> $GITHUB_ENV
                  else
                      echo "SHOPIFY_FLAG_NODELETE=1" >> $GITHUB_ENV
                  fi

            - name: "Debug: Deploy environment variables"
              run: |
                  echo "=== DEPLOY DEBUG ==="
                  echo "TARGET     : ${{ matrix.target }}"
                  echo "STORE      : $SHOPIFY_FLAG_STORE"
                  echo "THEME_ID   : $SHOPIFY_FLAG_THEME_ID"
                  echo "BRANCH     : $GITHUB_BRANCH"
                  echo "COMMIT     : $GITHUB_SHA"
                  echo "ALLOW_LIVE : $SHOPIFY_FLAG_ALLOW_LIVE"
                  echo "NODELETE   : $SHOPIFY_FLAG_NODELETE"

            - uses: ./.github/actions/shopify-push
              with:
                  store: ${{ env.SHOPIFY_FLAG_STORE }}
                  theme_id: ${{ env.SHOPIFY_FLAG_THEME_ID }}
                  token: ${{ matrix.target != 'DEFAULT' && secrets[format('SHOPIFY_CLI_THEME_TOKEN_{0}', matrix.target)] || secrets.SHOPIFY_CLI_THEME_TOKEN }}
                  path: ./dist
                  allow_live: ${{ env.SHOPIFY_FLAG_ALLOW_LIVE }}
                  nodelete: ${{ env.SHOPIFY_FLAG_NODELETE }}
