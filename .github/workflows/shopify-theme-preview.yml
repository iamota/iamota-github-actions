name: Shopify Theme Preview (Canonical)

on:
    workflow_call:
        inputs:
            production_branch:
                type: string
                required: false
                default: "production"
            theme_src:
                type: string
                required: false
                default: "."
            theme_dist:
                type: string
                required: false
                default: ""
            build_install_command:
                type: string
                required: false
                default: "npm ci"
            build_command:
                type: string
                required: false
                default: "npx webpack --env target=${GITHUB_BRANCH}"
            enable_preview_backup:
                type: string
                required: false
                default: "true"
            aws_region:
                type: string
                required: false
                default: "us-west-2"
            aws_s3_bucket:
                type: string
                required: false
                default: ""
            shopify_ignore:
                type: string
                required: false
                default: ""
            SHOPIFY_STORE:
                type: string
                required: false
                default: ""
            SHOPIFY_THEME_ID:
                type: string
                required: false
                default: ""
            SHOPIFY_PRODUCTION_THEME_ID:
                type: string
                required: false
                default: ""
            SHOPIFY_PREVIEW_BASE_THEME_ID:
                type: string
                required: false
                default: ""
        secrets:
            SHOPIFY_THEME_ACCESS_TOKEN:
                required: true
            AWS_ACCESS_KEY_ID:
                required: false
            AWS_SECRET_ACCESS_KEY:
                required: false
            IAMOTA_ACTIONS_READ_TOKEN:
                required: false

permissions:
    contents: write
    pull-requests: write

concurrency:
    group: iamota-shopify-theme-preview-${{ github.event.pull_request.number || github.run_id }}
    cancel-in-progress: true

jobs:
    resolve_targets:
        runs-on: ubuntu-latest
        outputs:
            matrix_json: ${{ steps.stores.outputs.matrix_json }}
        steps:
            - id: stores
              uses: iamota/iamota-github-actions/.github/actions/shopify-multistore-matrix@v1
              with:
                  stores: ${{ inputs.SHOPIFY_STORE }}

    shopify_theme_preview:
        needs: [resolve_targets]
        strategy:
            fail-fast: false
            matrix: ${{ fromJson(needs.resolve_targets.outputs.matrix_json) }}
        if: github.event_name == 'pull_request' && github.event.action != 'closed' && github.event.pull_request.head.ref != inputs.production_branch && github.event.pull_request.base.ref != inputs.production_branch && github.event.pull_request.head.ref != 'main' && github.event.pull_request.base.ref != 'main'
        runs-on: ubuntu-latest
        env:
            TARGET_STORE: ${{ matrix.store }}
            TARGET_STORE_SLUG: ${{ matrix.store_slug }}
            RAW_THEME_SRC: ${{ inputs.theme_src }}
            RAW_THEME_DIST: ${{ inputs.theme_dist }}
            RAW_BUILD_INSTALL_COMMAND: ${{ inputs.build_install_command }}
            RAW_BUILD_COMMAND: ${{ inputs.build_command }}
            RAW_SHOPIFY_IGNORE: ${{ inputs.shopify_ignore }}
            RAW_ENABLE_PREVIEW_BACKUP: ${{ inputs.enable_preview_backup }}
            RAW_AWS_REGION: ${{ inputs.aws_region }}
            RAW_AWS_S3_BUCKET: ${{ inputs.aws_s3_bucket }}
            RAW_AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
            RAW_AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
            RAW_SHOPIFY_THEME_ID: ${{ inputs.SHOPIFY_THEME_ID }}
            RAW_SHOPIFY_PRODUCTION_THEME_ID: ${{ inputs.SHOPIFY_PRODUCTION_THEME_ID }}
            RAW_SHOPIFY_PREVIEW_BASE_ID: ${{ inputs.SHOPIFY_PREVIEW_BASE_THEME_ID }}
            RAW_SHOPIFY_THEME_ACCESS_TOKEN: ${{ secrets.SHOPIFY_THEME_ACCESS_TOKEN }}
            RAW_IAMOTA_ACTIONS_READ_TOKEN: ${{ secrets.IAMOTA_ACTIONS_READ_TOKEN }}
            SHOPIFY_CLI_TTY: "0"

        steps:
            - name: Checkout PR head
              uses: actions/checkout@v5
              with:
                  fetch-depth: 0

            - name: Resolve store-scoped values
              run: |
                  set -euo pipefail
                  node - <<'NODE'
                  const fs = require("node:fs");

                  function normalizeStore(v) {
                    let s = String(v ?? "").trim();
                    if (!s) return "";
                    s = s.replace(/^https?:\/\//i, "");
                    s = s.split("/")[0].trim().toLowerCase();
                    if (!s) return "";
                    if (!s.includes(".")) s = `${s}.myshopify.com`;
                    return s;
                  }

                  function resolveValue(raw, store) {
                    const val = String(raw ?? "");
                    const trimmed = val.trim();
                    if (!trimmed) return "";
                    if (!(trimmed.startsWith("{") && trimmed.endsWith("}"))) return val;
                    let obj;
                    try { obj = JSON.parse(trimmed); } catch { return val; }
                    if (!obj || typeof obj !== "object" || Array.isArray(obj)) return val;
                    const normalized = normalizeStore(store);
                    const slug = normalized.replace(/\.myshopify\.com$/i, "");
                    for (const k of [store, normalized, slug, String(store || "").toLowerCase(), String(slug || "").toLowerCase()]) {
                      if (!k) continue;
                      if (Object.prototype.hasOwnProperty.call(obj, k)) {
                        const out = obj[k];
                        if (out === undefined || out === null) return "";
                        if (typeof out === "string") return out;
                        if (typeof out === "number" || typeof out === "boolean") return String(out);
                        return JSON.stringify(out);
                      }
                    }
                    return "";
                  }

                  const store = process.env.TARGET_STORE || "";
                  const envFile = process.env.GITHUB_ENV;
                  const marker = `iamota-shopify-preview-${(process.env.TARGET_STORE_SLUG || "").replace(/[^a-zA-Z0-9_-]/g, "_")}`;

                  const productionThemeId = resolveValue(process.env.RAW_SHOPIFY_PRODUCTION_THEME_ID, store) || "";
                  const previewBaseId = resolveValue(process.env.RAW_SHOPIFY_PREVIEW_BASE_ID, store) || "";

                  const values = {
                    SHOPIFY_STORE: store,
                    THEME_SRC: resolveValue(process.env.RAW_THEME_SRC, store) || ".",
                    THEME_DIST: resolveValue(process.env.RAW_THEME_DIST, store) || "",
                    BUILD_INSTALL_COMMAND: resolveValue(process.env.RAW_BUILD_INSTALL_COMMAND, store) || "npm ci",
                    BUILD_COMMAND: resolveValue(process.env.RAW_BUILD_COMMAND, store) || "npx webpack --env target=${GITHUB_BRANCH}",
                    SHOPIFY_IGNORE: resolveValue(process.env.RAW_SHOPIFY_IGNORE, store) || "",
                    ENABLE_PREVIEW_BACKUP: resolveValue(process.env.RAW_ENABLE_PREVIEW_BACKUP, store) || "true",
                    AWS_REGION: resolveValue(process.env.RAW_AWS_REGION, store) || "us-west-2",
                    AWS_S3_BUCKET: resolveValue(process.env.RAW_AWS_S3_BUCKET, store) || "",
                    AWS_ACCESS_KEY_ID: resolveValue(process.env.RAW_AWS_ACCESS_KEY_ID, store) || "",
                    AWS_SECRET_ACCESS_KEY: resolveValue(process.env.RAW_AWS_SECRET_ACCESS_KEY, store) || "",
                    SHOPIFY_THEME_ID: resolveValue(process.env.RAW_SHOPIFY_THEME_ID, store) || "",
                    SHOPIFY_PRODUCTION_THEME_ID: productionThemeId,
                    SHOPIFY_PREVIEW_BASE_ID: previewBaseId || productionThemeId || "",
                    SHOPIFY_THEME_ACCESS_TOKEN: resolveValue(process.env.RAW_SHOPIFY_THEME_ACCESS_TOKEN, store) || "",
                    PREVIEW_MARKER: marker,
                  };

                  for (const [k, v] of Object.entries(values)) {
                    fs.appendFileSync(envFile, `${k}<<EOF\n${v}\nEOF\n`);
                  }
                  NODE

            - name: Validate required Shopify values
              run: |
                  set -euo pipefail
                  MISSING=()
                  [ -n "${SHOPIFY_STORE:-}" ] || MISSING+=("SHOPIFY_STORE input/var")
                  if [ -z "${SHOPIFY_PREVIEW_BASE_ID:-}" ] && [ -z "${SHOPIFY_PRODUCTION_THEME_ID:-}" ]; then
                      MISSING+=("SHOPIFY_PREVIEW_BASE_THEME_ID or SHOPIFY_PRODUCTION_THEME_ID input/var")
                  fi
                  [ -n "${SHOPIFY_THEME_ACCESS_TOKEN:-}" ] || MISSING+=("SHOPIFY_THEME_ACCESS_TOKEN secret")
                    if [ "${#MISSING[@]}" -gt 0 ]; then
                        echo "Missing required Shopify values: ${MISSING[*]}"
                        exit 1
                    fi

            - name: Resolve helper checkout token (optional)
              id: resolve_helper_token
              uses: iamota/iamota-github-actions/.github/actions/shopify-multistore-resolve-value@v1
              with:
                  store: ${{ env.TARGET_STORE }}
                  raw: ${{ env.RAW_IAMOTA_ACTIONS_READ_TOKEN }}

            - name: Checkout helper scripts
              uses: iamota/iamota-github-actions/.github/actions/iamota-helper-checkout@v1
              with:
                  ref: matrix
                  token: ${{ steps.resolve_helper_token.outputs.value }}
                  path: .iamota-actions

            - name: Setup Node + Install Shopify CLI
              uses: iamota/iamota-github-actions/.github/actions/shopify-cli-install@v1

            - name: Resolve source theme id and store metadata
              id: source
              run: |
                  set -euo pipefail

                  SOURCE_THEME_ID="${SHOPIFY_PREVIEW_BASE_ID:-}"
                  if [ -z "${SOURCE_THEME_ID}" ]; then
                      SOURCE_THEME_ID="${SHOPIFY_PRODUCTION_THEME_ID}"
                  fi
                  if [ -z "${SOURCE_THEME_ID}" ]; then
                      echo "Unable to resolve source theme id. Set SHOPIFY_PREVIEW_BASE_THEME_ID or SHOPIFY_PRODUCTION_THEME_ID."
                      exit 1
                  fi

                  SRC_STORE_RAW="${SHOPIFY_STORE:-unknown-store.myshopify.com}"
                  SRC_HOST="${SRC_STORE_RAW#https://}"
                  SRC_HOST="${SRC_HOST#http://}"
                  SRC_HOST="${SRC_HOST%%/*}"
                  [ -n "${SRC_HOST}" ] || SRC_HOST="unknown-store.myshopify.com"
                  if ! echo "${SRC_HOST}" | grep -q '\\.'; then
                      SRC_HOST="${SRC_HOST}.myshopify.com"
                  fi
                  SRC_STORE="${SRC_HOST%.myshopify.com}"
                  [ -n "${SRC_STORE}" ] || SRC_STORE="unknown-store"

                  SOURCE_THEME_ID="$(
                      node .iamota-actions/.github/scripts/shopify/shopify-theme-id-resolve.mjs \
                          --store "${SRC_HOST}" \
                          --theme-id "${SOURCE_THEME_ID}" \
                          --token "${SHOPIFY_THEME_ACCESS_TOKEN}"
                  )"

                  echo "source_theme_id=${SOURCE_THEME_ID}" >> "$GITHUB_OUTPUT"
                  echo "source_store_slug=${SRC_STORE}" >> "$GITHUB_OUTPUT"
                  echo "source_store_host=${SRC_HOST}" >> "$GITHUB_OUTPUT"

            - name: Resolve preview theme id from PR marker (if any)
              id: marker
              env:
                  GH_TOKEN: ${{ github.token }}
              uses: iamota/iamota-github-actions/.github/actions/github-pr-comment-marker-get@v1
              with:
                  repo: ${{ github.repository }}
                  pr: ${{ github.event.pull_request.number }}
                  marker: ${{ env.PREVIEW_MARKER }}
                  extract_regex: theme_id=(\d+)
                  refresh_after_comments: "75"

            - name: Prepare preview backup filename
              if: steps.marker.outputs.extracted_value != '' && env.ENABLE_PREVIEW_BACKUP == 'true'
              run: |
                  set -euo pipefail
                  PR_NUMBER="${{ github.event.pull_request.number }}"
                  BRANCH="${{ github.event.pull_request.head.ref }}"
                  THEME_ID="${{ steps.marker.outputs.extracted_value }}"
                  TS="$(TZ=America/Los_Angeles date '+%Y-%m-%d_%H%M%S_%Z')"
                  REPO_NAME="$(basename "${{ github.repository }}")"
                  SAFE_BRANCH="$(echo "${BRANCH}" | tr '/' '_')"
                  ZIP_NAME="${REPO_NAME}__PR${PR_NUMBER}__${SAFE_BRANCH}__preview_theme_${THEME_ID}__${TS}.zip"
                  echo "PREVIEW_BACKUP_DIR=preview_backup" >> "$GITHUB_ENV"
                  echo "PREVIEW_BACKUP_ZIP=${ZIP_NAME}" >> "$GITHUB_ENV"
                  echo "PREVIEW_S3_DEST=shopify-preview-backups/${ZIP_NAME}" >> "$GITHUB_ENV"

            - name: Pull existing preview theme for backup
              if: steps.marker.outputs.extracted_value != '' && env.ENABLE_PREVIEW_BACKUP == 'true'
              uses: iamota/iamota-github-actions/.github/actions/shopify-theme-backup@v1
              with:
                  store: ${{ env.SHOPIFY_STORE }}
                  theme_id: ${{ steps.marker.outputs.extracted_value }}
                  token: ${{ env.SHOPIFY_THEME_ACCESS_TOKEN }}
                  output_dir: ${{ env.PREVIEW_BACKUP_DIR }}
                  zip_output: ${{ env.PREVIEW_BACKUP_ZIP }}

            - name: Configure AWS credentials (optional)
              if: steps.marker.outputs.extracted_value != '' && env.ENABLE_PREVIEW_BACKUP == 'true' && env.AWS_S3_BUCKET != '' && env.AWS_ACCESS_KEY_ID != '' && env.AWS_SECRET_ACCESS_KEY != ''
              uses: aws-actions/configure-aws-credentials@v4
              with:
                  aws-access-key-id: ${{ env.AWS_ACCESS_KEY_ID }}
                  aws-secret-access-key: ${{ env.AWS_SECRET_ACCESS_KEY }}
                  aws-region: ${{ env.AWS_REGION }}

            - name: Upload preview backup zip to S3 (optional)
              if: steps.marker.outputs.extracted_value != '' && env.ENABLE_PREVIEW_BACKUP == 'true' && env.AWS_S3_BUCKET != '' && env.AWS_ACCESS_KEY_ID != '' && env.AWS_SECRET_ACCESS_KEY != ''
              uses: iamota/iamota-github-actions/.github/actions/aws-s3-upload@v1
              with:
                  file: ${{ env.PREVIEW_BACKUP_ZIP }}
                  bucket: ${{ env.AWS_S3_BUCKET }}
                  dest_path: ${{ env.PREVIEW_S3_DEST }}

            - name: Upload preview backup artifact (optional)
              if: steps.marker.outputs.extracted_value != '' && env.ENABLE_PREVIEW_BACKUP == 'true'
              uses: iamota/iamota-github-actions/.github/actions/github-artifact-upload@v1
              with:
                  name: shopify-preview-backup-pr-${{ github.event.pull_request.number }}
                  path: ${{ env.PREVIEW_BACKUP_ZIP }}

            - name: Create preview theme (duplicate base) if missing
              if: steps.marker.outputs.extracted_value == ''
              id: createtheme
              uses: iamota/iamota-github-actions/.github/actions/shopify-theme-create@v1
              with:
                  store: ${{ env.SHOPIFY_STORE }}
                  base_theme_id: ${{ env.SHOPIFY_PREVIEW_BASE_ID }}
                  token: ${{ env.SHOPIFY_THEME_ACCESS_TOKEN }}
                  name: iamota (${{ github.event.pull_request.head.ref }}) PR#${{ github.event.pull_request.number }}

            - name: Determine preview theme id
              id: finaltheme
              run: |
                  set -euo pipefail
                  if [ -n "${{ steps.marker.outputs.extracted_value }}" ]; then
                      echo "theme_id=${{ steps.marker.outputs.extracted_value }}" >> "$GITHUB_OUTPUT"
                  else
                      echo "theme_id=${{ steps.createtheme.outputs.theme_id }}" >> "$GITHUB_OUTPUT"
                  fi
                  if [ -z "${{ steps.marker.outputs.extracted_value }}" ] && [ -z "${{ steps.createtheme.outputs.theme_id }}" ]; then
                      echo "Failed to resolve preview theme id from marker or create step."
                      exit 1
                  fi

            - name: Determine delete behavior
              id: deleteflag
              run: |
                  set -euo pipefail
                  ALLOW_DELETE="false"
                  if git log -1 --pretty=%B | grep -q '\[Allow Delete\]'; then
                      ALLOW_DELETE="true"
                  fi
                  if [ "${ALLOW_DELETE}" = "true" ]; then
                      echo "nodelete=0" >> "$GITHUB_OUTPUT"
                  else
                      echo "nodelete=1" >> "$GITHUB_OUTPUT"
                  fi

            - name: Prepare theme (install + build + resolve dist)
              id: prepare
              uses: iamota/iamota-github-actions/.github/actions/shopify-theme-prepare@v1
              env:
                  GITHUB_BRANCH: ${{ github.event.pull_request.head.ref }}
              with:
                  theme_src: ${{ env.THEME_SRC }}
                  theme_dist: ${{ env.THEME_DIST }}
                  build_install_command: ${{ env.BUILD_INSTALL_COMMAND }}
                  build_command: ${{ env.BUILD_COMMAND }}

            - name: Ignore unchanged JSON files for preview push
              run: |
                  set -euo pipefail

                  SRC_ROOT="${THEME_SRC#./}"
                  SRC_ROOT="${SRC_ROOT%/}"
                  [ -n "${SRC_ROOT}" ] || SRC_ROOT="."

                  DIST_ROOT="${{ steps.prepare.outputs.theme_dist_effective }}"
                  DIST_ROOT="${DIST_ROOT#./}"
                  DIST_ROOT="${DIST_ROOT%/}"
                  [ -n "${DIST_ROOT}" ] || DIST_ROOT="."

                  BASE_SHA="${{ github.event.pull_request.base.sha }}"
                  HEAD_SHA="${{ github.event.pull_request.head.sha }}"

                  CHANGED_REL="/tmp/preview-json-changed.rel.txt"
                  DIST_REL="/tmp/preview-json-dist.rel.txt"
                  IGNORE_REL="/tmp/preview-json-ignore.rel.txt"

                  git diff --name-only --diff-filter=ACMRT "${BASE_SHA}...${HEAD_SHA}" -- "${SRC_ROOT}" \
                    | awk -v src="${SRC_ROOT}/" 'tolower($0) ~ /\.json$/ { p=$0; if (src == "./") { print p; next } if (index(p, src) == 1) print substr(p, length(src)+1) }' \
                    | sed 's#^\\./##' \
                    | sort -u > "${CHANGED_REL}"

                  find "${DIST_ROOT}" -type f -name '*.json' \
                    | sed "s#^${DIST_ROOT%/}/##" \
                    | sed 's#^\\./##' \
                    | sort -u > "${DIST_REL}"

                  comm -23 "${DIST_REL}" "${CHANGED_REL}" > "${IGNORE_REL}" || true

                  IGNORE_FILE="${DIST_ROOT%/}/.shopifyignore"
                  START_MARKER="# iamota-preview-unchanged-json:start"
                  END_MARKER="# iamota-preview-unchanged-json:end"

                  if [ -f "${IGNORE_FILE}" ]; then
                    awk -v s="${START_MARKER}" -v e="${END_MARKER}" '
                      $0==s { inblk=1; next }
                      $0==e { inblk=0; next }
                      !inblk { print }
                    ' "${IGNORE_FILE}" > "${IGNORE_FILE}.tmp"
                    mv "${IGNORE_FILE}.tmp" "${IGNORE_FILE}"
                  else
                    : > "${IGNORE_FILE}"
                  fi

                  if [ -s "${IGNORE_REL}" ]; then
                    {
                      echo "${START_MARKER}"
                      cat "${IGNORE_REL}"
                      echo "${END_MARKER}"
                    } >> "${IGNORE_FILE}"
                  fi

                  echo "Unchanged JSON ignore count: $(wc -l < "${IGNORE_REL}" | tr -d ' ')"

            - name: Push branch theme output into preview theme
              id: push
              uses: iamota/iamota-github-actions/.github/actions/shopify-theme-push@v1
              with:
                  store: ${{ env.SHOPIFY_STORE }}
                  theme_id: ${{ steps.finaltheme.outputs.theme_id }}
                  token: ${{ env.SHOPIFY_THEME_ACCESS_TOKEN }}
                  path: ${{ steps.prepare.outputs.theme_dist_effective }}
                  nodelete: ${{ steps.deleteflag.outputs.nodelete }}
                  ignore: ${{ env.SHOPIFY_IGNORE }}
                  json: "1"

            - name: Validate preview publish outputs
              run: |
                  set -euo pipefail
                  if [ -z "${{ steps.finaltheme.outputs.theme_id }}" ]; then
                      echo "Preview Theme ID is empty after publish."
                      exit 1
                  fi
                  if [ -z "${{ steps.push.outputs.preview_url }}" ]; then
                      echo "Preview URL is empty after publish."
                      exit 1
                  fi

            - name: Rename preview theme to canonical name
              run: |
                  set -euo pipefail
                  PR_NUMBER="${{ github.event.pull_request.number }}"
                  BRANCH="${{ github.event.pull_request.head.ref }}"
                  NAME="iamota (${BRANCH}) PR#${PR_NUMBER}"
                  THEME_ID="${{ steps.finaltheme.outputs.theme_id }}"
                  shopify theme rename \
                      --store "${SHOPIFY_STORE}" \
                      --theme "${THEME_ID}" \
                      --name "${NAME}" \
                      --password "${SHOPIFY_THEME_ACCESS_TOKEN}" \
                      --no-color

            - name: Build preview comment metadata
              id: comment_meta
              run: |
                  set -euo pipefail
                  TS="$(TZ=America/Los_Angeles date '+%Y-%m-%d %H:%M %Z')"
                  echo "sync_at=${TS}" >> "$GITHUB_OUTPUT"
                  echo "preview_theme_name=iamota (${{ github.event.pull_request.head.ref }}) PR#${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"

            - name: Build preview comment body
              id: preview_comment
              run: |
                  set -euo pipefail

                  PREVIEW_URL="${{ steps.push.outputs.preview_url }}"
                  PREVIEW_THEME_ID_RAW="${{ steps.finaltheme.outputs.theme_id }}"
                  BASE_THEME_ID_RAW="${{ steps.source.outputs.source_theme_id }}"
                  SOURCE_HOST="${{ steps.source.outputs.source_store_host }}"
                  STORE_SLUG="${{ steps.source.outputs.source_store_slug }}"
                  PREVIEW_THEME_NAME="${{ steps.comment_meta.outputs.preview_theme_name }}"
                  SYNC_AT="${{ steps.comment_meta.outputs.sync_at }}"
                  MARKER="${PREVIEW_MARKER:-iamota-shopify-preview}"

                  PREVIEW_THEME_ID="$(printf '%s' "${PREVIEW_THEME_ID_RAW}" | tr -cd '0-9')"
                  BASE_THEME_ID="$(printf '%s' "${BASE_THEME_ID_RAW}" | tr -cd '0-9')"

                  if [ -z "${PREVIEW_THEME_ID}" ] && [ -n "${PREVIEW_URL}" ]; then
                      PREVIEW_THEME_ID="$(echo "${PREVIEW_URL}" | sed -n 's/.*[?&]preview_theme_id=\([0-9][0-9]*\).*/\1/p')"
                  fi

                  [ -n "${PREVIEW_THEME_ID}" ] || PREVIEW_THEME_ID="UNKNOWN_PREVIEW_THEME_ID"
                  [ -n "${BASE_THEME_ID}" ] || BASE_THEME_ID="UNKNOWN_BASE_THEME_ID"
                  [ -n "${PREVIEW_THEME_NAME}" ] || PREVIEW_THEME_NAME="Preview Theme"
                  [ -n "${SYNC_AT}" ] || SYNC_AT="unknown-time"
                  [ -n "${PREVIEW_URL}" ] || PREVIEW_URL="#"
                  SOURCE_HOST="${SOURCE_HOST#https://}"
                  SOURCE_HOST="${SOURCE_HOST#http://}"
                  SOURCE_HOST="${SOURCE_HOST%%/*}"
                  [ -n "${SOURCE_HOST}" ] || SOURCE_HOST="unknown-store.myshopify.com"

                  STORE_SLUG="${STORE_SLUG#https://}"
                  STORE_SLUG="${STORE_SLUG#http://}"
                  STORE_SLUG="${STORE_SLUG%%/*}"
                  if [ -z "${STORE_SLUG}" ]; then
                      STORE_SLUG="${SOURCE_HOST}"
                  fi
                  STORE_SLUG="${STORE_SLUG%.myshopify.com}"
                  if echo "${STORE_SLUG}" | grep -q '\.'; then
                      STORE_SLUG="${STORE_SLUG%%.*}"
                  fi
                  [ -n "${STORE_SLUG}" ] || STORE_SLUG="unknown-store"

                  BASE_URL=""
                  if [ -n "${SOURCE_HOST}" ] && [ "${BASE_THEME_ID}" != "UNKNOWN_BASE_THEME_ID" ]; then
                      BASE_URL="https://${SOURCE_HOST}?preview_theme_id=${BASE_THEME_ID}"
                  fi

                  STORE_ADMIN_URL="https://admin.shopify.com/store/${STORE_SLUG}"
                  PREVIEW_CUSTOMIZER_URL="https://admin.shopify.com/store/${STORE_SLUG}/themes/${PREVIEW_THEME_ID}/editor"
                  PREVIEW_EDIT_CODE_URL="https://admin.shopify.com/store/${STORE_SLUG}/themes/${PREVIEW_THEME_ID}"
                  if [ -n "${BASE_URL}" ]; then
                      BASE_THEME_REF="[base theme](${BASE_URL}) (${BASE_THEME_ID})"
                  else
                      BASE_THEME_REF="base theme (${BASE_THEME_ID})"
                  fi

                  BODY="$(printf '%s\n' \
                    "<!-- ${MARKER}:theme_id=${PREVIEW_THEME_ID} -->" \
                    "" \
                    "## 🏠 Store: **[${STORE_SLUG}](${STORE_ADMIN_URL})**" \
                    "" \
                    "**[${PREVIEW_THEME_NAME}](${PREVIEW_URL})** (${PREVIEW_THEME_ID}) - [[Preview](${PREVIEW_URL}) | [Customizer](${PREVIEW_CUSTOMIZER_URL}) | [Edit Code](${PREVIEW_EDIT_CODE_URL})]" \
                    "" \
                    "<sub>Generated a Shopify preview theme on [${SOURCE_HOST}](https://${SOURCE_HOST}/admin) using the latest JSON content from ${BASE_THEME_REF} @ ${SYNC_AT}</sub>" \
                  )"

                  {
                    echo "body<<EOF"
                    printf '%s\n' "${BODY}"
                    echo "EOF"
                  } >> "$GITHUB_OUTPUT"

            - name: Sync PR comment marker
              env:
                  GH_TOKEN: ${{ github.token }}
              uses: iamota/iamota-github-actions/.github/actions/github-pr-comment-marker-set@v1
              with:
                  repo: ${{ github.repository }}
                  pr: ${{ github.event.pull_request.number }}
                  marker: ${{ env.PREVIEW_MARKER }}
                  body: ${{ steps.preview_comment.outputs.body }}
                  refresh_after_comments: "75"

    shopify_theme_preview_cleanup:
        needs: [resolve_targets]
        strategy:
            fail-fast: false
            matrix: ${{ fromJson(needs.resolve_targets.outputs.matrix_json) }}
        if: github.event_name == 'pull_request' && github.event.action == 'closed' && github.event.pull_request.head.ref != inputs.production_branch && github.event.pull_request.base.ref != inputs.production_branch && github.event.pull_request.head.ref != 'main' && github.event.pull_request.base.ref != 'main'
        runs-on: ubuntu-latest
        env:
            TARGET_STORE: ${{ matrix.store }}
            TARGET_STORE_SLUG: ${{ matrix.store_slug }}
            RAW_IAMOTA_ACTIONS_READ_TOKEN: ${{ secrets.IAMOTA_ACTIONS_READ_TOKEN }}
            RAW_SHOPIFY_THEME_ACCESS_TOKEN: ${{ secrets.SHOPIFY_THEME_ACCESS_TOKEN }}
            SHOPIFY_CLI_TTY: "0"

        steps:
            - name: Resolve helper checkout token (optional)
              id: resolve_helper_token
              uses: iamota/iamota-github-actions/.github/actions/shopify-multistore-resolve-value@v1
              with:
                  store: ${{ env.TARGET_STORE }}
                  raw: ${{ env.RAW_IAMOTA_ACTIONS_READ_TOKEN }}

            - name: Checkout helper scripts
              uses: iamota/iamota-github-actions/.github/actions/iamota-helper-checkout@v1
              with:
                  ref: matrix
                  token: ${{ steps.resolve_helper_token.outputs.value }}
                  path: .iamota-actions

            - name: Resolve store-scoped Shopify token
              id: resolve_theme_token
              uses: iamota/iamota-github-actions/.github/actions/shopify-multistore-resolve-value@v1
              with:
                  store: ${{ env.TARGET_STORE }}
                  raw: ${{ env.RAW_SHOPIFY_THEME_ACCESS_TOKEN }}

            - name: Export cleanup resolved values
              run: |
                  set -euo pipefail
                  {
                    echo "SHOPIFY_STORE=${TARGET_STORE}"
                    echo "SHOPIFY_THEME_ACCESS_TOKEN=${{ steps.resolve_theme_token.outputs.value }}"
                    echo "PREVIEW_MARKER=iamota-shopify-preview-${TARGET_STORE_SLUG}"
                  } >> "$GITHUB_ENV"

            - name: Validate resolved cleanup values
              run: |
                  set -euo pipefail
                  MISSING=()
                  [ -n "${SHOPIFY_STORE:-}" ] || MISSING+=("SHOPIFY_STORE input/var")
                  [ -n "${SHOPIFY_THEME_ACCESS_TOKEN:-}" ] || MISSING+=("SHOPIFY_THEME_ACCESS_TOKEN secret")
                  if [ "${#MISSING[@]}" -gt 0 ]; then
                      echo "Missing required Shopify values: ${MISSING[*]}"
                      exit 1
                  fi

            - name: Setup Node + Install Shopify CLI
              uses: iamota/iamota-github-actions/.github/actions/shopify-cli-install@v1

            - name: Find preview theme id from marker
              id: marker
              env:
                  GH_TOKEN: ${{ github.token }}
              uses: iamota/iamota-github-actions/.github/actions/github-pr-comment-marker-get@v1
              with:
                  repo: ${{ github.repository }}
                  pr: ${{ github.event.pull_request.number }}
                  marker: ${{ env.PREVIEW_MARKER }}
                  extract_regex: theme_id=(\d+)

            - name: Normalize marker theme id
              id: marker_norm
              run: |
                  set -euo pipefail
                  RAW_ID="${{ steps.marker.outputs.extracted_value }}"
                  THEME_ID="$(printf '%s' "${RAW_ID}" | tr -cd '0-9')"
                  echo "theme_id=${THEME_ID}" >> "$GITHUB_OUTPUT"

            - name: Delete preview theme (if exists)
              id: delete_preview
              if: steps.marker_norm.outputs.theme_id != ''
              uses: iamota/iamota-github-actions/.github/actions/shopify-theme-delete@v1
              with:
                  store: ${{ env.SHOPIFY_STORE }}
                  theme_id: ${{ steps.marker_norm.outputs.theme_id }}
                  token: ${{ env.SHOPIFY_THEME_ACCESS_TOKEN }}
                  ignore_not_found: "true"

            - name: Build cleanup comment body
              id: cleanup_comment
              run: |
                  set -euo pipefail
                  MARKER="${PREVIEW_MARKER:-iamota-shopify-preview}"
                  THEME_ID="${{ steps.marker_norm.outputs.theme_id }}"
                  DELETE_STATUS="${{ steps.delete_preview.outputs.status }}"
                  STORE_HOST="${SHOPIFY_STORE:-unknown-store.myshopify.com}"
                  if [ -n "${THEME_ID}" ] && [ "${DELETE_STATUS}" = "deleted" ]; then
                      BODY="$(printf '%s\n%s' "<!-- ${MARKER}:theme_id= -->" "[CLEANUP] Deleted preview theme **${THEME_ID}** from **${STORE_HOST}**")"
                  elif [ -n "${THEME_ID}" ] && [ "${DELETE_STATUS}" = "missing" ]; then
                      BODY="$(printf '%s\n%s' "<!-- ${MARKER}:theme_id= -->" "[CLEANUP] Preview theme already missing on **${STORE_HOST}** (nothing to delete): **${THEME_ID}**")"
                  else
                      BODY="$(printf '%s\n%s' "<!-- ${MARKER}:theme_id= -->" "[CLEANUP] No preview theme found to delete on **${STORE_HOST}**.")"
                  fi
                  {
                    echo "body<<EOF"
                    printf '%s\n' "${BODY}"
                    echo "EOF"
                  } >> "$GITHUB_OUTPUT"

            - name: Add cleanup comment
              env:
                  GH_TOKEN: ${{ github.token }}
              uses: iamota/iamota-github-actions/.github/actions/github-pr-comment-add@v1
              with:
                  repo: ${{ github.repository }}
                  pr: ${{ github.event.pull_request.number }}
                  body: ${{ steps.cleanup_comment.outputs.body }}
