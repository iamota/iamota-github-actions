name: GitHub Warn Possible Conflicts

on:
  workflow_call:
    inputs:
      branch:
        type: string
        required: false
        default: ""

permissions:
  contents: read
  issues: write

concurrency:
  group: github-warn-possible-conflicts-${{ github.repository }}-${{ inputs.branch || github.ref_name }}
  cancel-in-progress: true

jobs:
  github-warn-possible-conflicts:
    name: Possible Conflicts Warning
    runs-on: ubuntu-latest

    steps:
      - name: Checkout full history
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Fetch all branches
        run: |
          git remote set-branches origin '*'
          git fetch --all --prune

      - name: Detect overlaps and open/update issues
        uses: actions/github-script@v7
        with:
          script: |
            const { execSync } = require('node:child_process');

            function sh(cmd) {
                return execSync(cmd, { stdio: ['ignore', 'pipe', 'pipe'] }).toString('utf8').trim();
            }

            function lines(cmd) {
                const out = sh(cmd);
                if (!out) return [];
                return out.split('\n').map((s) => s.trim()).filter(Boolean);
            }

            function uniq(arr) {
                return [...new Set(arr)];
            }

            function intersect(a, b) {
                const setB = new Set(b);
                return a.filter((x) => setB.has(x));
            }

            // -----------------------------------------------------------------------------
            // Tunables
            // -----------------------------------------------------------------------------
            const GITHUB_WARN_POSSIBLE_CONFLICTS_LOOKBACK_DAYS = 14;
            const GITHUB_WARN_POSSIBLE_CONFLICTS_MAX_BRANCHES = 15;
            const GITHUB_WARN_POSSIBLE_CONFLICTS_MAX_FILES_PER_PAIR = 50;
            const GITHUB_WARN_POSSIBLE_CONFLICTS_SELF_TO_SUMMARY = true;
            const GITHUB_WARN_POSSIBLE_CONFLICTS_MAX_ASSIGNEES = 3;
            const GITHUB_WARN_POSSIBLE_CONFLICTS_MAX_FILES_WITH_DIFF_DETAILS = 8;
            const GITHUB_WARN_POSSIBLE_CONFLICTS_MAX_DIFF_LINES = 40;

            // -----------------------------------------------------------------------------
            // State marker for notify-once-per-file-per-branch-pair
            // -----------------------------------------------------------------------------
            const STATE_MARKER_START = '<!-- github-warn-possible-conflicts-state:';
            const STATE_MARKER_END = '-->';
            const ISSUE_TITLE_RE = /^(?:⚠️ Potential conflict warning|⚠️ Branch overlap|ℹ️ Potential self-conflict warning|ℹ️ Self-overlap): (.+) ↔ (.+)$/;

            function parseStateFromBody(body) {
                const empty = { notifiedFiles: [] };
                if (!body) return empty;

                const start = body.indexOf(STATE_MARKER_START);
                if (start === -1) return empty;

                const end = body.indexOf(STATE_MARKER_END, start);
                if (end === -1) return empty;

                const jsonPart = body
                    .slice(start + STATE_MARKER_START.length, end)
                    .trim();

                try {
                    const parsed = JSON.parse(jsonPart);
                    if (!parsed || !Array.isArray(parsed.notifiedFiles)) return empty;
                    return parsed;
                } catch {
                    return empty;
                }
            }

            function renderState(state) {
                const compact = {
                    notifiedFiles: Array.from(new Set(state.notifiedFiles)).sort(),
                };
                return `${STATE_MARKER_START} ${JSON.stringify(compact)} ${STATE_MARKER_END}`;
            }

            function stripOldState(body) {
                if (!body) return '';
                const start = body.indexOf(STATE_MARKER_START);
                if (start === -1) return body.trim();

                const end = body.indexOf(STATE_MARKER_END, start);
                if (end === -1) return body.trim();

                return (body.slice(0, start) + body.slice(end + STATE_MARKER_END.length)).trim();
            }

            function parseConflictIssueTitle(title) {
                const match = String(title || '').match(ISSUE_TITLE_RE);
                if (!match) return null;
                return {
                    branchA: match[1],
                    branchB: match[2],
                };
            }

            function pairMatches(issueMeta, branchA, branchB) {
                if (!issueMeta) return false;
                return (
                    (issueMeta.branchA === branchA && issueMeta.branchB === branchB) ||
                    (issueMeta.branchA === branchB && issueMeta.branchB === branchA)
                );
            }

            // -----------------------------------------------------------------------------
            // Context
            // -----------------------------------------------------------------------------
            const DEFAULT_BRANCH = context.payload.repository.default_branch;
            const CURRENT_BRANCH = `${{ inputs.branch }}` || (context.ref || '').replace('refs/heads/', '');

            if (!CURRENT_BRANCH || CURRENT_BRANCH === DEFAULT_BRANCH) {
                core.info(`Skipping: CURRENT_BRANCH='${CURRENT_BRANCH}', DEFAULT_BRANCH='${DEFAULT_BRANCH}'`);
                return;
            }

            const defaultRef = `origin/${DEFAULT_BRANCH}`;

            core.info(`Default branch: ${DEFAULT_BRANCH}`);
            core.info(`Current branch: ${CURRENT_BRANCH}`);

            // -----------------------------------------------------------------------------
            // Candidate branches: remote branches updated recently (capped)
            // -----------------------------------------------------------------------------
            const rawBranches = lines(`git for-each-ref --format="%(committerdate:iso8601)%09%(refname:short)" refs/remotes/origin`);

            const now = new Date();
            const cutoff = new Date(now.getTime() - GITHUB_WARN_POSSIBLE_CONFLICTS_LOOKBACK_DAYS * 24 * 60 * 60 * 1000);

            const candidates = rawBranches
                .map((line) => {
                    const [dateStr, ref] = line.split('\t');
                    return { date: new Date(dateStr), ref };
                })
                .filter((b) => b.ref.startsWith('origin/'))
                .filter((b) => b.ref !== defaultRef)
                .filter((b) => b.ref !== `origin/${CURRENT_BRANCH}`)
                .filter((b) => !b.ref.endsWith('/HEAD'))
                .filter((b) => b.date >= cutoff)
                .sort((a, b) => b.date - a.date)
                .slice(0, GITHUB_WARN_POSSIBLE_CONFLICTS_MAX_BRANCHES);

            const remoteBranchNames = new Set(
                rawBranches
                    .map((line) => line.split('\t')[1])
                    .filter(Boolean)
                    .filter((ref) => ref.startsWith('origin/'))
                    .filter((ref) => !ref.endsWith('/HEAD'))
                    .map((ref) => ref.replace(/^origin\//, ''))
            );

            core.info(`Candidate branches (lookback ${GITHUB_WARN_POSSIBLE_CONFLICTS_LOOKBACK_DAYS}d, capped ${GITHUB_WARN_POSSIBLE_CONFLICTS_MAX_BRANCHES}): ${candidates.length}`);

            const currentRef = remoteBranchNames.has(CURRENT_BRANCH) ? `origin/${CURRENT_BRANCH}` : '';
            const currentBranchExists = Boolean(currentRef);
            const currentChanged = currentBranchExists
                ? (changedFilesFromDefault(currentRef, `current branch ${CURRENT_BRANCH}`) || [])
                : [];

            if (!currentBranchExists) {
                core.info(`Current branch ${CURRENT_BRANCH} does not exist on origin; reconciliation will close stale issues for it.`);
            } else {
                core.info(`Changed files on ${CURRENT_BRANCH}: ${currentChanged.length}`);
            }

            // -----------------------------------------------------------------------------
            // Git helpers
            // -----------------------------------------------------------------------------
            function lastTouchCommitSha(branchRef, filePath) {
                try {
                    return sh(`git log -1 --format=%H ${defaultRef}..${branchRef} -- "${filePath}"`);
                } catch {
                    return '';
                }
            }

            function shSafe(cmd) {
                try {
                    return sh(cmd);
                } catch {
                    return '';
                }
            }

            function shellQuoteSingle(value) {
                return `'${String(value).replace(/'/g, `'\"'\"'`)}'`;
            }

            function diffSnippet(cmd, maxLines = GITHUB_WARN_POSSIBLE_CONFLICTS_MAX_DIFF_LINES) {
                const out = shSafe(cmd);
                if (!out) {
                    return '_No diff output captured for this file._';
                }

                const all = out.split('\n');
                const clipped = all.slice(0, maxLines);
                const truncated = all.length > maxLines;
                return [
                    '```diff',
                    ...clipped,
                    ...(truncated ? ['... (truncated)'] : []),
                    '```',
                ].join('\n');
            }

            function detectActualConflict(otherRef) {
                try {
                    const mergeBase = sh(`git merge-base HEAD ${otherRef}`);
                    if (!mergeBase) return false;
                    const mergeTree = shSafe(`git merge-tree ${mergeBase} HEAD ${otherRef}`);
                    return /<<<<<<<|>>>>>>>|changed in both|CONFLICT/i.test(mergeTree);
                } catch {
                    return false;
                }
            }

            function changedFilesFromDefault(targetRef, label) {
                const mergeBase = shSafe(`git merge-base ${defaultRef} ${targetRef}`);
                if (!mergeBase) {
                    core.warning(`Skipping ${label}: no merge base between ${defaultRef} and ${targetRef}.`);
                    return null;
                }
                return uniq(lines(`git diff --name-only ${defaultRef}...${targetRef}`));
            }

            const changedFilesCache = new Map();

            function getChangedFilesCached(targetRef, label) {
                if (changedFilesCache.has(targetRef)) return changedFilesCache.get(targetRef);
                const changed = changedFilesFromDefault(targetRef, label);
                changedFilesCache.set(targetRef, changed);
                return changed;
            }

            // -----------------------------------------------------------------------------
            // GitHub API helpers + caching
            // -----------------------------------------------------------------------------
            const shaToLoginCache = new Map();

            async function commitShaToLogin(sha) {
                if (!sha) return null;
                if (shaToLoginCache.has(sha)) return shaToLoginCache.get(sha);

                let login = null;
                try {
                    const res = await github.rest.repos.getCommit({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        ref: sha,
                    });
                    login = res.data.author && res.data.author.login ? res.data.author.login : null;
                } catch (e) {
                    core.warning(`Failed to resolve commit ${sha}: ${e.message}`);
                    login = null;
                }

                shaToLoginCache.set(sha, login);
                return login;
            }

            async function listOpenConflictIssues() {
                const openIssues = await github.paginate(github.rest.issues.listForRepo, {
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    state: 'open',
                    per_page: 100,
                });

                return openIssues
                    .filter((issue) => !issue.pull_request)
                    .map((issue) => {
                        const parsed = parseConflictIssueTitle(issue.title);
                        if (!parsed) return null;
                        return { ...issue, ...parsed };
                    })
                    .filter(Boolean);
            }

            function findExistingIssueForPair(openConflictIssues, branchA, branchB) {
                return openConflictIssues.find((issue) => issue.state === 'open' && pairMatches(issue, branchA, branchB)) || null;
            }

            function normalizeAssignees(logins) {
                if (!Array.isArray(logins)) return [];
                return Array.from(
                    new Set(
                        logins
                            .filter(Boolean)
                            .map((l) => String(l).trim())
                            .filter((l) => l.length > 0)
                    )
                ).slice(0, GITHUB_WARN_POSSIBLE_CONFLICTS_MAX_ASSIGNEES);
            }

            async function addAssigneesSafe(issue_number, assignees) {
                const cleanAssignees = normalizeAssignees(assignees);
                if (cleanAssignees.length === 0) return;

                try {
                    await github.rest.issues.addAssignees({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        issue_number,
                        assignees: cleanAssignees,
                    });
                    core.info(`Set assignees on issue #${issue_number}: ${cleanAssignees.join(', ')}`);
                } catch (e) {
                    core.warning(`Could not assign issue #${issue_number} to [${cleanAssignees.join(', ')}]: ${e.message}`);
                }
            }

            async function createIssue({ title, body, labels, assignees }) {
                const created = await github.rest.issues.create({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    title,
                    body,
                    labels: labels || [],
                });
                await addAssigneesSafe(created.data.number, assignees);
                core.info(`Created issue #${created.data.number}: ${title}`);
                return created.data;
            }

            async function updateIssue({ issue_number, title, body, labels, assignees }) {
                await github.rest.issues.update({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number,
                    ...(title ? { title } : {}),
                    body,
                });

                if (labels && labels.length) {
                    await github.rest.issues.addLabels({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        issue_number,
                        labels,
                    });
                }

                await addAssigneesSafe(issue_number, assignees);
                core.info(`Updated issue #${issue_number}`);
            }

            async function commentAndCloseIssue(issue, reason) {
                const body = [
                    '✅ Possible conflict warning resolved.',
                    '',
                    reason,
                ].join('\n');

                await github.rest.issues.createComment({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: issue.number,
                    body,
                });

                await github.rest.issues.update({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: issue.number,
                    state: 'closed',
                });

                issue.state = 'closed';
                core.info(`Closed issue #${issue.number}: ${reason}`);
            }

            async function reconcileStaleIssues(openConflictIssues) {
                for (const issue of openConflictIssues) {
                    if (issue.state !== 'open') continue;
                    if (issue.branchA !== CURRENT_BRANCH && issue.branchB !== CURRENT_BRANCH) continue;

                    if (!currentBranchExists) {
                        await commentAndCloseIssue(
                            issue,
                            `Branch \`${CURRENT_BRANCH}\` no longer exists on \`origin\`, so this warning is no longer actionable.`
                        );
                        continue;
                    }

                    const otherBranch = issue.branchA === CURRENT_BRANCH ? issue.branchB : issue.branchA;
                    if (!remoteBranchNames.has(otherBranch)) {
                        await commentAndCloseIssue(
                            issue,
                            `Branch \`${otherBranch}\` no longer exists on \`origin\`, so this warning is no longer actionable.`
                        );
                        continue;
                    }

                    const otherRef = `origin/${otherBranch}`;
                    const otherChanged = getChangedFilesCached(otherRef, `candidate branch ${otherBranch}`) || [];
                    const overlapAll = intersect(currentChanged, otherChanged);
                    if (overlapAll.length === 0) {
                        await commentAndCloseIssue(
                            issue,
                            `No overlapping changed files remain between \`${CURRENT_BRANCH}\` and \`${otherBranch}\` relative to \`${DEFAULT_BRANCH}\`.`
                        );
                    }
                }
            }

            const openConflictIssues = await listOpenConflictIssues();
            await reconcileStaleIssues(openConflictIssues);

            if (!currentBranchExists || currentChanged.length === 0) {
                core.info('No changed files vs default branch after reconciliation; nothing else to do.');
                return;
            }

            // -----------------------------------------------------------------------------
            // Main loop: compare to each candidate branch
            // -----------------------------------------------------------------------------
            for (const cand of candidates) {
                const otherRef = cand.ref;
                const otherBranch = otherRef.replace('origin/', '');

                const otherChanged = changedFilesFromDefault(otherRef, `candidate branch ${otherBranch}`);
                if (!otherChanged || otherChanged.length === 0) continue;

                const overlapAll = intersect(currentChanged, otherChanged);
                if (overlapAll.length === 0) continue;

                const overlapCapped = overlapAll.slice(0, GITHUB_WARN_POSSIBLE_CONFLICTS_MAX_FILES_PER_PAIR);

                const potentialTitle = `⚠️ Potential conflict warning: ${CURRENT_BRANCH} ↔ ${otherBranch}`;
                const potentialSelfTitle = `ℹ️ Potential self-conflict warning: ${CURRENT_BRANCH} ↔ ${otherBranch}`;
                const existingIssue = findExistingIssueForPair(openConflictIssues, CURRENT_BRANCH, otherBranch);

                const existingBody = existingIssue ? (existingIssue.body || '') : '';
                const state = parseStateFromBody(existingBody);
                const alreadyNotified = new Set(state.notifiedFiles);

                const newOverlap = overlapCapped.filter((f) => !alreadyNotified.has(f));

                if (newOverlap.length === 0) {
                    if (existingIssue && (!existingIssue.assignees || existingIssue.assignees.length === 0)) {
                        await addAssigneesSafe(existingIssue.number, [context.actor]);
                        core.info(`Backfilled assignee on existing overlap issue #${existingIssue.number}.`);
                    }
                    core.info(`No new overlapping files for ${CURRENT_BRANCH} ↔ ${otherBranch}. Skipping notification.`);
                    continue;
                }

                const actualConflictDetected = detectActualConflict(otherRef);
                const perFile = [];
                const touchedLogins = new Set();

                for (let idx = 0; idx < newOverlap.length; idx++) {
                    const file = newOverlap[idx];
                    const shaCurrent = lastTouchCommitSha('HEAD', file);
                    const shaOther = lastTouchCommitSha(otherRef, file);

                    const loginCurrent = await commitShaToLogin(shaCurrent);
                    const loginOther = await commitShaToLogin(shaOther);

                    if (loginCurrent) touchedLogins.add(loginCurrent);
                    if (loginOther) touchedLogins.add(loginOther);

                    const hasDiffDetails = idx < GITHUB_WARN_POSSIBLE_CONFLICTS_MAX_FILES_WITH_DIFF_DETAILS;
                    const quotedFile = shellQuoteSingle(file);
                    const currentBranchDiff = hasDiffDetails
                        ? diffSnippet(`git diff --unified=1 ${defaultRef}...HEAD -- ${quotedFile}`)
                        : '';
                    const otherBranchDiff = hasDiffDetails
                        ? diffSnippet(`git diff --unified=1 ${defaultRef}...${otherRef} -- ${quotedFile}`)
                        : '';
                    const betweenBranchesDiff = hasDiffDetails
                        ? diffSnippet(`git diff --unified=1 ${otherRef}..HEAD -- ${quotedFile}`)
                        : '';

                    perFile.push({
                        file,
                        shaCurrent,
                        shaOther,
                        loginCurrent,
                        loginOther,
                        hasDiffDetails,
                        currentBranchDiff,
                        otherBranchDiff,
                        betweenBranchesDiff,
                    });
                }

                const uniqueLogins = [...touchedLogins].filter(Boolean);
                const assignees = normalizeAssignees([context.actor, ...uniqueLogins]);
                const isSelfOverlap = uniqueLogins.length === 1 && uniqueLogins[0] === context.actor;
                const issueTitle = isSelfOverlap ? potentialSelfTitle : potentialTitle;
                const labels = isSelfOverlap ? ['self-overlap'] : ['coordination-needed', 'merge-risk'];
                const issueAssignees = isSelfOverlap ? [context.actor] : assignees;

                const buildSectionBody = () => {
                    const bodyLines = [];
                    bodyLines.push(`Detected on push to \`${CURRENT_BRANCH}\` (default: \`${DEFAULT_BRANCH}\`).`);
                    bodyLines.push('');
                    bodyLines.push(
                        actualConflictDetected
                            ? '❗ **Assessment:** Actual merge conflict indicators were detected between these branches in this run.'
                            : 'ℹ️ **Assessment:** This is a potential conflict warning. Overlapping file edits were detected, but this run did not find direct merge conflict indicators.'
                    );
                    if (isSelfOverlap) {
                        bodyLines.push('');
                        bodyLines.push('ℹ️ This is a self-warning: the same developer appears to be the most recent editor on both branches.');
                    }
                    bodyLines.push('');
                    bodyLines.push(`**New overlapping files (${newOverlap.length}):**`);
                    bodyLines.push('');

                    for (const row of perFile) {
                        const a = row.loginCurrent ? `@${row.loginCurrent}` : '(unlinked author)';
                        const b = row.loginOther ? `@${row.loginOther}` : '(unlinked author)';
                        const shaA = row.shaCurrent ? row.shaCurrent.slice(0, 7) : '—';
                        const shaB = row.shaOther ? row.shaOther.slice(0, 7) : '—';
                        bodyLines.push(`- \`${row.file}\``);
                        bodyLines.push(`  - ${CURRENT_BRANCH}: ${shaA} ${a}`);
                        bodyLines.push(`  - ${otherBranch}: ${shaB} ${b}`);
                    }

                    bodyLines.push('');
                    bodyLines.push('**Per-file edit context (each branch + branch-to-branch diff):**');
                    bodyLines.push('');

                    const withDetails = perFile.filter((row) => row.hasDiffDetails);
                    for (const row of withDetails) {
                        bodyLines.push('<details>');
                        bodyLines.push(`<summary><code>${row.file}</code></summary>`);
                        bodyLines.push('');
                        bodyLines.push(`**${CURRENT_BRANCH} edit vs ${DEFAULT_BRANCH}:**`);
                        bodyLines.push(row.currentBranchDiff);
                        bodyLines.push('');
                        bodyLines.push(`**${otherBranch} edit vs ${DEFAULT_BRANCH}:**`);
                        bodyLines.push(row.otherBranchDiff);
                        bodyLines.push('');
                        bodyLines.push(`**Diff between ${CURRENT_BRANCH} and ${otherBranch} (this file):**`);
                        bodyLines.push(row.betweenBranchesDiff);
                        bodyLines.push('</details>');
                        bodyLines.push('');
                    }

                    const omittedDetailCount = perFile.length - withDetails.length;
                    if (omittedDetailCount > 0) {
                        bodyLines.push(`_Detailed diff blocks omitted for ${omittedDetailCount} file(s) to keep the issue readable._`);
                        bodyLines.push('');
                    }

                    if (touchedLogins.size > 0) {
                        const mentions = [...touchedLogins].filter(Boolean).map((l) => `@${l}`).join(' ');
                        if (mentions) {
                            bodyLines.push(`**People most recently touching these files:** ${mentions}`);
                            bodyLines.push('');
                        }
                    }

                    bodyLines.push(`Suggested action: coordinate before both branches land on \`${DEFAULT_BRANCH}\`.`);
                    return bodyLines.join('\n');
                };

                if (GITHUB_WARN_POSSIBLE_CONFLICTS_SELF_TO_SUMMARY && isSelfOverlap) {
                    core.info(`Self-overlap detected for ${context.actor}: ${CURRENT_BRANCH} ↔ ${otherBranch}. Writing workflow summary.`);
                    await core.summary
                        .addHeading(`Self-overlap: ${CURRENT_BRANCH} ↔ ${otherBranch}`)
                        .addRaw(`New overlapping files (${newOverlap.length}):\n`)
                        .addList(newOverlap.map((f) => `\`${f}\``))
                        .write();
                }

                state.notifiedFiles = [...alreadyNotified, ...newOverlap];

                const baseBody = stripOldState(existingBody);
                const newSection = buildSectionBody();
                const finalBody = (baseBody ? `${baseBody}\n\n---\n\n${newSection}` : newSection) + `\n\n${renderState(state)}\n`;

                if (existingIssue) {
                    await updateIssue({
                        issue_number: existingIssue.number,
                        title: issueTitle,
                        body: finalBody,
                        labels,
                        assignees: issueAssignees,
                    });
                } else {
                    await createIssue({
                        title: issueTitle,
                        body: finalBody,
                        labels,
                        assignees: issueAssignees,
                    });
                }
            }

            core.info('Done.');
