name: "Shopify Theme Backup"
description: "Pulls a Shopify theme and optionally zips it"
inputs:
    store:
        required: true
    theme_id:
        required: true
    token:
        required: true
    output_dir:
        required: false
        default: "./backup"
    zip_output:
        required: false
        default: ""
runs:
    using: "composite"
    steps:
        - run: |
              set -euo pipefail
              OUT_DIR="${{ inputs.output_dir }}"
              rm -rf "${OUT_DIR}"
              mkdir -p "${OUT_DIR}"

              shopify theme pull \
                  --store "${{ inputs.store }}" \
                  --theme "${{ inputs.theme_id }}" \
                  --password "${{ inputs.token }}" \
                  --path "${OUT_DIR}" \
                  --nodelete \
                  --no-color

              if [ -n "${{ inputs.zip_output }}" ]; then
                  (cd "${OUT_DIR}" && zip -r "../${{ inputs.zip_output }}" .)
              fi
          shell: bash
