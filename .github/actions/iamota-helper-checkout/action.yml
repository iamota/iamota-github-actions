name: "IAMOTA Helper Checkout"
description: "Checkout iamota helper repo with explicit ref and optional token"
inputs:
    workflow_ref:
        description: "Optional github.workflow_ref fallback for ref parsing"
        required: false
        default: ""
    ref:
        description: "Ref to checkout from helper repository"
        required: false
        default: ""
    token:
        description: "Optional token with read access to helper repository"
        required: false
        default: ""
    repository:
        description: "Helper repository"
        default: "iamota/iamota-github-actions"
    path:
        description: "Destination path"
        default: ".iamota-actions"
outputs:
    ref:
        description: "Resolved git ref"
        value: ${{ steps.stage_local.outputs.ref != '' && steps.stage_local.outputs.ref || steps.resolve.outputs.ref }}
runs:
    using: "composite"
    steps:
        - id: stage_local
          run: |
              set -euo pipefail
              REPOSITORY_IN="${{ inputs.repository }}"
              DEST="${{ inputs.path }}"
              SCRIPTS_SRC="${GITHUB_ACTION_PATH}/../../scripts"

              if [ -n "${GITHUB_ACTION_PATH:-}" ] && [ -d "${SCRIPTS_SRC}" ] && { [ -z "${GITHUB_ACTION_REPOSITORY:-}" ] || [ "${GITHUB_ACTION_REPOSITORY}" = "${REPOSITORY_IN}" ]; }; then
                  rm -rf "${DEST}"
                  mkdir -p "${DEST}/.github"
                  cp -a "${SCRIPTS_SRC}" "${DEST}/.github/scripts"
                  echo "ref=${GITHUB_ACTION_REF:-bundled}" >> "$GITHUB_OUTPUT"
                  echo "used_local_bundle=true" >> "$GITHUB_OUTPUT"
              else
                  echo "used_local_bundle=false" >> "$GITHUB_OUTPUT"
              fi
          shell: bash

        - id: resolve
          if: steps.stage_local.outputs.used_local_bundle != 'true'
          run: |
              set -euo pipefail
              REF_IN="${{ inputs.ref }}"
              REPOSITORY_IN="${{ inputs.repository }}"
              if [ -n "${REF_IN}" ]; then
                  echo "ref=${REF_IN}" >> "$GITHUB_OUTPUT"
                  exit 0
              fi

              if [ -n "${GITHUB_ACTION_REF:-}" ] && [ -n "${GITHUB_ACTION_REPOSITORY:-}" ] && [ "${GITHUB_ACTION_REPOSITORY}" = "${REPOSITORY_IN}" ]; then
                  echo "ref=${GITHUB_ACTION_REF}" >> "$GITHUB_OUTPUT"
                  exit 0
              fi

              WF_REF="${{ inputs.workflow_ref }}"
              if [ -n "${WF_REF}" ] && [[ "${WF_REF}" == "${REPOSITORY_IN}"* ]] && [[ "${WF_REF}" == *"@"* ]]; then
                  echo "ref=${WF_REF##*@}" >> "$GITHUB_OUTPUT"
              else
                  echo "ref=main" >> "$GITHUB_OUTPUT"
              fi
          shell: bash

        - if: ${{ steps.stage_local.outputs.used_local_bundle != 'true' && inputs.token != '' }}
          uses: actions/checkout@v5
          with:
              repository: ${{ inputs.repository }}
              ref: ${{ steps.resolve.outputs.ref }}
              token: ${{ inputs.token }}
              path: ${{ inputs.path }}

        - if: ${{ steps.stage_local.outputs.used_local_bundle != 'true' && inputs.token == '' }}
          uses: actions/checkout@v5
          with:
              repository: ${{ inputs.repository }}
              ref: ${{ steps.resolve.outputs.ref }}
              path: ${{ inputs.path }}
