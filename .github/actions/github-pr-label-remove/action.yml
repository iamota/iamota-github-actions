name: "GitHub PR Label Remove"
description: "Remove a label from a PR/issue; no-op if missing"
inputs:
    repo:
        required: true
    pr:
        required: true
    label:
        required: true
runs:
    using: "composite"
    steps:
        - run: |
              set -euo pipefail
              PR_NUMBER="${{ inputs.pr }}"
              LABEL="${{ inputs.label }}"
              if gh pr edit --help 2>/dev/null | grep -q -- "--remove-label"; then
                gh pr edit "${PR_NUMBER}" --remove-label "${LABEL}" >/dev/null 2>&1 || true
              else
                ENC_LABEL="$(printf '%s' "${LABEL}" | sed 's/ /%20/g')"
                gh api -X DELETE "repos/${{ inputs.repo }}/issues/${PR_NUMBER}/labels/${ENC_LABEL}" >/dev/null 2>&1 || true
              fi
          shell: bash
