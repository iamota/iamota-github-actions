name: "NPM Install"
description: "Run npm install command when package.json exists"
inputs:
    working_directory:
        description: "Directory to inspect/run from"
        default: "."
    install_command:
        description: "Install command to run when package.json exists"
        default: "npm ci"
    if_package_json:
        description: "Only run when package.json exists (1/0)"
        default: "1"
outputs:
    ran:
        description: "Whether install command ran (true/false)"
        value: ${{ steps.install.outputs.ran }}
    has_package_json:
        description: "Whether package.json exists (true/false)"
        value: ${{ steps.install.outputs.has_package_json }}
runs:
    using: "composite"
    steps:
        - id: install
          run: |
              set -euo pipefail
              WD="${{ inputs.working_directory }}"
              CMD="${{ inputs.install_command }}"
              IF_PKG="${{ inputs.if_package_json }}"

              if [ ! -d "${WD}" ]; then
                echo "working_directory not found: ${WD}"
                exit 1
              fi

              HAS_PKG="false"
              if [ -f "${WD}/package.json" ]; then
                HAS_PKG="true"
              fi

              if [ "${IF_PKG}" = "1" ] && [ "${HAS_PKG}" != "true" ]; then
                echo "has_package_json=false" >> "$GITHUB_OUTPUT"
                echo "ran=false" >> "$GITHUB_OUTPUT"
                exit 0
              fi

              (
                cd "${WD}"

                # `npm ci` requires a lockfile. Fall back to `npm install`
                # for repos that have package.json but no lockfile yet.
                if [[ "${CMD}" =~ ^[[:space:]]*npm[[:space:]]+ci([[:space:]]|$) ]] && [ ! -f "package-lock.json" ] && [ ! -f "npm-shrinkwrap.json" ]; then
                  echo "package.json found but no lockfile; falling back from 'npm ci' to 'npm install'."
                  bash -lc "npm install"
                else
                  if [[ "${CMD}" =~ ^[[:space:]]*npm[[:space:]]+ci([[:space:]]|$) ]]; then
                    if [ -f "package-lock.json" ]; then
                      echo "package-lock.json found; running 'npm ci'."
                    elif [ -f "npm-shrinkwrap.json" ]; then
                      echo "npm-shrinkwrap.json found; running 'npm ci'."
                    fi
                  else
                    echo "Running install command: ${CMD}"
                  fi
                  bash -lc "${CMD}"
                fi
              )

              echo "has_package_json=${HAS_PKG}" >> "$GITHUB_OUTPUT"
              echo "ran=true" >> "$GITHUB_OUTPUT"
          shell: bash
