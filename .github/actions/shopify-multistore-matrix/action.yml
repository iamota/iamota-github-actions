name: "Shopify Multistore Matrix"
description: "Parses Shopify store input (CSV or JSON array) into a workflow matrix"
inputs:
    stores:
        required: true
    allow_empty:
        required: false
        default: "false"
outputs:
    stores_json:
        description: "JSON array of normalized store hosts"
        value: ${{ steps.parse.outputs.stores_json }}
    matrix_json:
        description: "Matrix JSON in { include: [{store,store_slug}] } format"
        value: ${{ steps.parse.outputs.matrix_json }}
    first_store:
        description: "First normalized store host"
        value: ${{ steps.parse.outputs.first_store }}
runs:
    using: "composite"
    steps:
        - id: parse
          run: |
              set -euo pipefail
              RAW="${{ inputs.stores }}"
              ALLOW_EMPTY="${{ inputs.allow_empty }}"

              OUT="$(
                node - "${RAW}" "${ALLOW_EMPTY}" <<'NODE'
                function normalizeStore(v) {
                    let s = String(v ?? "").trim();
                    if (!s) return "";
                    s = s.replace(/^https?:\/\//i, "");
                    s = s.split("/")[0].trim().toLowerCase();
                    if (!s) return "";
                    if (!s.includes(".")) s = `${s}.myshopify.com`;
                    return s;
                }

                function parseStores(raw) {
                    const s = String(raw ?? "").trim();
                    if (!s) return [];

                    if (s.startsWith("[")) {
                        const arr = JSON.parse(s);
                        if (!Array.isArray(arr)) throw new Error("stores JSON must be an array");
                        return arr.map(normalizeStore).filter(Boolean);
                    }

                    return s
                        .split(",")
                        .map((x) => normalizeStore(x))
                        .filter(Boolean);
                }

                const raw = process.argv[2] || "";
                const allowEmpty = String(process.argv[3] || "").toLowerCase() === "true";
                const seen = new Set();
                const stores = [];
                for (const st of parseStores(raw)) {
                    if (!seen.has(st)) {
                        seen.add(st);
                        stores.push(st);
                    }
                }
                if (stores.length === 0) {
                    if (!allowEmpty) {
                        throw new Error("No stores resolved from input.");
                    }

                    process.stdout.write(
                        JSON.stringify(
                            {
                                stores_json: "[]",
                                matrix_json: JSON.stringify({ include: [{ store: "", store_slug: "" }] }),
                                first_store: "",
                            },
                            null,
                            2
                        )
                    );
                    process.exit(0);
                }

                const include = stores.map((store) => {
                    const slug = store.replace(/\.myshopify\.com$/i, "");
                    return { store, store_slug: slug };
                });

                process.stdout.write(
                    JSON.stringify(
                        {
                            stores_json: JSON.stringify(stores),
                            matrix_json: JSON.stringify({ include }),
                            first_store: stores[0] || "",
                        },
                        null,
                        2
                    )
                );
                NODE
              )"

              STORES_JSON="$(printf '%s' "${OUT}" | node -e "let d='';process.stdin.on('data',c=>d+=c).on('end',()=>{const j=JSON.parse(d);process.stdout.write(String(j.stores_json||'[]'));});")"
              MATRIX_JSON="$(printf '%s' "${OUT}" | node -e "let d='';process.stdin.on('data',c=>d+=c).on('end',()=>{const j=JSON.parse(d);process.stdout.write(String(j.matrix_json||'{\"include\":[]}'));});")"
              FIRST_STORE="$(printf '%s' "${OUT}" | node -e "let d='';process.stdin.on('data',c=>d+=c).on('end',()=>{const j=JSON.parse(d);process.stdout.write(String(j.first_store||''));});")"

              {
                echo "stores_json=${STORES_JSON}"
                echo "matrix_json=${MATRIX_JSON}"
                echo "first_store=${FIRST_STORE}"
              } >> "$GITHUB_OUTPUT"
          shell: bash
