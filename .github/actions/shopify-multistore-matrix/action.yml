name: "Shopify Multistore Matrix"
description: "Parses Shopify store input (single store string or JSON array) into a workflow matrix"
inputs:
    stores:
        required: true
    allow_empty:
        required: false
        default: "false"
outputs:
    stores_json:
        description: "JSON array of normalized store hosts"
        value: ${{ steps.parse.outputs.stores_json }}
    matrix_json:
        description: "Matrix JSON in { include: [{store,store_slug,store_index}] } format"
        value: ${{ steps.parse.outputs.matrix_json }}
    first_store:
        description: "First normalized store host"
        value: ${{ steps.parse.outputs.first_store }}
    first_store_index:
        description: "One-based index for first normalized store host"
        value: ${{ steps.parse.outputs.first_store_index }}
    first_store_secret_key:
        description: "Secret-safe key for first normalized store host"
        value: ${{ steps.parse.outputs.first_store_secret_key }}
runs:
    using: "composite"
    steps:
        - id: parse
          env:
              INPUT_STORES: ${{ inputs.stores }}
              INPUT_ALLOW_EMPTY: ${{ inputs.allow_empty }}
          run: |
              set -euo pipefail
              RAW="${INPUT_STORES}"
              ALLOW_EMPTY="${INPUT_ALLOW_EMPTY}"

              OUT="$(node "${GITHUB_ACTION_PATH}/parse-matrix.mjs" "${RAW}" "${ALLOW_EMPTY}")"

              STORES_JSON="$(printf '%s' "${OUT}" | node -e "let d='';process.stdin.on('data',c=>d+=c).on('end',()=>{const j=JSON.parse(d);process.stdout.write(String(j.stores_json||'[]'));});")"
              MATRIX_JSON="$(printf '%s' "${OUT}" | node -e "let d='';process.stdin.on('data',c=>d+=c).on('end',()=>{const j=JSON.parse(d);process.stdout.write(String(j.matrix_json||'{\"include\":[]}'));});")"
              FIRST_STORE="$(printf '%s' "${OUT}" | node -e "let d='';process.stdin.on('data',c=>d+=c).on('end',()=>{const j=JSON.parse(d);process.stdout.write(String(j.first_store||''));});")"
              FIRST_STORE_INDEX="$(printf '%s' "${OUT}" | node -e "let d='';process.stdin.on('data',c=>d+=c).on('end',()=>{const j=JSON.parse(d);process.stdout.write(String(j.first_store_index||''));});")"
              FIRST_STORE_SECRET_KEY="$(printf '%s' "${OUT}" | node -e "let d='';process.stdin.on('data',c=>d+=c).on('end',()=>{const j=JSON.parse(d);process.stdout.write(String(j.first_store_secret_key||''));});")"

              {
                echo "stores_json=${STORES_JSON}"
                echo "matrix_json=${MATRIX_JSON}"
                echo "first_store=${FIRST_STORE}"
                echo "first_store_index=${FIRST_STORE_INDEX}"
                echo "first_store_secret_key=${FIRST_STORE_SECRET_KEY}"
              } >> "$GITHUB_OUTPUT"
          shell: bash
