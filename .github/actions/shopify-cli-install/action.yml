name: "Shopify CLI Install"
description: "Setup Node and install Shopify CLI"
inputs:
    node_version:
        description: "Node.js version used for Shopify CLI"
        default: "20"
    cli_version:
        description: "Shopify CLI version"
        default: "latest"
runs:
    using: "composite"
    steps:
        - uses: actions/setup-node@v5
          with:
              node-version: ${{ inputs.node_version }}

        - run: |
              set -euo pipefail
              npm install -g "@shopify/cli@${{ inputs.cli_version }}"
              command -v shopify >/dev/null
          shell: bash
