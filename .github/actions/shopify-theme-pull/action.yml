name: "Shopify Theme Pull"
description: "Pulls theme files from Shopify via Shopify CLI"
inputs:
    store:
        required: true
    theme_id:
        required: true
    token:
        required: true
    path:
        default: ./backup
    nodelete:
        default: "1"
    ignore_csv:
        description: "Comma-separated --ignore globs"
        default: ""
runs:
    using: "composite"
    steps:
        - run: |
              set -euo pipefail
              THEME_ID="$(
                node "${GITHUB_ACTION_PATH}/../../scripts/shopify/shopify-theme-id-resolve.mjs" \
                  --store "${{ inputs.store }}" \
                  --theme-id "${{ inputs.theme_id }}" \
                  --token "${{ inputs.token }}"
              )"

              ARGS=(
                theme pull
                --store "${{ inputs.store }}"
                --theme "${THEME_ID}"
                --password "${{ inputs.token }}"
                --path "${{ inputs.path }}"
                --no-color
              )
              if [ "${{ inputs.nodelete }}" = "1" ]; then
                ARGS+=(--nodelete)
              fi

              IFS=',' read -r -a IG <<< "${{ inputs.ignore_csv }}"
              for g in "${IG[@]}"; do
                g_trim="$(echo "${g}" | xargs)"
                if [ -n "${g_trim}" ]; then
                  ARGS+=(--ignore "${g_trim}")
                fi
              done

              mkdir -p "${{ inputs.path }}"
              command -v shopify >/dev/null
              shopify "${ARGS[@]}"
          shell: bash
