name: "Shopify Multistore Resolve Value"
description: "Resolve a scalar or store-keyed JSON object value for a specific store"
inputs:
    store:
        required: true
    raw:
        required: false
        default: ""
outputs:
    value:
        description: "Resolved value for this store"
        value: ${{ steps.resolve.outputs.value }}
runs:
    using: "composite"
    steps:
        - id: resolve
          env:
              INPUT_STORE: ${{ inputs.store }}
              INPUT_RAW: ${{ inputs.raw }}
          run: |
              set -euo pipefail
              STORE="${INPUT_STORE}"
              RAW="${INPUT_RAW}"

              VALUE="$(node "${GITHUB_ACTION_PATH}/resolve-value.mjs" "${STORE}" "${RAW}")"

              {
                echo "value<<EOF"
                printf '%s\n' "${VALUE}"
                echo "EOF"
              } >> "$GITHUB_OUTPUT"
          shell: bash
