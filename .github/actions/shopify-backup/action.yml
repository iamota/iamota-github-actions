name: Shopify Theme Backup
description: Orchestrate theme backup: pull + zip + S3 + archive
inputs:
  use_themekit:
    description: "Use Theme Kit instead of Shopify CLI"
    required: false
    default: "false"
  store:
    required: true
  theme_id:
    required: true
  token:
    required: true
  bucket:
    required: true
  aws_key:
    required: true
  aws_secret:
    required: true
runs:
  using: composite
  steps:
    - uses: iamota/iamota-github-actions/.github/actions/shopify-pull@v1
      with:
        use_themekit: ${{ inputs.use_themekit }}
        store: ${{ inputs.store }}
        theme_id: ${{ inputs.theme_id }}
        token: ${{ inputs.token }}

    - run: |
        cd backup
        zip -r ../theme-backup.zip .
      shell: bash

    - run: |
        REPO=$(basename "$GITHUB_REPOSITORY")
        TS=$(date +%Y-%m-%d_%H%M%S)
        DEST_PATH="$TS/${REPO}.zip"
        echo "DEST_PATH=$DEST_PATH" >> $GITHUB_ENV
        echo "ZIP_NAME=theme-backup.zip" >> $GITHUB_ENV
      shell: bash

    - uses: iamota/iamota-github-actions/.github/actions/aws-s3-upload@v1
      with:
        file: theme-backup.zip
        dest: ${{ env.DEST_PATH }}
        bucket: ${{ inputs.bucket }}
        aws_key: ${{ inputs.aws_key }}
        aws_secret: ${{ inputs.aws_secret }}

    - uses: iamota/iamota-github-actions/.github/actions/github-artifact-upload@v1
      with:
        name: ${{ env.DEST_PATH }}
        path: ./backup
