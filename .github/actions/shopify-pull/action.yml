name: Shopify Pull
description: Pull theme using Shopify CLI or Theme Kit
inputs:
  use_themekit:
    description: "Use Theme Kit instead of Shopify CLI"
    required: false
    default: "false"
  store:
    required: true
  theme_id:
    required: true
  token:
    required: true
runs:
  using: composite
  steps:
    - run: chmod +x $GITHUB_ACTION_PATH/*.sh
      shell: bash
    - run: |
        if [ "${{ inputs.use_themekit }}" = "true" ]; then
          $GITHUB_ACTION_PATH/pull_themekit.sh
        else
          $GITHUB_ACTION_PATH/pull_shopifycli.sh
        fi
      shell: bash
      env:
        SHOPIFY_FLAG_STORE: ${{ inputs.store }}
        SHOPIFY_FLAG_THEME_ID: ${{ inputs.theme_id }}
        SHOPIFY_CLI_THEME_TOKEN: ${{ inputs.token }}
