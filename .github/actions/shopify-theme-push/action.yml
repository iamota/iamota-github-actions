name: "Shopify Theme Push"
description: "Pushes theme files to Shopify via Shopify CLI"
inputs:
    store:
        required: true
    theme_id:
        required: true
    token:
        required: true
    path:
        default: ./dist
    allow_live:
        default: "0"
    nodelete:
        default: "1"
    ignore:
        default: ""
    json:
        description: "When set to 1, run with --json and expose outputs"
        default: "0"
outputs:
    raw_json:
        description: "Raw JSON output from Shopify CLI (when json=1)"
        value: ${{ steps.push.outputs.raw_json }}
    preview_url:
        description: "Theme preview URL parsed from JSON output (when available)"
        value: ${{ steps.push.outputs.preview_url }}
runs:
    using: "composite"
    steps:
        - id: push
          run: |
              set -euo pipefail
              THEME_ID="$(
                node "${GITHUB_ACTION_PATH}/../../scripts/shopify/shopify-theme-id-resolve.mjs" \
                  --store "${{ inputs.store }}" \
                  --theme-id "${{ inputs.theme_id }}" \
                  --token "${{ inputs.token }}"
              )"

              ARGS=(
                theme push
                --store "${{ inputs.store }}"
                --theme "${THEME_ID}"
                --password "${{ inputs.token }}"
                --path "${{ inputs.path }}"
                --no-color
              )
              if [ "${{ inputs.allow_live }}" = "1" ]; then
                ARGS+=(--allow-live)
              fi
              if [ "${{ inputs.nodelete }}" = "1" ]; then
                ARGS+=(--nodelete)
              fi
              if [ -n "${{ inputs.ignore }}" ]; then
                ARGS+=(--ignore "${{ inputs.ignore }}")
              fi
              command -v shopify >/dev/null
              if [ "${{ inputs.json }}" = "1" ]; then
                ARGS+=(--json)
                OUT="$(shopify "${ARGS[@]}")"
                PREVIEW_URL="$(echo "${OUT}" | node -e "let d='';process.stdin.on('data',c=>d+=c).on('end',()=>{try{const j=JSON.parse(d);process.stdout.write(String(j?.theme?.preview_url||''));}catch{process.stdout.write('');}});")"
                {
                  echo "raw_json<<EOF"
                  printf '%s\n' "${OUT}"
                  echo "EOF"
                  echo "preview_url=${PREVIEW_URL}"
                } >> "$GITHUB_OUTPUT"
              else
                shopify "${ARGS[@]}"
              fi
          shell: bash
