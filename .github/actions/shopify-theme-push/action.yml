name: "Shopify Theme Push"
description: "Pushes theme files to Shopify via Shopify CLI"
inputs:
    store:
        required: true
    theme_id:
        required: true
    token:
        required: true
    path:
        default: ./dist
    allow_live:
        default: "0"
    nodelete:
        default: "1"
    ignore:
        default: ""
runs:
    using: "composite"
    steps:
        - run: |
              set -euo pipefail
              ARGS=(
                theme push
                --store "${{ inputs.store }}"
                --theme "${{ inputs.theme_id }}"
                --password "${{ inputs.token }}"
                --path "${{ inputs.path }}"
                --no-color
              )
              if [ "${{ inputs.allow_live }}" = "1" ]; then
                ARGS+=(--allow-live)
              fi
              if [ "${{ inputs.nodelete }}" = "1" ]; then
                ARGS+=(--nodelete)
              fi
              if [ -n "${{ inputs.ignore }}" ]; then
                ARGS+=(--ignore "${{ inputs.ignore }}")
              fi
              command -v shopify >/dev/null
              shopify "${ARGS[@]}"
          shell: bash
