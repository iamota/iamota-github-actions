name: "Shopify Theme Delete"
description: "Deletes a Shopify theme by id"
inputs:
    store:
        required: true
    theme_id:
        required: true
    token:
        required: true
    ignore_not_found:
        required: false
        default: "false"
outputs:
    status:
        description: "deleted or missing"
        value: ${{ steps.delete.outputs.status }}
runs:
    using: "composite"
    steps:
        - id: delete
          run: |
              set -euo pipefail

              set +e
              OUT="$(
                  shopify theme delete \
                      --store "${{ inputs.store }}" \
                      --theme "${{ inputs.theme_id }}" \
                      --password "${{ inputs.token }}" \
                      --force \
                      --no-color \
                      2>&1
              )"
              EXIT_CODE=$?
              set -e

              if [ "${EXIT_CODE}" -eq 0 ]; then
                  echo "status=deleted" >> "$GITHUB_OUTPUT"
                  [ -z "${OUT}" ] || echo "${OUT}"
                  exit 0
              fi

              if [ "${{ inputs.ignore_not_found }}" = "true" ] && echo "${OUT}" | grep -Eiq 'not[[:space:]-]?found|could not find|doesn.?t exist|no such theme'; then
                  echo "status=missing" >> "$GITHUB_OUTPUT"
                  echo "Theme not found; skipping delete."
                  exit 0
              fi

              [ -z "${OUT}" ] || echo "${OUT}"
              exit "${EXIT_CODE}"
          shell: bash
