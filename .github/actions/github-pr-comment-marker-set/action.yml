name: "GitHub PR Comment Marker Set"
description: "Create/update/refresh marker-based PR comment via helper script"
inputs:
    repo:
        required: true
    pr:
        required: true
    marker:
        required: true
    body:
        required: true
    refresh_after_comments:
        required: false
        default: "0"
    scripts_root:
        required: false
        default: ".iamota-actions/.github/scripts/github"
runs:
    using: "composite"
    steps:
        - run: |
              set -euo pipefail
              ROOT="${{ inputs.scripts_root }}"
              SCRIPT="${ROOT}/github-pr-comment-marker-set.mjs"

              if [ ! -f "${SCRIPT}" ]; then
                  echo "Missing marker-set script: ${SCRIPT}"
                  exit 1
              fi

              node "${SCRIPT}" \
                --repo "${{ inputs.repo }}" \
                --pr "${{ inputs.pr }}" \
                --marker "${{ inputs.marker }}" \
                --body "${{ inputs.body }}" \
                --refresh-after-comments "${{ inputs.refresh_after_comments }}"
          shell: bash
