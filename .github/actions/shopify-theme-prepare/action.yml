name: "Shopify Theme Prepare"
description: "Install/build theme and resolve effective deploy/test root"
inputs:
    theme_root:
        description: "Theme root path (build/package root)"
        default: ""
    theme_src:
        description: "Theme source path"
        default: ""
    theme_dist:
        description: "Theme dist path override"
        default: ""
    build_install_command:
        description: "Install command"
        default: "npm ci"
    build_command:
        description: "Build command"
        default: "npx webpack --env target=${GITHUB_BRANCH}"
outputs:
    theme_root_effective:
        description: "Resolved effective theme root path"
        value: ${{ steps.inputs.outputs.theme_root_effective }}
    theme_src_effective:
        description: "Resolved effective theme source path"
        value: ${{ steps.inputs.outputs.theme_src_effective }}
    theme_dist_effective:
        description: "Resolved effective theme output path"
        value: ${{ steps.resolve.outputs.theme_dist_effective }}
    webpack_ran:
        description: "Whether webpack build ran"
        value: ${{ steps.webpack.outputs.ran }}
    npm_install_ran:
        description: "Whether npm install ran"
        value: ${{ steps.npm.outputs.ran }}
runs:
    using: "composite"
    steps:
        - id: inputs
          run: |
              set -euo pipefail
              ROOT="${{ inputs.theme_root }}"
              SRC="${{ inputs.theme_src }}"
              DIST_IN="${{ inputs.theme_dist }}"

              if [ -z "${ROOT}" ]; then
                ROOT="."
              fi

              if [ -z "${SRC}" ]; then
                if [ "${ROOT}" != "." ]; then
                  SRC="${ROOT}"
                elif [ -d "./src" ]; then
                  SRC="./src"
                else
                  SRC="."
                fi
              fi

              if [ ! -d "${ROOT}" ]; then
                echo "THEME_ROOT directory not found: ${ROOT}"
                exit 1
              fi

              if [ ! -d "${SRC}" ]; then
                echo "THEME_SRC directory not found: ${SRC}"
                exit 1
              fi

              echo "theme_root_effective=${ROOT}" >> "$GITHUB_OUTPUT"
              echo "theme_src_effective=${SRC}" >> "$GITHUB_OUTPUT"
              echo "dist_input=${DIST_IN}" >> "$GITHUB_OUTPUT"
          shell: bash

        - id: npm
          uses: iamota/iamota-github-actions/.github/actions/npm-install@v1
          with:
              working_directory: ${{ steps.inputs.outputs.theme_root_effective }}
              install_command: ${{ inputs.build_install_command }}
              if_package_json: "1"

        - id: webpack
          uses: iamota/iamota-github-actions/.github/actions/webpack-build@v1
          with:
              working_directory: ${{ steps.inputs.outputs.theme_root_effective }}
              build_command: ${{ inputs.build_command }}
              if_webpack_config: "1"

        - id: resolve
          run: |
              set -euo pipefail
              DIST="${{ steps.inputs.outputs.dist_input }}"
              ROOT="${{ steps.inputs.outputs.theme_root_effective }}"
              SRC="${{ steps.inputs.outputs.theme_src_effective }}"
              if [ -z "${DIST}" ]; then
                if [ "${{ steps.webpack.outputs.ran }}" = "true" ]; then
                  if [ "${ROOT}" = "." ]; then
                    DIST="./dist"
                  else
                    DIST="${ROOT}/dist"
                  fi
                else
                  DIST="${SRC}"
                fi
              fi

              if [ ! -d "${DIST}" ]; then
                echo "Resolved theme output path not found: ${DIST}"
                exit 1
              fi

              echo "theme_dist_effective=${DIST}" >> "$GITHUB_OUTPUT"
          shell: bash
