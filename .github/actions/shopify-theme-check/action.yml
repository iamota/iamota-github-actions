name: "Shopify Theme Check"
description: "Run Shopify CLI theme check against a theme root"
inputs:
    path:
        description: "Theme root path to analyze"
        required: true
    fail_level:
        description: "Fail level: error, suggestion, style"
        default: "error"
    config_path:
        description: "Optional path to custom Theme Check config"
        default: ""
    verbose:
        description: "Enable verbose logging (true/false)"
        default: "false"
    auto_correct:
        description: "Enable auto-correct (true/false)"
        default: "false"
runs:
    using: "composite"
    steps:
        - run: |
              set -euo pipefail

              ARGS=(
                theme check
                --path "${{ inputs.path }}"
                --fail-level "${{ inputs.fail_level }}"
              )

              if [ -n "${{ inputs.config_path }}" ]; then
                ARGS+=(--config "${{ inputs.config_path }}")
              fi
              if [ "${{ inputs.verbose }}" = "true" ]; then
                ARGS+=(--verbose)
              fi
              if [ "${{ inputs.auto_correct }}" = "true" ]; then
                ARGS+=(--auto-correct)
              fi

              shopify "${ARGS[@]}"
          shell: bash
